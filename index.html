m to pass down through each level.", "priority": "3"}, {"id": "fs131", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Sprinkler System \u2013 Sufficient Gaps Between Shelving Units and Sprinkler Heads", "ref": "FS8/G7/xx", "name": "Sprinkler System \u2013 Sufficient Gaps Between Shelving Units and Sprinkler Heads", "finding": "There were no gaps between each of the units of the mobile shelving system when closed, which would delay/prevent water from the sprinkler system to pass through to the level(s) below.", "reason": "For sprinkler systems to be effective, they must be clear of obstructions.", "recommendation": "It is advised that there is a minimum gap of 150mm between each unit (i.e. 75mm stops fitted to each unit) when closed, allow water from the sprinkler system to pass down through each level.", "priority": "3"}, {"id": "fs132", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Maintenance Records \u2013 Available on Site", "ref": "FS9/A1/xx", "name": "Maintenance Records \u2013 Available on Site", "finding": "Up-to-date maintenance records for the premises were not available, Refer to: 1. Sources of ignition allowing fire to start. 6. People in workplace unaware of fire. 7. Persons cannot safely evacuate in the event of fire; and 8. Small fire grows rapidly putting untrained people at risk.", "reason": "Maintenance by competent persons must be carried out documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Ensure the premises is maintained and that documentation is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs133", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "In-House Fire Inspections - Being Undertaken", "ref": "FS9/B1/xx", "name": "In-House Fire Inspections - Being Undertaken", "finding": "Routine/recorded in-house inspections of fire safety precautions were not being undertaken.", "reason": "A program of routine fire safety inspections is an important part of overall fire safety management; proactively identifying potential hazards for corrective action to prevent incidents.", "recommendation": "Ensure that a program (i.e. monthly) of in-house fire safety inspections are undertaken and records are maintained.", "priority": "1"}, {"id": "fs134", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Multi Tenanted Site \u2013 Findings of Fire Risk Assessment have been Shared with Duty Holders", "ref": "FS9/C/1/xx", "name": "Multi Tenanted Site \u2013 Findings of Fire Risk Assessment have been Shared with Duty Holders", "finding": "The premises formed part of a multi-tenanted site.", "reason": "There is a requirement for the cooperation and coordination between duty-holders.", "recommendation": "The findings of the fire risk assessment must be shared with other duty-holders.", "priority": "2"}, {"id": "fs135", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire Safety Information \u2013 Shared with Contractors", "ref": "FS9/D1/xx", "name": "Fire Safety Information \u2013 Shared with Contractors", "finding": "Fire, health and safety information, i.e. RAMs, site induction, etc. had not been exchanged with contractors.", "reason": "Prior to any works on site commencing, fire, health and safety information must be exchanged and contractors approved.", "recommendation": "Ensure that the Contractor Management Policy and Procedure is implemented and that: Contractors are approved. Fire, health and safety information is exchanged (i.e. RAMs, risk assessments, etc.). Site inductions are undertaken; and Where required, hot works/permits to work are issued.", "priority": "2"}, {"id": "fs136", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire Safety Arrangements \u2013 Records Available", "ref": "FS9/E1/xx", "name": "Fire Safety Arrangements \u2013 Records Available", "finding": "There were no records of fire safety arrangements.", "reason": "There is a requirement for the record of the fire safety arrangements?", "recommendation": "WRM will assist in the development of: General Statement of Fire Safety Policy. Top management will need to sign/date the General Statement of Fire Safety Policy. Fire Safety Management Plan Manual. Fire safety roles and responsibilities will need to be communicated to all workers; and Fire Safety Policies and Procedures.", "priority": "1"}, {"id": "fs137", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire Safety Arrangements \u2013 Reviewed", "ref": "FS9/E2/xx", "name": "Fire Safety Arrangements \u2013 Reviewed", "finding": "The records of fire safety arrangements need to be reviewed.", "reason": "There is a requirement for the record of the fire safety arrangements?", "recommendation": "WRM will assist in the review of: General Statement of Fire Safety Policy. Top management will need to sign/date the General Statement of Fire Safety Policy. Fire Safety Management Plan Manual. Fire safety roles and responsibilities will need to be communicated to all workers; and Fire Safety Policies and Procedures.", "priority": "2"}, {"id": "fs138", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire Strategy \u2013 Available for the Building", "ref": "FS9/E3/xx", "name": "Fire Strategy \u2013 Available for the Building", "finding": "During the building history, there have been refurbishment projects/building alterations/changes in use.", "reason": "There is a requirement that a package of fire safety information must be assembled and given to the responsible person of the premises.", "recommendation": "Arrange for a Fire Strategy to be completed for the site, reviewing all aspects of the building\u2019s fire safety features including construction, compartmentation strategy, means of escape and other fire safety features/measures - including management arrangements in place to ensure it is fit for use for the end user of the premises.", "priority": "3"}, {"id": "fs139", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire Strategy Document \u2013 Available for Building", "ref": "FS9/E4/xx", "name": "Fire Strategy Document \u2013 Available for Building", "finding": "A fire strategy document for the building was not available.", "reason": "There is a requirement that a package of fire safety information must be assembled and given to the responsible person of the premises.", "recommendation": "Arrange for a Fire Strategy to be completed for the site, reviewing all aspects of the building\u2019s fire safety features including construction, compartmentation strategy, means of escape and other fire safety features/measures - including management arrangements in place to ensure it is fit for use for the end user of the premises.", "priority": "3"}, {"id": "fs140", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Emergency Evacuation Plan \u2013 Emergency Evacuation Plan in Place", "ref": "FS9/F1/xx", "name": "Emergency Evacuation Plan \u2013 Emergency Evacuation Plan in Place", "finding": "There was no fire emergency evacuation plan.", "reason": "Procedures in the event of fire must be documented.", "recommendation": "Develop a fire emergency evacuation plan, ensuring that it includes: Procedure for investigating fire alarm signals. How people will be warned if there is a fire. What workers should do if they discover a fire. What workers should do if they hear the fire alarm. How the evacuation of the premises should be carried out and key escape routes. How Emergency Services are contacted. Processes, machines or power that must be shut down. Specific arrangements for any high-risk areas. Emergency services liaison once on site. What/how specific information will be needed by the emergency services. Where information will be kept on risks. A map(s)/floorplan(s) or diagram should be included for ease of reference: Structural features. Fire-fighting equipment. Fire warning arrangements. Emergency lighting and signage. Fixed fire installations. Utility shut off valves. Give the locations of assembly points. Details of staff with specific responsibilities. Arrangements for fighting fire. What contingency plans are needed. How disabled persons will be evacuated. Where people should assemble and arrangements for ensuring that the premises have been evacuated.", "priority": "2"}, {"id": "fs141", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Emergency Evacuation Plan \u2013 Has been Reviewed", "ref": "FS9/F2/xx", "name": "Emergency Evacuation Plan \u2013 Has been Reviewed", "finding": "The fire emergency evacuation plan needs to be reviewed.", "reason": "Procedures in the event of fire must be documented.", "recommendation": "Develop a fire emergency evacuation plan, ensuring that it includes: Procedure for investigating fire alarm signals. How people will be warned if there is a fire. What workers should do if they discover a fire. What workers should do if they hear the fire alarm. How the evacuation of the premises should be carried out and key escape routes. How Emergency Services are contacted. Processes, machines or power that must be shut down. Specific arrangements for any high-risk areas. Emergency services liaison once on site. What/how specific information will be needed by the emergency services. Where information will be kept on risks. A map(s)/floorplan(s) or diagram should be included for ease of reference: Structural features. Fire-fighting equipment. Fire warning arrangements. Emergency lighting and signage. Fixed fire installations. Utility shut off valves. Give the locations of assembly point. Details of staff with specific responsibilities. Arrangements for fighting fire. What contingency plans are needed. How disabled persons will be evacuated. Where people should assemble and arrangements for ensuring that the premises have been evacuated.", "priority": "2"}, {"id": "fs142", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Emergency Plan \u2013 Emergency Plan has been Communicated to all Workers", "ref": "FS9/G1/xx", "name": "Emergency Plan \u2013 Emergency Plan has been Communicated to all Workers", "finding": "The fire emergency plan in place must be communicated to workers and persons nominated to assist in the event of an emergency.", "reason": "There is a requirement for the provision of fire safety information and training to workers.", "recommendation": "Ensure that the fire emergency plan is communicated to workers, i.e. at induction and to persons nominated to assist in the event of an emergency. Practice the fire emergency plan are part of fire drills and review following fire drill debriefs.", "priority": "2"}, {"id": "fs143", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire Pack \u2013 Fire Pack Present on Site", "ref": "FS9/H1/xx", "name": "Fire Pack \u2013 Fire Pack Present on Site", "finding": "There was no fire pack to hand over to the fire and rescue service during familiarization visits or in the event of an emergency.", "reason": "Preparing in advance for fire safety and having a fire pack containing operational information available to the Fire and Rescue Service is crucial.", "recommendation": "A fire pack should be developed to hand over to the Fire and Rescue Service on their arrival (kept in a fire document wallet/pouch adjacent to the fire panel). Ensure that a fire pack is readily available and contains the following (where applicable): Floor plans to be passed on to the Fire and Rescue Service: Fire alarm system zones. Fire escape routes. Firefighting equipment. Floor plan indicating shut-off points (gas, electrics etc.). High risk areas (DSEAR EX Zones). Information of any chemicals on site. Keys to locked rooms/areas. Other information warranting passing on to the Fire and Rescue Service may be identified by local management, through their detailed knowledge of the work.", "priority": "2"}, {"id": "fs144", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire and Rescue Service are Able to Gain Entry to the Premises", "ref": "FS9/I1/xx", "name": "Fire and Rescue Service are Able to Gain Entry to the Premises", "finding": "The fire and rescue service would be unable to approach the premises and gain access in the event of an emergency.", "reason": "It is crucial that fire and rescue service can approach the premises and gain access in the event of an emergency.", "recommendation": "Ensure that access points for the fire and recuse service/appliances are kept clear of obstructions.", "priority": "1"}, {"id": "fs145", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Fire Warden/Marshal Training \u2013 Sufficient Appointed/Trained Fire Wardens/Marshals", "ref": "FS9/J1/xx", "name": "Fire Warden/Marshal Training \u2013 Sufficient Appointed/Trained Fire Wardens/Marshals", "finding": "There were insufficient appointed/trained fire wardens/marshals.", "reason": "There must be sufficient competent persons to assist in undertaking fire safety preventive and protective measures.", "recommendation": "Ensure that there are a minimum of x fire marshals: X in the xxxxx; X to cover absences, i.e. holidays, long term absences, etc.", "priority": "3"}, {"id": "fs146", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Evacuation Chairs \u2013 Evidence of Training Provided", "ref": "FS9/K1/xx", "name": "Evacuation Chairs \u2013 Evidence of Training Provided", "finding": "Evacuation chairs had been located on upper floors; however, no training had been provided.", "reason": "Evacuation chairs are vital for ensuring a safe, efficient escape for everyone, including those with mobility impairments in the event of an emergency.", "recommendation": "Ensure that evacuation chair training is provided and that a program of refresher training is in place.", "priority": "3"}, d to workers and that records are maintained up to date.", "priority": "2"}, {"id": "fs152", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Maintenance and Testing Record \u2013 Maintenance Records for Lifts for Fire-Fighters and Disabled Passengers Available", "ref": "FS9/O1/xx", "name": "Maintenance and Testing Record \u2013 Maintenance Records for Lifts for Fire-Fighters and Disabled Passengers Available", "finding": "Up-to-date testing and maintenance records for lift(s) provided for use by firefighters or evacuation of disabled people (evacuation lifts) were not available.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that weekly/monthly testing, 6-monthly inspection, and annual inspection and testing records are readily available on site, i.e. fire logbook or via WRMonline.", "priority": "2"}, {"id": "fs153", "section": "9. Inadequate emergency plan including training and fire service unaware of the fire and unaware of building risks/ cannot gain access", "sectionIdx": 8, "topicRef": "9.", "topicName": "Maintenance and Testing Record \u2013 Readily Available on Site", "ref": "FS9/P1/xx", "name": "Maintenance and Testing Record \u2013 Readily Available on Site", "finding": "Up-to-date fire maintenance/testing records were not readily available on site.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that up-to-date fire maintenance/testing records are readily available on site, i.e. fire logbook or via WRMonline, for: Fire alarm system. Emergency lighting systems. Fire extinguishers. Fire hose reels. Fire shutter doors. Sprinkler systems. Gas suppression systems. Fire drills. Occurrences. Fire safety training.", "pri     if (!currentVisit.riskScores) currentVisit.riskScores = {};
    const cur = currentVisit.riskScores[key] || {};
    cur[field] = (cur[field] === value) ? null : value;
    currentVisit.riskScores[key] = cur;
    currentVisit.meta.updatedAt = new Date().toISOString();
    markDirty();
  }
  function setRiskScore(key, field, value) {
    setRiskScoreCore(key, field, value);
    renderChecklist();
  }
  function renderRiskBox(key, label) {
    const score = getRiskScore(key);
    const band = riskBand(score.severity, score.likelihood);
    return `
      <div class="hs-risk-box">
        <div class="hs-risk-box-head">Risk Rating${escapeHtml(label ? ' — ' + label : '')}</div>
        <div class="hs-risk-row">
          <span class="hs-risk-row-label">Severity</span>
          ${[1,2,3].map(v => `<button class="hs-risk-btn ${score.severity===v?'on':''}" data-risk-sev="${key}|${v}">${SEV_LABELS[v]}</button>`).join('')}
        </div>
        <div class="hs-risk-row">
          <span class="hs-risk-row-label">Likelihood</span>
          ${[1,2,3].map(v => `<button class="hs-risk-btn ${score.likelihood===v?'on':''}" data-risk-lik="${key}|${v}">${LIK_LABELS[v]}</button>`).join('')}
        </div>
        ${band
          ? `<div class="hs-risk-badge ${band.cls}">Risk Rating ${band.rating} — ${band.label}</div>`
          : `<div class="hs-risk-badge risk-none">Not yet scored</div>`}
      </div>`;
  }

  // ---------- Bulk actions: "Mark all Compliant" (H&S + Fire) and "Mark all N/A" (H&S only) ----------
  // Groups are keyed fresh each render since the underlying item-id lists only need to survive
  // until the next render rebuilds the DOM anyway.
  let bulkGroups = {};
  let bulkGroupCounter = 0;
  function renderBulkRow(type, itemIds, showNA) {
    const key = 'bulk_' + (bulkGroupCounter++);
    bulkGroups[key] = itemIds;
    return `
      <div class="hs-bulk-row">
        <button class="hs-bulk-btn" data-bulk-yes="${key}">\u2713 Mark all Compliant</button>
        ${showNA ? `<button class="hs-bulk-btn hs-bulk-na" data-bulk-na="${key}">\u2014 Mark all N/A</button>` : ''}
      </div>`;
  }
  function bulkSetStatus(key, status) {
    const itemIds = bulkGroups[key];
    if (!itemIds || !itemIds.length) return;
    const label = status === 'NA' ? 'N/A' : 'Compliant';
    if (!confirm(`Mark all ${itemIds.length} item${itemIds.length === 1 ? '' : 's'} here as ${label}? This will overwrite any existing answers for them.`)) return;
    itemIds.forEach(id => {
      const cur = currentVisit.answers[id] || { status: null, notes: '' };
      cur.status = status;
      if (status === 'NA') { cur.naReason = 'not_applicable'; cur.naNote = ''; }
      else { delete cur.naReason; delete cur.naNote; }
      currentVisit.answers[id] = cur;
      if (isLinked(id) && !isUnlinkedForVisit(id)) propagateToPartner(id);
    });
    currentVisit.meta.updatedAt = new Date().toISOString();
    markDirty();
    renderChecklist();
    toast(`Marked ${itemIds.length} item${itemIds.length === 1 ? '' : 's'} as ${label}`);
  }

  const root = document.getElementById('hs-app-root');
  let currentVisit = null; // {meta, answers}
  let currentTab = 'hs'; // which checklist tab is showing on the checklist screen
  let unsaved = false;
  let filterPriority1 = false;
  let filterNotCompliant = false;
  let filterIncomplete = false;
  let searchQuery = '';
  let openSections = new Set([0]);

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { day: '2-digit', month: 'short', year: 'numeric' });
  }
  function countAnswered(answers, scopeItems) {
    if (scopeItems) {
      return scopeItems.filter(i => answers[i.id] && answers[i.id].status).length;
    }
    return Object.values(answers || {}).filter(a => a && a.status).length;
  }
  function slug(s) {
    return String(s || 'visit').trim().replace(/[^a-z0-9]+/gi, '_').replace(/^_+|_+$/g, '') || 'visit';
  }

  function showScreen(id) {
    document.querySelectorAll('.hs-screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function markDirty() {
    unsaved = true;
    updateSaveIndicator();
  }
  function markClean() {
    unsaved = false;
    updateSaveIndicator();
  }
  function updateSaveIndicator() {
    const el = document.getElementById('hs-save-status');
    if (!el) return;
    el.innerHTML = unsaved
      ? '<span class="hs-unsaved-dot"></span>Unsaved changes — tap Save'
      : 'All changes saved to this file';
  }

  window.addEventListener('beforeunload', function (e) {
    if (unsaved) { e.preventDefault(); e.returnValue = ''; }
  });

  // ---------- Home ----------
  async function checkOfflineReady() {
    try {
      if (!('caches' in window)) return false;
      const names = await caches.keys();
      for (const name of names) {
        const cache = await caches.open(name);
        const match = (await cache.match('./index.html')) || (await cache.match('./'));
        if (match) return true;
      }
      return false;
    } catch (e) { return false; }
  }

  function renderHome() {
    document.getElementById('view-home').innerHTML = `
      <div class="hs-container">
        <div class="hs-home-header">
          <h1>Site Visit Checklist</h1>
          <p>Health &amp; Safety and Fire Safety in one visit — switch between them with the tabs on the checklist screen. Take photos against any item — nothing is sent anywhere, it all lives in files you save on this device.</p>
        </div>
        <div class="hs-offline-status pending" id="hs-offline-status">
          Checking offline status…
        </div>
        <button class="hs-new-visit-btn" id="btn-new-visit">+ Start new visit</button>
        <div class="hs-load-drop">
          Already have a saved visit file?
          <div style="margin-top:10px;">
            <label class="hs-btn-secondary hs-file-btn" style="display:inline-flex;">
              Load a saved visit (.json)
              <input type="file" id="file-load" accept="application/json,.json">
            </label>
          </div>
        </div>
        <div class="hs-visit-list">
          <div class="hs-empty">
            <div class="hs-empty-icon">💾</div>
            This version saves to files, not to an account — use <strong>Save progress</strong> in the checklist to download a file, and <strong>Load a saved visit</strong> above to pick it back up, even with no signal.
          </div>
        </div>
      </div>`;

    checkOfflineReady().then((ready) => {
      const el = document.getElementById('hs-offline-status');
      if (!el) return;
      el.className = 'hs-offline-status ' + (ready ? 'ready' : 'pending');
      el.textContent = ready
        ? '✓ Offline ready — this page will keep working with no signal.'
        : 'Setting up offline access… keep this open on Wi-Fi/data for a few seconds, then reload this page once before you rely on it with no signal.';
    });

    document.getElementById('btn-new-visit').onclick = () => { renderNewVisitForm(); showScreen('view-new'); };
    document.getElementById('file-load').onchange = handleFileLoad;
  }

  function handleFileLoad(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !parsed.meta || !parsed.answers) throw new Error('bad shape');
        currentVisit = parsed;
        if (!currentVisit.unlinkedPairs) currentVisit.unlinkedPairs = [];
        if (!currentVisit.riskScores) currentVisit.riskScores = {};
        currentTab = (parsed.meta.type && REPORT_TYPES[parsed.meta.type]) ? parsed.meta.type : 'hs';
        markClean();
        openSections = new Set([0]);
        renderChecklist();
        showScreen('view-checklist');
        toast('Visit loaded');
      } catch (err) {
        alert("Couldn't read that file — make sure it's a checklist file saved from this app.");
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ---------- New visit form ----------
  function renderNewVisitForm() {
    const clientOptions = CLIENTS_DATA.map(c => c.client);
    document.getElementById('view-new').innerHTML = `
      <div class="hs-container hs-form-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-cancel-new" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>New visit</strong>
        </div>
        <div class="hs-field">

          <select id="f-client-select">
            <option value="">— Not in list / type below —</option>

          </select>
        </div>
        <div class="hs-field"><label>Client name</label><input id="f-client-text" placeholder="e.g. Acme Retail Ltd"></div>
        <div class="hs-field" id="f-site-select-wrap" style="display:none;">

        </div>
      </div>`;
    document.getElementById('btn-cancel-new').onclick = () => showScreen('view-home');
    const clientSelect = document.getElementById('f-client-select');
    const clientText = document.getElementById('f-client-text');
    const siteSelectWrap = document.getElementById('f-site-select-wrap');

    const siteText = document.getElementById('f-site');
    const addressText = document.getElementById('f-address');
    clientSelect.onchange = () => {

      siteSelectWrap.style.display = 'block';
    };
    siteSelect.onchange = () => {
      const chosen = siteSelect.value;
      if (!chosen) return;
      siteText.value = chosen;
      const clientRec = CLIENTS_DATA.find(c => c.client === clientText.value);
      const siteRec = clientRec && clientRec.sites.find(s => s.name === chosen);
      if (siteRec) addressText.value = `${siteRec.address}, ${siteRec.postcode}`;
    };
    document.getElementById('btn-create-visit').onclick = () => {
      const client = clientText.value.trim();
      const siteName = siteText.value.trim();
      const site = siteName || client || 'Untitled visit';
      const address = addressText.value.trim();
      const date = document.getElementById('f-date').value || todayStr();
      const inspector = document.getElementById('f-inspector').value.trim();
      const reportRef = document.getElementById('f-reportref').value.trim();
      const id = 'v' + Date.now();
      const now = new Date().toISOString();
      const meta = { id, client, site, address, date, inspector, reportRef, createdAt: now, updatedAt: now };
      currentVisit = { meta, answers: {}, unlinkedPairs: [], riskScores: {} };
      currentTab = 'hs';
      markDirty();
      openSections = new Set([0]);
      renderChecklist();
      showScreen('view-checklist');
    };
  }

  // ---------- Checklist ----------
  function itemMatchesFilter(item) {
    const a = currentVisit.answers[item.id];
    if (filterPriority1 && item.priority !== '1') return false;
    if (filterNotCompliant && !(a && a.status === 'NC')) return false;
    if (filterIncomplete && a && a.status) return false;
    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      const haystack = [item.ref, item.name, item.finding, item.topicName].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  }

  function renderChecklist() {
    bulkGroups = {};
    bulkGroupCounter = 0;
    const type = currentTab;
    const items = getItems(type);
    const sections = getSections(type);
    const answered = countAnswered(currentVisit.answers, items);
    const total = items.length;
    const segs = sections.map(s => {
      const secAnswered = s.topics.flatMap(t=>t.items).filter(i => currentVisit.answers[i.id] && currentVisit.answers[i.id].status).length;
      const pct = (secAnswered / s.count) * 100;
      return `<div class="hs-progress-seg" style="width:${(s.count/total*100)}%"><div style="height:100%;width:${pct}%;background:#6FCF97;"></div></div>`;
    }).join('');

    const isSearching = !!searchQuery.trim();
    const riskLevel = RISK_LEVEL_BY_TYPE[type] || 'topic';
    let matchCount = 0;
    const sectionsHtml = sections.map(sec => {
      const isOpen = openSections.has(sec.idx) || isSearching;
      const secAnswered = sec.topics.flatMap(t=>t.items).filter(i => currentVisit.answers[i.id] && currentVisit.answers[i.id].status).length;
      const topicsHtml = sec.topics.map(topic => {
        const visItems = topic.items.filter(itemMatchesFilter);
        if (!visItems.length) return '';
        matchCount += visItems.length;
        const itemsHtml = visItems.map(item => renderItem(item)).join('');
        const label = topic.topicName ? `${topic.topicRef} · ${escapeHtml(topic.topicName)}` : topic.topicRef;
        const topicRiskBox = (riskLevel === 'topic' && !isSearching && topicNeedsRiskScoring(topic.topicRef))
          ? renderRiskBox(`${type}_topic_${topic.topicRef}`, null) : '';
        const topicBulkRow = (riskLevel === 'topic' && !isSearching)
          ? renderBulkRow(type, topic.items.map(i => i.id), true) : '';
        return `<div class="hs-topic-label">${label}</div>${topicBulkRow}${topicRiskBox}${itemsHtml}`;
      }).join('');
      if (!topicsHtml) return '';
      const sectionRiskBox = (riskLevel === 'section' && !isSearching)
        ? renderRiskBox(`${type}_sec_${sec.idx}`, null) : '';
      const sectionBulkRow = (riskLevel === 'section' && !isSearching)
        ? renderBulkRow(type, sec.topics.flatMap(t => t.items).map(i => i.id), false) : '';
      return `
      <div class="hs-section ${isOpen ? 'open' : ''}" data-sec="${sec.idx}">
        <button class="hs-section-head" data-toggle="${sec.idx}">
          <div>
            <div class="hs-section-title">${escapeHtml(sec.title)}</div>
            <div class="hs-section-count">${secAnswered}/${sec.count} completed</div>
          </div>
          <div class="hs-section-chevron">▸</div>
        </button>
        <div class="hs-section-body">${sectionRiskBox}${sectionBulkRow}${topicsHtml}</div>
      </div>`;
    }).join('');

    // Preserve focus + cursor position in the search box across re-renders, since
    // typing triggers a full innerHTML rebuild of this screen.
    const searchWasFocused = document.activeElement && document.activeElement.id === 'search-input';
    const searchCursor = searchWasFocused ? document.activeElement.selectionStart : null;

    document.getElementById('view-checklist').innerHTML = `
      <div class="hs-topbar">
        <div class="hs-topbar-row">
          <button class="hs-icon-btn" id="btn-home">←</button>
          <div style="flex:1;min-width:0;">
            <div class="hs-topbar-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(currentVisit.meta.site)}</div>
            <div class="hs-topbar-sub">${escapeHtml(fmtDate(currentVisit.meta.date))}${currentVisit.meta.inspector ? ' · ' + escapeHtml(currentVisit.meta.inspector) : ''}</div>
          </div>
          <button class="hs-icon-btn" id="btn-photos">📷</button>
          <button class="hs-icon-btn" id="btn-report">📄</button>
          <button class="hs-icon-btn" id="btn-export">↗</button>
        </div>
        <div class="hs-type-tabs" style="margin:12px 0 0;">
          ${Object.values(REPORT_TYPES).map((rt) => `
            <button class="hs-type-tab ${currentTab === rt.key ? 'on' : ''}" data-checklist-tab="${rt.key}">${escapeHtml(rt.label)}</button>
          `).join('')}
        </div>
        <div class="hs-progress-track">${segs}</div>
        <div class="hs-progress-label"><span>${answered} of ${total} items</span><span>${Math.round(answered/total*100)}%</span></div>
      </div>
      <div class="hs-container">
        <div class="hs-toolbar-row">
          <button class="hs-log-issue-btn${currentTab === 'fire' ? ' hs-log-issue-btn-compact' : ''}" id="btn-log-issue">🚩 Log an Issue</button>
          ${currentTab === 'fire' ? `<button class="hs-fsd-toolbar-btn" id="btn-fire-site-details-top">📋 Site Details${hasFireSiteDetails() ? ' ✓' : ''}</button>` : ''}
        </div>
        <div class="hs-search-row">
          <span class="hs-search-icon">🔎</span>
          <input type="text" id="search-input" class="hs-search-input" placeholder="Find a question…" value="${escapeHtml(searchQuery)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          ${isSearching ? `<button class="hs-search-clear" id="search-clear">✕</button>` : ''}
        </div>
        ${isSearching ? `<div class="hs-search-count">${matchCount} match${matchCount === 1 ? '' : 'es'}</div>` : ''}
        <div class="hs-filter-bar">
          <button class="hs-chip ${filterPriority1?'on':''}" id="chip-p1">Priority 1 only</button>
          <button class="hs-chip ${filterNotCompliant?'on':''}" id="chip-notcompliant">Not compliant only</button>
          <button class="hs-chip ${filterIncomplete?'on':''}" id="chip-incomplete">Unanswered only</button>
          <button class="hs-chip" id="chip-expand">Expand all</button>
          <button class="hs-chip" id="chip-collapse">Collapse all</button>
        </div>
        ${sectionsHtml || (isSearching ? `<div class="hs-empty">No items match "${escapeHtml(searchQuery.trim())}".</div>` : '')}
      </div>
      <div style="height:8px;"></div>
      `;

    const searchInput = document.getElementById('search-input');
    searchInput.oninput = () => { searchQuery = searchInput.value; renderChecklist(); };
    if (searchWasFocused) {
      searchInput.focus();
      if (searchCursor != null) searchInput.setSelectionRange(searchCursor, searchCursor);
    }
    const searchClear = document.getElementById('search-clear');
    if (searchClear) searchClear.onclick = () => { searchQuery = ''; renderChecklist(); };

    document.getElementById('btn-home').onclick = () => {
      if (unsaved && !confirm('You have unsaved changes. Leave without saving?')) return;
      showScreen('view-home');
      renderHome();
    };
    document.getElementById('btn-photos').onclick = () => { renderPhotosScreen(); showScreen('view-photos'); };
    document.getElementById('btn-log-issue').onclick = () => { openLogIssue(); showScreen('view-logissue'); };
    const fsdTopBtn = document.getElementById('btn-fire-site-details-top');
    if (fsdTopBtn) fsdTopBtn.onclick = () => { renderFireSiteDetailsScreen(); showScreen('view-fire-site-details'); };
    document.getElementById('btn-report').onclick = () => { renderReportPicker(); showScreen('view-report'); };
    document.getElementById('btn-export').onclick = () => { renderExport(); showScreen('view-export'); };
    document.querySelectorAll('[data-checklist-tab]').forEach((el) => {
      el.onclick = () => { currentTab = el.getAttribute('data-checklist-tab'); openSections = new Set([0]); renderChecklist(); };
    });
    document.getElementById('chip-p1').onclick = () => { filterPriority1 = !filterPriority1; renderChecklist(); };
    document.getElementById('chip-notcompliant').onclick = () => { filterNotCompliant = !filterNotCompliant; renderChecklist(); };
    document.getElementById('chip-incomplete').onclick = () => { filterIncomplete = !filterIncomplete; renderChecklist(); };
    document.getElementById('chip-expand').onclick = () => { openSections = new Set(sections.map(s=>s.idx)); renderChecklist(); };
    document.getElementById('chip-collapse').onclick = () => { openSections = new Set(); renderChecklist(); };
    document.querySelectorAll('[data-toggle]').forEach(el => {
      el.onclick = () => {
        const idx = parseInt(el.getAttribute('data-toggle'));
        if (openSections.has(idx)) openSections.delete(idx); else openSections.add(idx);
        renderChecklist();
      };
    });
    document.querySelectorAll('[data-status]').forEach(el => {
      el.onclick = () => {
        const id = el.getAttribute('data-item');
        const status = el.getAttribute('data-status');
        const cur = currentVisit.answers[id] || { status: null, notes: '' };
        const wasNC = cur.status === 'NC';
        const wasNA = cur.status === 'NA';
        cur.status = (cur.status === status) ? null : status;
        if (cur.status !== 'NA') { delete cur.naReason; delete cur.naNote; }
        currentVisit.answers[id] = cur;
        currentVisit.meta.updatedAt = new Date().toISOString();
        if (isLinked(id) && !isUnlinkedForVisit(id)) {
          propagateToPartner(id);
          toast('Also filled in on the linked item');
        }
        markDirty();
        renderChecklist();
        // Just turned Not Compliant on (not toggling it back off) — surface the actions editor
        // right away, same one used from Log an Issue, so it's consistent wherever an NC is raised.
        if (cur.status === 'NC' && !wasNC) openActionsModal(id);
        // Same idea for N/A — ask why, since "doesn't apply here" and "couldn't be assessed
        // because something upstream failed" mean very different things in the report.
        if (cur.status === 'NA' && !wasNA) openNaReasonModal(id);
      };
    });
    document.querySelectorAll('[data-notes]').forEach(el => {
      el.oninput = () => {
        const id = el.getAttribute('data-notes');
        const cur = currentVisit.answers[id] || { status: null, notes: '' };
        cur.notes = el.value;
        currentVisit.answers[id] = cur;
        currentVisit.meta.updatedAt = new Date().toISOString();
        if (isLinked(id) && !isUnlinkedForVisit(id)) propagateToPartner(id);
        markDirty();
      };
    });
    document.querySelectorAll('[data-unlink]').forEach(el => {
      el.onclick = () => {
        const id = el.getAttribute('data-unlink');
        setPairUnlinked(id, true);
        markDirty();
        renderChecklist();
        toast('Separated — these will no longer copy to each other');
      };
    });
    document.querySelectorAll('[data-relink]').forEach(el => {
      el.onclick = () => {
        const id = el.getAttribute('data-relink');
        setPairUnlinked(id, false);
        propagateToPartner(id);
        markDirty();
        renderChecklist();
        toast('Re-linked — this answer has been copied across');
      };
    });
    document.querySelectorAll('[data-risk-sev]').forEach(el => {
      el.onclick = () => {
        const [key, v] = el.getAttribute('data-risk-sev').split('|');
        setRiskScore(key, 'severity', parseInt(v));
      };
    });
    document.querySelectorAll('[data-risk-lik]').forEach(el => {
      el.onclick = () => {
        const [key, v] = el.getAttribute('data-risk-lik').split('|');
        setRiskScore(key, 'likelihood', parseInt(v));
      };
    });
    document.querySelectorAll('[data-bulk-yes]').forEach(el => {
      el.onclick = () => bulkSetStatus(el.getAttribute('data-bulk-yes'), 'C');
    });
    document.querySelectorAll('[data-bulk-na]').forEach(el => {
      el.onclick = () => bulkSetStatus(el.getAttribute('data-bulk-na'), 'NA');
    });
    document.querySelectorAll('[data-photo-input]').forEach(el => {
      el.onchange = (e) => {

  function bindPhotoThumbEvents(itemId) {

    bindPhotoThumbEvents(itemId);

    if (labelSpan) labelSpan.textContent = `📷 Add photo${count ? ` (${count})` : ''}`;

  function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const maxDim = 1400;
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = () => reject(new Error('image load failed'));
        img.src = reader.result;
      };
      reader.onerror = () => reject(new Error('file read failed'));
      reader.readAsDataURL(file);
    });
  }

  async function handlePhotoAdd(itemId, files) {
    const cur = currentVisit.answers[itemId] || { status: null, notes: '' };
    if (!cur.photos) cur.photos = [];
    toast(files.length > 1 ? 'Processing photos…' : 'Processing photo…');
    for (const file of files) {
      try {
        const dataUrl = await compressImage(file);
        cur.photos.push({ id: 'p' + Date.now() + Math.random().toString(36).slice(2, 7), dataUrl, takenAt: new Date().toISOString() });
      } catch (err) {
        console.error('photo processing failed', err);
      }
    }
    currentVisit.answers[itemId] = cur;
    currentVisit.meta.updatedAt = new Date().toISOString();
    if (isLinked(itemId) && !isUnlinkedForVisit(itemId)) {
      propagateToPartner(itemId);
      updateItemPhotos(LINK_PARTNER[itemId]);
    }
    markDirty();
    updateItemPhotos(itemId);
    toast('Photo added — tap Save progress to keep it');
    warnIfLarge();
  }

  function warnIfLarge() {
    try {
      const approxBytes = JSON.stringify(currentVisit).length;
      if (approxBytes > 15 * 1024 * 1024) {
        toast('Visit file is getting large — save now and consider fewer photos per item');
      }

  function openLightbox(itemId, idx) {
    const cur = currentVisit.answers[itemId];

  // ---------- Log an Issue: fast-entry picker (Section -> Topic -> Item, or search to jump straight there) ----------
  let logIssueSectionIdx = null;
  let logIssueTopicKey = null;
  let logIssueQuery = '';
  let logIssueDetailItemId = null;
  function openLogIssue() {
    logIssueSectionIdx = null;
    logIssueTopicKey = null;
    logIssueQuery = '';
    logIssueDetailItemId = null;
    renderLogIssue();
  }
  function logIssueMatches(item) {
    if (!logIssueQuery.trim()) return false;
    const q = logIssueQuery.trim().toLowerCase();
    const haystack = [item.ref, item.name, item.finding, item.topicName].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(q);
  }
  function renderLogIssue() {
    const sections = getSections(currentTab);
    const isSearching = !!logIssueQuery.trim();
    const searchWasFocused = document.activeElement && document.activeElement.id === 'logissue-search';
    const searchCursor = searchWasFocused ? document.activeElement.selectionStart : null;

    let crumb = `<button class="hs-li-crumb" data-li-crumb="root">${escapeHtml(getType(currentTab).label)}</button>`;
    let body = '';

    if (isSearching) {
      // Flat search across every item in the current tab, regardless of drill-down position.
      const matches = [];
      sections.forEach(sec => sec.topics.forEach(topic => topic.items.forEach(item => {
        if (logIssueMatches(item)) matches.push(item);
      })));
      body = matches.length ? `
        <div class="hs-li-list">
          ${matches.map(item => `
            <button class="hs-li-row" data-li-item="${item.id}">
              <div class="hs-li-row-main">
                <span class="hs-ref-badge mono">${escapeHtml(item.ref)}</span>
                <span>${escapeHtml(item.name)}</span>
              </div>
              <span class="hs-li-chevron">›</span>
            </button>`).join('')}
        </div>` : `<div class="hs-empty">No matches for "${escapeHtml(logIssueQuery.trim())}".</div>`;
    } else if (logIssueTopicKey) {
      // Level 2: items within one topic
      const [secIdx, topicRef] = logIssueTopicKey.split('|');
      const sec = sections[parseInt(secIdx)];
      const topic = sec && sec.topics.find(t => t.topicRef === topicRef);
      if (topic) {
        crumb += ` <span class="hs-li-sep">›</span> <button class="hs-li-crumb" data-li-crumb="section:${secIdx}">${escapeHtml(sec.title)}</button>`;
        crumb += ` <span class="hs-li-sep">›</span> <span class="hs-li-crumb-current">${escapeHtml(topic.topicName || topic.topicRef)}</span>`;
        body = `
          <div class="hs-li-list">
            ${topic.items.map(item => `
              <button class="hs-li-row" data-li-item="${item.id}">
                <div class="hs-li-row-main">
                  <span class="hs-ref-badge mono">${escapeHtml(item.ref)}</span>
                  <span>${escapeHtml(item.name)}</span>
                </div>
                <span class="hs-li-chevron">›</span>
              </button>`).join('')}
          </div>`;
      }
    } else if (logIssueSectionIdx !== null) {
      // Level 1: topics (keywords) within one section
      const sec = sections[logIssueSectionIdx];
      if (sec) {
        crumb += ` <span class="hs-li-sep">›</span> <span class="hs-li-crumb-current">${escapeHtml(sec.title)}</span>`;
        body = `
          <div class="hs-li-list">
            ${sec.topics.map(topic => `
              <button class="hs-li-row" data-li-topic="${logIssueSectionIdx}|${topic.topicRef}">
                <div class="hs-li-row-main">
                  <span>${escapeHtml(topic.topicName || topic.topicRef)}</span>
                  <span class="hs-li-count">${topic.items.length} item${topic.items.length===1?'':'s'}</span>
                </div>
                <span class="hs-li-chevron">›</span>
              </button>`).join('')}
          </div>`;
      }
    } else {
      // Level 0: sections
      body = `
        <div class="hs-li-list">
          ${sections.map((sec, idx) => `
            <button class="hs-li-row" data-li-section="${idx}">
              <div class="hs-li-row-main"><span>${escapeHtml(sec.title)}</span><span class="hs-li-count">${sec.count} items</span></div>
              <span class="hs-li-chevron">›</span>

    document.getElementById('view-logissue').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-logissue" style="background:var(--floor);color:var(--navy);">←</button>

        <p style="color:var(--sub);font-size:13px;margin-top:0;">Search for what you found, or browse by section. Tapping an item marks it Not Compliant, then asks for a photo or notes.</p>

          ${isSearching ? `<button class="hs-search-clear" id="logissue-search-clear">✕</button>` : ''}
        </div>
        <div class="hs-li-breadcrumb">${crumb}</div>
        ${body}
      </div>`;

    document.getElementById('btn-back-logissue').onclick = () => { renderChecklist(); showScreen('view-checklist'); };
    const searchInput = document.getElementById('logissue-search');
    searchInput.oninput = () => { logIssueQuery = searchInput.value; renderLogIssue(); };

  // ---------- Printable report (H&S / Fire Safety, each separate) ----------
  // Same auto-fill rule as agreed: any Not Compliant among a letter's mapped items -> No.

  function computeTick(itemIds) {

    if (!statuses.length) return null;

    return scored || anyAnswered;

  function reportTickCell(mark, want) {

  }
  // Lists every individual item that's Not Compliant within this topic/section — not grouped by
  // letter, since a letter can bundle several items and only some of them may have actually failed.
  const PRIORITY_COLOR = { '1': '#C0392B', '2': '#E0A100', '3': '#6B4FA0' };
  const PRIORITY_BG = { '1': '#FBEAE8', '2': '#FDF3DC', '3': '#F1ECFA' };
  function calcDeadline(priority) {
    const visitDate = currentVisit.meta.date;
    if (!visitDate || !priority) return null;
    const monthsByPriority = { '1': 1, '2': 3, '3': 6 };
    const months = monthsByPriority[priority] || 6;
    const d = new Date(visitDate + 'T00:00:00');
    if (isNaN(d)) return null;
    d.setMonth(d.getMonth() + months);
    return fmtDate(d.toISOString());
  }
  // The checklist library uses "xx" as a placeholder year in Fire Safety reference codes
  // (e.g. "FS1/I2/xx") since the same library is reused every year. When an action is actually
  // raised on a real visit, swap that placeholder for the visit's own two-digit year, so it reads
  // "FS1/I2/26" for a 2026 visit, "FS1/I2/27" for 2027, and so on automatically.
  function substituteRefYear(ref) {
    const visitDate = currentVisit.meta.date;
    if (!visitDate) return ref;
    const d = new Date(visitDate + 'T00:00:00');
    if (isNaN(d)) return ref;
    const yy = String(d.getFullYear()).slice(-2);
    return ref.replace(/xx/gi, yy);

  // Same year, but for building a reference string from scratch rather than substituting into
  // an existing "xx" placeholder.
  function visitYearSuffix() {
    const visitDate = currentVisit.meta.date;
    if (!visitDate) return '';
    const d = new Date(visitDate + 'T00:00:00');
    if (isNaN(d)) return '';

  function splitToLines(text) {
    if (!text) return [];
    // Break a recommendation paragraph into separate action lines, matching the
    // template's line-per-instruction style, without mangling abbreviations like "e.g."
    // Two split points: a full stop before a new sentence, or "; and " joining two actions
    // into one sentence (keeps the semicolon on the first line, drops the "and").
    // Deliberately doesn't split on "; or " (alternatives, not separate actions) or other
    // semicolon uses (citations, sub-clauses within one instruction).
    return text.split(/(?:(?<=[a-z0-9)])\.\s+(?=[A-Z]))|(?:(?<=;)\s+and\s+(?=[A-Z]))/)
      .map(s => s.trim())
      .filter(Boolean)

      <p>Risk assessment is the process whereby hazards are identified on site. The likelihood of the hazard resulting in harm is then assessed for each of the hazards. The rating of risk can then be used to prioritise controls which will reduce the risk of injury to a tolerable level. Once the hazards have been identified, the first consideration is to determine whether it is possible to remove the hazard completely. Where it is not possible to remove the hazard then it must be controlled.</p>

      <p class="rp-protocol-example">For example: Likelihood of Injury = 2, Likely Severity of Injury = 3, Risk Rating = 6 (Substantial Risk).</p>
      <p><strong>Likelihood of Injury / Adverse Occurrence</strong></p>

  function buildFireBackSectionHtml(sectionNum, actionPlanNum) {
    return `
      <div class="rp-pagebreak"></div>

      <p><strong>Introduction</strong><br>

      <p><strong>Fire hazard</strong> - source or situation with potential to result in a fire.<br>

      <p>The fire risk assessment is a systematic and structured assessment of the fire risk in the premises for the purpose of:</p>

      <p>Any additional fire precautions required are set out in the Fire Action Plan, which forms part of the documented fire risk assessment. The objective of the fire action plan is to set out measures which will ensure that the fire risk is reduced to, or maintained at, a tolerable level.</p>
      <p>In carrying out the fire risk assessment, WRM considers the following:</p>
      <ul class="rp-protocol-list">
        <li><strong>Fire prevention measures</strong> - measures to prevent the outbreak of fire.</li>
        <li><strong>Fire protection measures</strong> - design features, systems, equipment or structural measures to reduce danger to people and property if fire occurs.</li>
        <li><strong>Components of fire safety management</strong> - task(s) carried out by a defined individual or individuals with appropriate powers and resources to ensure that the fire safety systems (passive, active and procedural) within the building are working properly at all times.</li>
      </ul>
      <p>WRM's fire risk assessment process comprises nine steps (based on PAS 79-1:2020 Fire Risk Assessment — Guidance and a Recommended Methodology):</p>
      <ul class="rp-protocol-list">

        <li><strong>Step 3</strong> - make a (subjective) assessment of the likelihood of fire, based primarily on Step 2, taking into account any relevant information from Step 1.</li>
        <li><strong>Step 4</strong> - determine the physical fire protection measures relevant to the protection of people in the event of fire.</li>

        <li><strong>Step 6</strong> - make a (subjective) assessment of the likely consequences to occupants in the event of fire.</li>
        <li><strong>Step 7</strong> - assess the fire risk and decide if it is tolerable, by combining the likelihood of fire and the consequences of fire.</li>

      <p><strong>Likelihood of fire</strong></p>
      <ul class="rp-protocol-list">
        <li><strong>Low:</strong> Unusually low likelihood of fire as a result of negligible potential sources of ignition.</li>
        <li><strong>Medium:</strong> Normal fire hazards (e.g. potential ignition sources) for this type of occupancy, generally subject to appropriate controls (other than minor shortcomings).</li>
        <li><strong>High:</strong> Lack of adequate controls applied to one or more significant fire hazards, such as to result in a significant increase in the likelihood of fire.</li>
      </ul>
      <p><strong>Potential consequences of fire</strong></p>
      <ul class="rp-protocol-list">
        <li><strong>Slight harm:</strong> Outbreak of fire unlikely to result in serious injury or death of any occupant (other than an occupant sleeping in a room in which a fire occurs).</li>
        <li><strong>Moderate harm:</strong> Outbreak of fire could foreseeably result in injury (including serious injury) of one or more occupants, but is unlikely to result in multiple fatalities.</li>
        <li><strong>Extreme harm:</strong> Significant potential for serious injury or death of one or more occupants.</li>
      </ul>
      <p>A suitable risk-based control plan should involve effort and urgency proportional to risk:</p>
      <table class="rp-protocol-controlplan">
        <tr><td class="hdr">Risk level</td><td class="hdr">Action and timescale</td></tr>
        <tr><td style="background:${RISK_MATRIX['1-1'].color};color:#fff;font-weight:700;">Trivial</td><td>No action is required, and no detailed records need be kept.</td></tr>
        <tr><td style="background:${RISK_MATRIX['2-1'].color};color:#fff;font-weight:700;">Tolerable</td><td>No major additional controls required. However, there might be a need for improvements that involve minor or limited cost.</td></tr>
        <tr><td style="background:${RISK_MATRIX['3-1'].color};color:#fff;font-weight:700;">Moderate</td><td>It is essential that efforts are made to reduce the risk. Risk reduction measures should be implemented within a defined time period. Where moderate risk is associated with consequences that constitute extreme harm, further assessment might be required to establish more precisely the likelihood of harm as a basis for determining the priority for improved control measures.</td></tr>
        <tr><td style="background:${RISK_MATRIX['3-2'].color};color:#fff;font-weight:700;">Substantial</td><td>Considerable resources might have to be allocated to reduce the risk. If the building is unoccupied, it should not be occupied until the risk has been reduced. If the building is occupied, urgent action should be taken.</td></tr>
        <tr><td style="background:${RISK_MATRIX['3-3'].color};color:#fff;font-weight:700;">Intolerable</td><td>Building (or relevant area) should not be occupied until the risk is reduced.</td></tr>
      </table>
      <div class="rp-pagebreak"></div>
      <p><strong>Prioritising the fire action plan</strong><br>
      The final stage is to prioritise the advice detailed in Section ${actionPlanNum} of this report, using the timescales below.</p>
      ${buildPriorityTableHtml([
        { n: '1', label: '(High)', due: '1 month', text: 'Requires immediate remedial action (for Intolerable/Substantial Risks). The fire safety issue requires immediate action. If it is not possible to reduce the risk, work/access must be prohibited.' },
        { n: '2', label: '(Medium)', due: '3 months', text: 'Requires remedial action within 3 months (for Moderate Risks). Some additional fire safety controls are necessary within the defined timescale. The introduction of interim control measures needs to be evaluated. Regular monitoring of existing controls is essential.' },
        { n: '3', label: '(Low)', due: '6 months', text: 'Requires additional controls in due course (for Tolerable Risks). Consideration may be given to a more cost-effective risk-reducing solution. Regular monitoring of existing fire safety controls is essential.' },
      ])}
      <p class="rp-protocol-note"><strong>Note:</strong> although the purpose of this section is to place the fire risk in context, the above approach to risk assessment is subjective and for guidance only. All hazards and deficiencies identified in this report should be addressed by implementing the recommendations contained in Section ${actionPlanNum} of this report (Compliance Action Plan). The fire risk assessment should be repeated regularly.</p>
    `;
  }

  function buildReportHtml(type) {
    const m = currentVisit.meta;
    const label = escapeHtml(getType(type).label);
    const seen = new Set();
    const naSeen = new Set();
    let assessmentHtml = '';
    let actionCards = '';
    let actionCount = 0;
    let included = 0;
    const priorityCounts = { '1': 0, '2': 0, '3': 0 };
    const notApplicableList = [];
    const unableList = [];
    const yy = visitYearSuffix();
    const entries = Object.entries((type === 'hs' ? REPORT_MAP.hs : REPORT_MAP.fire) || {}).sort((a, b) => naturalRefSort(a[0], b[0]));
    entries.forEach(([key, def]) => {
      const riskKey = type === 'hs' ? `hs_topic_${key}` : `fire_${key}`;
      if (!reportSectionHasContent(def, riskKey)) return;
      included++;
      const includeInAssessment = type === 'fire' || topicNeedsRiskScoring(key);
      if (includeInAssessment) {
        assessmentHtml += type === 'hs' ? buildHsReportSectionHtml(key, def) : buildFireReportSectionHtml(key, def);
      }
      const refPrefix = type === 'hs' ? `HS/${key}` : `FS${def.sectionNumber}`;
      collectNcItems(def, seen).forEach(({ item, answer, letter }) => {
        actionCards += renderActionCard(type, item, answer, letter, refPrefix);
        actionCount++;
        if (item.priority && priorityCounts.hasOwnProperty(item.priority)) priorityCounts[item.priority]++;
      });
      collectNaItems(def, naSeen).forEach(({ item, answer, letter }) => {
        const refDisplay = `${refPrefix}/${letter}${yy ? '/' + yy : ''}`;
        if (answer.naReason === 'unable_to_assess') {
          unableList.push({ item, refDisplay, note: answer.naNote });
        } else {
          notApplicableList.push({ item, refDisplay });
        }
      });
    });

    if (!included) {
      return { included: 0, html: `
        ${buildLetterhead(m, label)}
        <div class="rp-empty">Nothing scored or answered yet for this report.</div>
      ` };
    }

    const showFireFront = type === 'fire' && hasFireSiteDetails();
    const offset = showFireFront ? 2 : 0;
    const actionPlanNum = 1 + offset;
    const riskAssessmentNum = 2 + offset;
    const protocolNum = 3 + offset;
    const frontSections = showFireFront ? `${buildFireExecSummaryHtml(1)}${buildFireSiteDescriptionHtml(2)}` : '';

    const section1 = actionCount ? `
      ${showFireFront ? '<div class="rp-pagebreak"></div>' : ''}
      <div class="rp-section-title">Section ${actionPlanNum} - ${label} Report — Compliance Action Plan</div>
      <div class="rp-actions">${actionCards}</div>
    ` : '';
    const naExplained = buildNaExplainedHtml(notApplicableList, unableList);
    let section2 = '';
    if (assessmentHtml) {
      const naPointer = naExplained ? `<div class="rp-na-pointer">Any N/A items below are explained at the end of this section.</div>` : '';
      section2 = `
        ${(section1 || showFireFront) ? '<div class="rp-pagebreak"></div>' : ''}
        <div class="rp-section-title">${(actionCount || showFireFront) ? `Section ${riskAssessmentNum} - ` : ''}${label} Report — Risk Assessment</div>
        <div class="rp-subtitle">${escapeHtml(fmtDate(m.date))}${m.inspector ? ' · ' + escapeHtml(m.inspector) : ''}${m.reportRef ? ' · ' + escapeHtml(m.reportRef) : ''}</div>
        ${naPointer}
        ${assessmentHtml}
        ${naExplained}
      `;
    } else if (naExplained) {
      // No risk-eligible hazard content at all this visit, but there's still something to
      // explain (e.g. only Policy/Organisation items were touched) — show it on its own.
      section2 = `${(section1 || showFireFront) ? '<div class="rp-pagebreak"></div>' : ''}${naExplained}`;
    }
    const bodyEmpty = !section1 && !section2 && !showFireFront;

    const backSection = bodyEmpty ? '' : (type === 'hs' ? buildHsBackSectionHtml(protocolNum, actionPlanNum) : buildFireBackSectionHtml(protocolNum, actionPlanNum));

    return { included, html: `
      ${buildLetterhead(m, label)}
      ${buildActionSummaryHtml(priorityCounts, actionCount)}
      ${frontSections}
      ${section1}
      ${section2}
      ${bodyEmpty ? '<div class="rp-empty">Everything checked so far is compliant or doesn\'t need a risk assessment — nothing to show yet.</div>' : ''}
      ${backSection}
    ` };
  }

  function buildExportText() {
    const m = currentVisit.meta;
    let out = `SITE VISIT CHECKLIST\n`;
    out += `Site: ${m.site}\n`;
    if (m.address) out += `Address: ${m.address}\n`;
    out += `Date: ${fmtDate(m.date)}\n`;
    if (m.inspector) out += `Inspector: ${m.inspector}\n`;
    if (m.reportRef) out += `WRMonline report ref: ${m.reportRef}\n`;

    Object.values(REPORT_TYPES).forEach((rt) => {
      const riskLevel = RISK_LEVEL_BY_TYPE[rt.key] || 'topic';
      const answered = countAnswered(currentVisit.answers, rt.items);
      const hasItemContent = rt.items.some(i => hasAnyInput(currentVisit.answers[i.id]));
      const hasRiskContent = Object.keys(currentVisit.riskScores || {}).some(k => k.indexOf(rt.key + '_') === 0);
      if (!hasItemContent && !hasRiskContent) return;
      out += `\n${'='.repeat(50)}\n${rt.label.toUpperCase()} — Completed: ${answered}/${rt.items.length}\n${'='.repeat(50)}\n`;
      rt.sections.forEach(sec => {
        const secRiskKey = `${rt.key}_sec_${sec.idx}`;
        const secRiskScore = getRiskScore(secRiskKey);
        const secRisk = riskLevel === 'section' ? riskBand(secRiskScore.severity, secRiskScore.likelihood) : null;
        const secItems = sec.topics.flatMap(t=>t.items).filter(i => hasAnyInput(currentVisit.answers[i.id]));
        const hasAnyTopicRisk = riskLevel === 'topic' && sec.topics.some(t => {
          const s = getRiskScore(`${rt.key}_topic_${t.topicRef}`);
          return !!riskBand(s.severity, s.likelihood);
        });
        if (!secItems.length && !secRisk && !hasAnyTopicRisk) return;
        out += `\n${sec.title}\n${'-'.repeat(sec.title.length)}\n`;
        if (secRisk) out += `Risk Rating: ${secRisk.rating} — ${secRisk.label}\n`;
        sec.topics.forEach(topic => {
          const topicRiskKey = `${rt.key}_topic_${topic.topicRef}`;
          const topicRiskScore = getRiskScore(topicRiskKey);
          const topicRisk = riskLevel === 'topic' ? riskBand(topicRiskScore.severity, topicRiskScore.likelihood) : null;
          const items = topic.items.filter(i => hasAnyInput(currentVisit.answers[i.id]));
          if (!items.length && !topicRisk) return;
          if (topicRisk) out += `\n[${topic.topicRef}] Risk Rating: ${topicRisk.rating} — ${topicRisk.label}\n`;
          items.forEach(item => {
            const a = currentVisit.answers[item.id];
            const statusLabel = a.status === 'C' ? 'COMPLIANT' : a.status === 'NC' ? 'NOT COMPLIANT' : a.status === 'NA' ? 'N/A' : 'NOT SET';
            let linkNote = '';
            if (isLinked(item.id)) {
              const partner = findItemById(LINK_PARTNER[item.id]);
              if (partner) linkNote = ` [linked with ${partner.ref} on ${getType(itemTypeOf(partner.id)).label}]`;
            }
            out += `\n[${item.ref}] ${item.name} (P${item.priority||'-'}) — ${statusLabel}${linkNote}\n`;
            if (a.notes && a.notes.trim()) out += `  Notes: ${a.notes.trim()}\n`;
            if (a.photos && a.photos.length) out += `  Photos: ${a.photos.length} attached (open the Photos tab or the saved visit file to view)\n`;
          });
        });
      });
    });
    return out;
  }
  function hasAnyInput(a) {
    return !!(a && (a.status || (a.notes && a.notes.trim()) || (a.photos && a.photos.length)));
  }

  // ---------- Report screens ----------
  // Safety net for the Log an Issue flow: even with the risk box built into Add Details, catch
  // anything that still slipped through — a non-compliance exists but its topic/section has no
  // complete Severity + Likelihood score.
  function findMissingRiskScores(type) {
    const missing = [];
    const entries = Object.entries((type === 'hs' ? REPORT_MAP.hs : REPORT_MAP.fire) || {}).sort((a, b) => naturalRefSort(a[0], b[0]));
    entries.forEach(([key, def]) => {
      if (type === 'hs' && !topicNeedsRiskScoring(key)) return;
      const hasNC = def.requirements.some(req => req.itemIds.some(id => currentVisit.answers[id] && currentVisit.answers[id].status === 'NC'));
      if (!hasNC) return;
      const riskKey = type === 'hs' ? `hs_topic_${key}` : `fire_${key}`;
      const score = getRiskScore(riskKey);
      if (!score.severity || !score.likelihood) {
        missing.push(type === 'hs' ? def.topicName : def.sectionTitle);
      }
    });
    return missing;
  }
  function renderReportPicker() {
    const hsCount = Object.entries(REPORT_MAP.hs || {}).filter(([ref, def]) => reportSectionHasContent(def, `hs_topic_${ref}`)).length;
    const fireCount = Object.entries(REPORT_MAP.fire || {}).filter(([key, def]) => reportSectionHasContent(def, `fire_${key}`)).length;
    const hsMissing = findMissingRiskScores('hs');
    const fireMissing = findMissingRiskScores('fire');
    const missingWarning = (hsMissing.length || fireMissing.length) ? `
      <div class="hs-risk-warning">
        <div class="hs-risk-warning-title">⚠️ Missing risk scores</div>
        <div class="hs-risk-warning-text">These have a non-compliance logged but no Severity/Likelihood score yet — worth going back to score before you finish:</div>
        ${hsMissing.length ? `<div class="hs-risk-warning-group"><strong>H&amp;S:</strong> ${hsMissing.map(n=>escapeHtml(n)).join(', ')}</div>` : ''}
        ${fireMissing.length ? `<div class="hs-risk-warning-group"><strong>Fire Safety:</strong> ${fireMissing.map(n=>escapeHtml(n)).join(', ')}</div>` : ''}
      </div>` : '';
    document.getElementById('view-report').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-checklist-report" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>Report</strong>
        </div>
        <p style="color:var(--sub);font-size:13px;margin-top:0;">Builds a separate, print-ready report for each checklist, auto-filled from the answers and risk scores on this visit. Only sections with data are included.</p>
        ${missingWarning}
        <button class="hs-new-visit-btn" id="btn-report-hs" style="margin-bottom:12px;">Health &amp; Safety Report ${hsCount ? `(${hsCount} section${hsCount===1?'':'s'})` : '(nothing scored yet)'}</button>
        <button class="hs-new-visit-btn" id="btn-report-fire">Fire Safety Report ${fireCount ? `(${fireCount} section${fireCount===1?'':'s'})` : '(nothing scored yet)'}</button>
      </div>`;
    document.getElementById('btn-back-checklist-report').onclick = () => showScreen('view-checklist');
    document.getElementById('btn-report-hs').onclick = () => renderReportView('hs');
    document.getElementById('btn-report-fire').onclick = () => renderReportView('fire');
  }
  function renderReportView(type) {
    const { included, html } = buildReportHtml(type);
    document.getElementById('view-report').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-report-picker" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>${escapeHtml(getType(type).label)} Report</strong>
          <button class="hs-bottombar-btn" id="btn-print-report" style="margin-left:auto;">Print / Save as PDF</button>
        </div>
        <div id="rp-container">${html}</div>
      </div>`;
    document.getElementById('btn-back-report-picker').onclick = () => renderReportPicker();
    document.getElementById('btn-print-report').onclick = () => window.print();
  }

  function renderExport() {
    const text = buildExportText();
    document.getElementById('view-export').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-checklist" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>Export summary</strong>
        </div>
        <p style="color:var(--sub);font-size:13px;margin-top:0;">Copy this into an email, notes app, or straight into WRMonline while you write up the report. This is a read-only summary — use "Save progress" on the checklist screen to keep an editable copy.</p>
        <div class="hs-export-actions">
          <button class="hs-btn-primary" id="btn-copy">Copy to clipboard</button>
          <button class="hs-btn-secondary" id="btn-download">Download .txt</button>
        </div>
        <textarea class="hs-export-text" id="export-text" readonly>${escapeHtml(text)}</textarea>
      </div>`;
    document.getElementById('btn-back-checklist').onclick = () => showScreen('view-checklist');
    document.getElementById('btn-copy').onclick = async () => {
      try {
        await navigator.clipboard.writeText(text);
        toast('Copied to clipboard');
      } catch (e) {
        const ta = document.getElementById('export-text');
        ta.select(); document.execCommand('copy');
        toast('Copied to clipboard');
      }
    };
    document.getElementById('btn-download').onclick = () => {
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = slug(currentVisit.meta.site) + '_summary.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('Downloaded');
    };
  }

  function toast(msg) {
    let t = document.getElementById('hs-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'hs-toast';
      t.className = 'hs-toast';
      document.getElementById('hs-app-root').appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ---------- Offline caching (Service Worker) ----------
  // Makes the page work with no connection after it's been opened once while online.
  // Registers a real sw.js file that must sit alongside this HTML file on the server.
  let offlineReady = false;
  function setupOfflineCache() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('./sw.js', { scope: './', updateViaCache: 'none' }).then(() => {
      offlineReady = true;
    }).catch((err) => {
      offlineReady = false;
      console.warn('Offline cache unavailable:', err);
    });
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      const homeVisible = document.getElementById('view-home') && document.getElementById('view-home').classList.contains('active');
      if (homeVisible) renderHome();
    });
  }

  // ---------- Boot ----------
  function boot() {
    root.innerHTML = `
      <div id="view-home" class="hs-screen active"></div>
      <div id="view-new" class="hs-screen"></div>
      <div id="view-checklist" class="hs-screen"></div>
      <div id="view-photos" class="hs-screen"></div>
      <div id="view-logissue" class="hs-screen"></div>
      <div id="view-fire-site-details" class="hs-screen"></div>
      <div id="view-report" class="hs-screen"></div>
      <div id="view-export" class="hs-screen"></div>
    `;
    setupOfflineCache();
    renderHome();
    renderNewVisitForm();
  }
  boot();
})();
</script>

</body>
</html>
