<body style="margin:0;padding:0;">
<div id="hs-app-root"></div>
<style>
  #hs-app-root, #hs-app-root * { box-sizing: border-box; }
  #hs-app-root {
    --navy: #1F3864;
    --navy-deep: #142544;
    --ink: #1C2530;
    --sub: #5B6472;
    --line: #E3E6EB;
    --paper: #FFFFFF;
    --floor: #F4F6F9;
    --ok: #237A4F;
    --ok-bg: #E6F4EC;
    --bad: #B2382C;
    --bad-bg: #FBEAE8;
    --na: #7A8391;
    --na-bg: #EEF0F3;
    --p1: #B2382C;
    --p2: #B8791A;
    --p3: #5B6472;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--floor);
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.4;
  }
  #hs-app-root .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
  #hs-app-root button { font-family: inherit; cursor: pointer; }
  #hs-app-root input, #hs-app-root textarea { font-family: inherit; font-size: 15px; }

  /* ---------- Top bar ---------- */
  .hs-topbar {
    position: sticky; top: 0; z-index: 30;
    background: var(--navy);
    color: #fff;
    padding: 14px 16px 12px;
  }
  .hs-topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .hs-topbar-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .hs-topbar-sub { font-size: 12px; color: #C3CEE3; margin-top: 1px; }
  .hs-icon-btn {
    background: rgba(255,255,255,0.14); border: none; color: #fff;
    width: 34px; height: 34px; border-radius: 9px; font-size: 15px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .hs-icon-btn:active { background: rgba(255,255,255,0.28); }
  .hs-progress-track {
    margin-top: 12px; height: 7px; border-radius: 4px; background: rgba(255,255,255,0.18);
    overflow: hidden; display: flex;
  }
  .hs-progress-seg { height: 100%; background: #6FCF97; transition: width .25s ease; }
  .hs-progress-label { font-size: 11.5px; color: #C3CEE3; margin-top: 6px; display: flex; justify-content: space-between; }

  /* ---------- Generic screens ---------- */
  .hs-screen { display: none; padding-bottom: 90px; min-height: 100vh; }
  .hs-screen.active { display: block; }
  .hs-container { max-width: 720px; margin: 0 auto; }

  /* ---------- Home / visit list ---------- */
  .hs-home-header { padding: 28px 20px 8px; }
  .hs-home-header h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .hs-home-header p { margin: 0; color: var(--sub); font-size: 14px; }
  .hs-new-visit-btn {
    margin: 16px 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--navy); color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 15.5px; font-weight: 600; width: calc(100% - 40px);
  }
  .hs-new-visit-btn:active { background: var(--navy-deep); }
  .hs-visit-list { padding: 4px 20px; }
  .hs-visit-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .hs-visit-card-main { flex: 1; min-width: 0; }
  .hs-visit-card-site { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hs-visit-card-meta { font-size: 12.5px; color: var(--sub); margin-top: 2px; }
  .hs-visit-ring { flex-shrink: 0; text-align: center; }
  .hs-ring-pct { font-size: 12.5px; font-weight: 700; color: var(--navy); }
  .hs-ring-label { font-size: 9.5px; color: var(--sub); }
  .hs-visit-del { background: none; border: none; color: var(--bad); font-size: 12.5px; padding: 6px; flex-shrink: 0; }
  .hs-empty { padding: 40px 30px; text-align: center; color: var(--sub); font-size: 14px; }
  .hs-empty-icon { font-size: 30px; margin-bottom: 10px; }

  /* ---------- New visit form ---------- */
  .hs-form-wrap { padding: 20px; }
  .hs-field { margin-bottom: 16px; }
  .hs-field label { display: block; font-size: 12.5px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .hs-field input {
    width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px 13px;
    font-size: 16px; background: var(--paper); color: var(--ink);
  }
  .hs-field input:focus { outline: none; border-color: var(--navy); }
  .hs-form-actions { display: flex; gap: 10px; margin-top: 22px; }
  .hs-btn-primary {
    flex: 1; background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 13px; font-size: 15px; font-weight: 600;
  }
  .hs-btn-secondary {
    background: var(--paper); color: var(--navy); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 18px; font-size: 15px; font-weight: 600;
  }

  /* ---------- Checklist screen ---------- */
  .hs-meta-strip {
    background: #EAF0FB; padding: 10px 16px; font-size: 12.5px; color: var(--navy-deep);
    display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .hs-filter-bar {
    display: flex; gap: 8px; padding: 12px 16px 4px; overflow-x: auto;
  }
  .hs-chip {
    border: 1px solid var(--line); background: var(--paper); color: var(--sub);
    border-radius: 999px; padding: 7px 13px; font-size: 12.5px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }
  .hs-chip.on { background: var(--navy); color: #fff; border-color: var(--navy); }

  .hs-section { margin: 14px 16px 0; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: var(--paper); }
  .hs-section-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 13px 15px; background: var(--paper); border: none; width: 100%; text-align: left;
  }
  .hs-section-title { font-weight: 700; font-size: 14.5px; color: var(--ink); }
  .hs-section-count { font-size: 12px; color: var(--sub); margin-top: 1px; }
  .hs-section-chevron { color: var(--sub); font-size: 13px; transition: transform .18s ease; flex-shrink: 0; }
  .hs-section.open .hs-section-chevron { transform: rotate(90deg); }
  .hs-section-body { display: none; border-top: 1px solid var(--line); }
  .hs-section.open .hs-section-body { display: block; }

  .hs-topic-label {
    padding: 10px 15px 4px; font-size: 11.5px; font-weight: 700; color: var(--navy);
    text-transform: uppercase; letter-spacing: .04em; background: #F8FAFD;
  }

  .hs-item { padding: 12px 15px; border-top: 1px solid var(--line); }
  .hs-item:first-of-type { border-top: none; }
  .hs-item-top { display: flex; align-items: flex-start; gap: 8px; }
  .hs-item-badges { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; padding-top: 1px; }
  .hs-ref-badge { font-size: 10px; font-weight: 700; color: var(--sub); background: var(--floor); border-radius: 5px; padding: 2px 5px; }
  .hs-p-badge { font-size: 9.5px; font-weight: 700; color: #fff; border-radius: 5px; padding: 1px 5px; }
  .hs-item-text { flex: 1; font-size: 14px; line-height: 1.35; padding-top: 1px; }
  .hs-item-finding { font-size: 12px; color: var(--sub); font-style: italic; margin-top: 4px; line-height: 1.35; }
  .hs-item-finding strong { font-style: normal; font-weight: 700; }
  .hs-status-row { display: flex; gap: 6px; margin-top: 10px; }
  .hs-status-btn {
    flex: 1; border: 1px solid var(--line); background: var(--paper); border-radius: 8px;
    padding: 8px 4px; font-size: 12px; font-weight: 700; color: var(--sub); text-align: center;
  }
  .hs-status-btn.on-c { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
  .hs-status-btn.on-nc { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); }
  .hs-status-btn.on-na { background: var(--na-bg); border-color: var(--na); color: var(--na); }
  .hs-notes {
    margin-top: 8px; width: 100%; border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-size: 13.5px; resize: vertical; min-height: 34px; background: var(--floor);
    color: var(--ink);
  }
  .hs-notes:focus { outline: none; border-color: var(--navy); background: var(--paper); }
  .hs-notes::placeholder { color: #A5ACB6; }

  /* ---------- Bottom bar ---------- */
  .hs-bottombar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    background: var(--paper); border-top: 1px solid var(--line);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; align-items: center;
  }
  .hs-save-status { font-size: 11.5px; color: var(--sub); flex: 1; }
  .hs-bottombar-btn {
    background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 11px 16px; font-size: 13.5px; font-weight: 700;
  }
  .hs-bottombar-btn.ghost { background: var(--paper); color: var(--navy); border: 1px solid var(--line); }

  /* ---------- Export screen ---------- */
  .hs-export-wrap { padding: 18px 18px 30px; }
  .hs-export-actions { display: flex; gap: 10px; margin-bottom: 14px; }
  .hs-export-text {
    width: 100%; min-height: 55vh; border: 1px solid var(--line); border-radius: 10px;
    padding: 12px; font-size: 12.5px; background: var(--paper); color: var(--ink);
    white-space: pre-wrap;
  }
  .hs-toast {
    position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--ink); color: #fff; padding: 9px 16px; border-radius: 999px; font-size: 12.5px;
    opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 50;
  }
  .hs-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hs-back-row { display: flex; align-items: center; gap: 8px; padding: 4px 4px 8px; }
</style>

<script>
(function(){
  function buildSections(items) {
    const order = [...new Set(items.map(i => i.section))];
    return order.map((title, sIdx) => {
      const secItems = items.filter(i => i.section === title);
      const topicOrder = [...new Set(secItems.map(i => i.topicRef + '||' + i.topicName))];
      const topics = topicOrder.map(key => {
        const [topicRef, topicName] = key.split('||');
        return { topicRef, topicName, items: secItems.filter(i => i.topicRef === topicRef && i.topicName === topicName) };
      });
      return { idx: sIdx, title, topics, count: secItems.length };
    });
  }

  const REPORT_TYPES = {

    fire: { key: 'fire', label: 'Fire Safety', shortLabel: 'Fire', fileTag: 'FireSafety', items: [{"id": "fs1", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrcial Installation \u2013 Commissioning Report Available", "ref": "FS1/A1/xx", "name": "Fixed Electrcial Installation \u2013 Commissioning Report Available", "finding": "A copy of the fixed electrical installation commissioning report was not readily available at the time of the visit.", "priority": "2"}, {"id": "fs2", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrcial Installation \u2013 Inspection Report Available", "ref": "FS1/B1/xx", "name": "Fixed Electrcial Installation \u2013 Inspection Report Available", "finding": "There was evidence (label affixed to distribution board) that the electrical installation condition inspection had been undertaken. However, a copy of the electrical installation condition report was not readily available at the time of the visit.", "priority": "2"}, {"id": "fs3", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrcial Installation \u2013 5-Yearly Inspection Completed", "ref": "FS1/A4/xx FS1/B3/xx", "name": "Fixed Electrcial Installation \u2013 5-Yearly Inspection Completed", "finding": "Records indicated that the 5-yearly fixed electrical installation condition inspection was overdue.", "priority": "2"}, {"id": "fs4", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrical Installation \u2013 Remedial / Corrective Actions Identified on the Condition Report have been Rectified", "ref": "FS1/B6/xx", "name": "Fixed Electrical Installation \u2013 Remedial / Corrective Actions Identified on the Condition Report have been Rectified", "finding": "Remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified in the fixed electrical installation condition report. At the time of the visit, there were no records to verify that remedial/corrective actions had been completed.", "priority": "2"}, {"id": "fs5", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electrical Fittings \u2013 No Defective / Damaged Electrcial Fittings Observed", "ref": "FS1/C1/xx", "name": "Electrical Fittings \u2013 No Defective / Damaged Electrcial Fittings Observed", "finding": "At the time of the visit damaged/defective electrical fittings were observed.", "priority": "1"}, {"id": "fs6", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Extension Cables \u2013 No Multiple Extension Cables Linked Observed", "ref": "FS1/D1/xx", "name": "Extension Cables \u2013 No Multiple Extension Cables Linked Observed", "finding": "There was a risk of fire due to daisy-chained (linked in series) multiple socket extension leads. Daisy-chained multiple extension leads have been known to overheat and catch fire if overloaded or faulty.", "priority": "1"}, {"id": "fs7", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electrical Block Adaptors \u2013 No Multi-Block Style Adaptors Observed", "ref": "FS1/D2/xx", "name": "Electrical Block Adaptors \u2013 No Multi-Block Style Adaptors Observed", "finding": "There was a risk of fire due to the use of block adaptors. The multi-use block style adaptors have been known to overheat and catch fire if overloaded or faulty.", "priority": "1"}, {"id": "fs8", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electrical Extension Cables \u2013 No Faulty Extension Cables Observed", "ref": "FS1/D3/xx", "name": "Electrical Extension Cables \u2013 No Faulty Extension Cables Observed", "finding": "There was a risk of fire due to the use of extension reels. Extension reels have been known to overheat if not fully unwound or faulty.", "priority": "1"}, {"id": "fs9", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Portable Electrical Appliances \u2013 Testing Report Available", "ref": "FS1/E1/xx", "name": "Portable Electrical Appliances \u2013 Testing Report Available", "finding": "There was evidence that In-service Inspection and Test of Electrical Equipment (formerly PAT) had been undertaken. However, a copy of the report was not readily available at the time of the visit.", "priority": "2"}, {"id": "fs10", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Portable Electrical Appliances \u2013 Testing Completed", "ref": "FS1/E2/xx", "name": "Portable Electrical Appliances \u2013 Testing Completed", "finding": "In-service Inspection and Test of Electrical Equipment (formerly PAT) was overdue.", "priority": "2"}, {"id": "fs11", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Portable Electrical Appliances \u2013 Controls in Place for Personal Equipment in Use", "ref": "FS1/F1/xx", "name": "Portable Electrical Appliances \u2013 Controls in Place for Personal Equipment in Use", "finding": "There were no suitable controls in place for the use of personal portable electrical appliances.", "priority": "2"}, {"id": "fs12", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electric Powered Vehicles \u2013 None Observed", "ref": "FS1/F2/xx", "name": "Electric Powered Vehicles \u2013 None Observed", "finding": "Electric powered personal vehicles (EPPVs), i.e. electric bicycles, e-scooters or e-unicycles)) were observed within the building; charging and/or stored.", "priority": "1"}, {"id": "fs13", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Neon Signage / Displays \u2013 Fire Fighter Switches Identifiable", "ref": "FS1/G1/xx", "name": "Neon Signage / Displays \u2013 Fire Fighter Switches Identifiable", "finding": "High voltage neon signs/displays were installed within the premises. The firefighter switch(es) for the high voltage neon signs/displays could not be identified/located at the time of the visit.", "priority": "2"}, {"id": "fs14", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking \u2013 Smoking Only Observed in Designated Smoking Areas", "ref": "FS1/I1/xx", "name": "Smoking \u2013 Smoking Only Observed in Designated Smoking Areas", "finding": "There was evidence that workers were not smoking at the designated area on site.", "priority": "1"}, {"id": "fs15", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking - No Smoking Signage in Good Condition", "ref": "FS1/I2/xx", "name": "Smoking - No Smoking Signage in Good Condition", "finding": "\u2018No smoking\u2019 signage was not displayed/was worn/damaged at the entrance(s) to the premises.", "priority": "2"}, {"id": "fs16", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking - Pole / Ash Tray Available at Designated Smoking Areas", "ref": "FS1/I3/xx", "name": "Smoking - Pole / Ash Tray Available at Designated Smoking Areas", "finding": "There was no smoker\u2019s pole/ashtray at the designated smoker\u2019s area on site.", "priority": "1"}, {"id": "fs17", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking \u2013 Designated Smoking Areas Clear of Waste", "ref": "FS1/I4/xx", "name": "Smoking \u2013 Designated Smoking Areas Clear of Waste", "finding": "There was a designated smoker\u2019s area on site and at the time of the visit the ashtray was overflowing, and other waste material was present.", "priority": "1"}, {"id": "fs18", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Gas Safety - Annual Gas Safety Inspection Undertaken", "ref": "FS1/K3/xx", "name": "Gas Safety - Annual Gas Safety Inspection Undertaken", "finding": "It could not be confirmed at the time of the visit when the most recent annual gas safety inspection had been undertaken.", "priority": "1"}, {"id": "fs19", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Heating \u2013 No Portable Heaters Observed", "ref": "FS1/L1/xx", "name": "Heating \u2013 No Portable Heaters Observed", "finding": "A number of portable heaters were being used within the workplace.", "priority": "1"}, {"id": "fs20", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Heating - Fixed Heating and Ventilation System Maintenance Records Available", "ref": "FS1/M1/xx", "name": "Heating - Fixed Heating and Ventilation System Maintenance Records Available", "finding": "Records for the maintenance of fixed heating and ventilation system(s) were not readily available at the time of the visit.", "priority": "2"}, {"id": "fs21", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Heating \u2013 Naked Flame Heaters Not Observed", "ref": "FS1/N1/xx", "name": "Heating \u2013 Naked Flame Heaters Not Observed", "finding": "Naked flame heaters formed part of the buildings heating system.", "priority": "3"}, {"id": "fs22", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Clearance between Ceiling Fixed Lighting and Goods \u2013 Suitable Levels of Stock on Racking / Shelving to Allow for Adequate Clearance", "ref": "FS1/P1/xx", "name": "Clearance between Ceiling Fixed Lighting and Good  Flammable Materials", "finding": "Oxidising materials were being stored alongside flammable materials.", "priority": "1"}, {"id": "fs37", "section": "3. Sources of oxygen", "sectionIdx": 2, "topicRef": "3.", "topicName": "Oxygen Cylinders \u2013 Stored Securely", "ref": "FS3/C1/xx", "name": "Oxygen Cylinders \u2013 Stored Securely", "finding": "Oxygen cylinders were not being stored securely.", "priority": "1"}, {"id": "fs38", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 In Good Condition", "ref": "FS4/A1/xx FS7/O1/xx", "name": "Fire Doors \u2013 In Good Condition", "finding": "Fire doors were in poor condition due to day-to-day wear and tear.", "priority": "2"}, {"id": "fs39", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Remedial Actions Outstanding from Inspection / Survey have been Rectified", "ref": "FS4/A2/xx FS7/O2/xx", "name": "Fire Doors \u2013 Remedial Actions Outstanding from Inspection / Survey have been Rectified", "finding": "A fire door inspection/survey had been carried out, however, there was no evidence that the remedial actions had been implemented.", "priority": "2"}, {"id": "fs40", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 No Gaps Around Fire Door Leaf and Door Frame", "ref": "FS4/A3/xx", "name": "Fire Doors \u2013 No Gaps Around Fire Door Leaf and Door Frame", "finding": "Gaps around the fire door leaf and door frame exceeded 3mm, which is generally considered ideal to ensure that the door can close properly while providing an effective barrier against fire and smoke.", "priority": "2"}, {"id": "fs41", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Threshold Gap Did Not Exceed 8-10mm", "ref": "FS4/A4/xx", "name": "Fire Doors \u20   // Items confirmed to be the exact same real-world check on both checklists.

  const LINK_PARTNER = {}; // itemId -> partnerId
  const LINK_PAIR_KEY = {}; // itemId -> canonical pair key (used for the unlink flag)
  LINKED_PAIRS.forEach((pair) => {

    LINK_PAIR_KEY[pair.hs] = pair.hs;
    LINK_PAIR_KEY[pair.fire] = pair.hs;
  });
  function findItemById(id) {
    return getItems('hs').find(i => i.id === id) || getItems('fire').find(i => i.id === id);
  }
  function itemTypeOf(id) { return id.startsWith('fs') ? 'fire' : 'hs'; }
  function isLinked(itemId) { return itemId in LINK_PARTNER; }
  function isUnlinkedForVisit(itemId) {

    return !!(currentVisit && currentVisit.unlinkedPairs && currentVisit.unlinkedPairs.includes(key));

    const idx = currentVisit.unlinkedPairs.indexOf(key);
    if (unlinked && idx === -1) currentVisit.unlinkedPairs.push(key);
    if (!unlinked && idx !== -1) currentVisit.unlinkedPairs.splice(idx, 1);
  }

    if (!isLinked(itemId) || isUnlinkedForVisit(itemId)) return;
    const partnerId = LINK_PARTNER[itemId];
    const source = currentVisit.answers[itemId] || {};
    currentVisit.answers[partnerId] = {

  // ---------- Risk Rating (Severity x Likelihood matrix) ----------
  const SEV_LABELS = { 1: 'Slight Harm (1)', 2: 'Moderate Harm (2)', 3: 'Extreme Harm (3)' };
  const LIK_LABELS = { 1: 'Low (1)', 2: 'Medium (2)', 3: 'High (3)' };
  const RISK_MATRIX = {
    '1-1': { rating: 1, label: 'Trivial Risk', shortLabel: 'Trivial', color: '#4472C4', cls: 'risk-1' },
    '2-1': { rating: 2, label: 'Tolerable Risk', shortLabel: 'Tolerable', color: '#2E9E5B', cls: 'risk-2' },
    '1-2': { rating: 2, label: 'Tolerable Risk', shortLabel: 'Tolerable', color: '#2E9E5B', cls: 'risk-2' },

  // H&S scores per topic (e.g. "3.6 Electrical Safety" — a real hazard sub-category).

  const RISK_LEVEL_BY_TYPE = { hs: 'topic', fire: 'section' };
  function riskBand(sev, lik) {

    return RISK_MATRIX[sev + '-' + lik] || null;

  function getRiskScore(key) {

          : `<div class="hs-risk-badge risk-none">Not yet scored</div>`}
      </div>`;
  }

  // ---------- Bulk actions: "Mark all Compliant" (H&S + Fire) and "Mark all N/A" (H&S only) ----------
  // Groups are keyed fresh each render since the underlying item-id lists only need to survive
  // until the next render rebuilds the DOM anyway.
  let bulkGroups = {};

  function renderBulkRow(type, itemIds, showNA) {

  }

  const root = document.getElementById('hs-app-root');
  let currentVisit = null; // {meta, answers}
  let currentTab = 'hs'; // which checklist tab is showing on the checklist screen
  let unsaved = false;
  let filterPriority1 = false;
  let filterNotCompliant = false;
  let filterIncomplete = false;
  let searchQuery = '';
  let openSections = new Set([0]);

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { day: '2-digit', month: 'short', year: 'numeric' });
  }
  function countAnswered(answers, scopeItems) {
    if (scopeItems) {
      return scopeItems.filter(i => answers[i.id] && answers[i.id].status).length;
    }
    return Object.values(answers || {}).filter(a => a && a.status).length;
  }
  function slug(s) {
    return String(s || 'visit').trim().replace(/[^a-z0-9]+/gi, '_').replace(/^_+|_+$/g, '') || 'visit';
  }

  function showScreen(id) {
    document.querySelectorAll('.hs-screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function markDirty() {
    unsaved = true;
    updateSaveIndicator();
  }
  function markClean() {
    unsaved = false;
    updateSaveIndicator();
  }
  function updateSaveIndicator() {
    const el = document.getElementById('hs-save-status');
    if (!el) return;
    el.innerHTML = unsaved
      ? '<span class="hs-unsaved-dot"></span>Unsaved changes — tap Save'
      : 'All changes saved to this file';
  }

  window.addEventListener('beforeunload', function (e) {
    if (unsaved) { e.preventDefault(); e.returnValue = ''; }
  });

  // ---------- Home ----------
  async function checkOfflineReady() {
    try {
      if (!('caches' in window)) return false;
      const names = await caches.keys();
      for (const name of names) {
        const cache = await caches.open(name);
        const match = (await cache.match('./index.html')) || (await cache.match('./'));
        if (match) return true;
      }
      return false;
    } catch (e) { return false; }
  }

  function renderHome() {
    document.getElementById('view-home').innerHTML = `
      <div class="hs-container">
        <div class="hs-home-header">
          <h1>Site Visit Checklist</h1>
          <p>Health &amp; Safety and Fire Safety in one visit — switch between them with the tabs on the checklist screen. Take photos against any item — nothing is sent anywhere, it all lives in files you save on this device.</p>
        </div>
        <div class="hs-offline-status pending" id="hs-offline-status">
          Checking offline status…
        </div>
        <button class="hs-new-visit-btn" id="btn-new-visit">+ Start new visit</button>
        <div class="hs-load-drop">
          Already have a saved visit file?
          <div style="margin-top:10px;">
            <label class="hs-btn-secondary hs-file-btn" style="display:inline-flex;">
              Load a saved visit (.json)
              <input type="file" id="file-load" accept="application/json,.json">
            </label>
          </div>
        </div>
        <div class="hs-visit-list">
          <div class="hs-empty">
            <div class="hs-empty-icon">💾</div>
            This version saves to files, not to an account — use <strong>Save progress</strong> in the checklist to download a file, and <strong>Load a saved visit</strong> above to pick it back up, even with no signal.
          </div>
        </div>
      </div>`;

    checkOfflineReady().then((ready) => {
      const el = document.getElementById('hs-offline-status');
      if (!el) return;
      el.className = 'hs-offline-status ' + (ready ? 'ready' : 'pending');
      el.textContent = ready
        ? '✓ Offline ready — this page will keep working with no signal.'
        : 'Setting up offline access… keep this open on Wi-Fi/data for a few seconds, then reload this page once before you rely on it with no signal.';
    });

    document.getElementById('btn-new-visit').onclick = () => { renderNewVisitForm(); showScreen('view-new'); };
    document.getElementById('file-load').onchange = handleFileLoad;
  }

  function handleFileLoad(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !parsed.meta || !parsed.answers) throw new Error('bad shape');
        currentVisit = parsed;
        if (!currentVisit.unlinkedPairs) currentVisit.unlinkedPairs = [];
        if (!currentVisit.riskScores) currentVisit.riskScores = {};
        currentTab = (parsed.meta.type && REPORT_TYPES[parsed.meta.type]) ? parsed.meta.type : 'hs';
        markClean();
        openSections = new Set([0]);
        renderChecklist();
        showScreen('view-checklist');
        toast('Visit loaded');
      } catch (err) {
        alert("Couldn't read that file — make sure it's a checklist file saved from this app.");
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ---------- New visit form ----------
  function renderNewVisitForm() {
    document.getElementById('view-new').innerHTML = `
      <div class="hs-container hs-form-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-cancel-new" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>New visit</strong>
        </div>
        <div class="hs-field"><label>Site / client name</label><input id="f-site" placeholder="e.g. Riverside Distribution Centre"></div>
        <div class="hs-field"><label>Address</label><input id="f-address" placeholder="Optional"></div>
        <div class="hs-field"><label>Date of visit</label><input id="f-date" type="date" value="${todayStr()}"></div>
        <div class="hs-field"><label>Inspector name</label><input id="f-inspector" placeholder="Your name"></div>
        <div class="hs-field"><label>WRMonline report ref</label><input id="f-reportref" placeholder="Optional — fill in later"></div>
        <div class="hs-form-actions">
          <button class="hs-btn-primary" id="btn-create-visit">Start checklist</button>
        </div>
      </div>`;
    document.getElementById('btn-cancel-new').onclick = () => showScreen('view-home');
    document.getElementById('btn-create-visit').onclick = () => {
      const site = document.getElementById('f-site').value.trim() || 'Untitled visit';
      const address = document.getElementById('f-address').value.trim();
      const date = document.getElementById('f-date').value || todayStr();
      const inspector = document.getElementById('f-inspector').value.trim();
      const reportRef = document.getElementById('f-reportref').value.trim();
      const id = 'v' + Date.now();
      const now = new Date().toISOString();
      const meta = { id, site, address, date, inspector, reportRef, createdAt: now, updatedAt: now };
      currentVisit = { meta, answers: {}, unlinkedPairs: [], riskScores: {} };
      currentTab = 'hs';
      markDirty();
      openSections = new Set([0]);
      renderChecklist();
      showScreen('view-checklist');
    };
  }

  // ---------- Checklist ----------
  function itemMatchesFilter(item) {
    const a = currentVisit.answers[item.id];
    if (filterPriority1 && item.priority !== '1') return false;
    if (filterNotCompliant && !(a && a.status === 'NC')) return false;
    if (filterIncomplete && a && a.status) return false;
    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      const haystack = [item.ref, item.name, item.finding, item.topicName].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  }

  function renderChecklist() {
    bulkGroups = {};
    bulkGroupCounter = 0;
    const type = currentTab;
    const items = getItems(type);
    const sections = getSections(type);
    const answered = countAnswered(currentVisit.answers, items);
    const total = items.length;
    const segs = sections.map(s => {
      const secAnswered = s.topics.flatMap(t=>t.items).filter(i => currentVisit.answers[i.id] && currentVisit.answers[i.id].status).length;
      const pct = (secAnswered / s.count) * 100;
      return `<div class="hs-progress-seg" style="width:${(s.count/total*100)}%"><div style="height:100%;width:${pct}%;background:#6FCF97;"></div></div>`;
    }).join('');

    const isSearching = !!searchQuery.trim();
    const riskLevel = RISK_LEVEL_BY_TYPE[type] || 'topic';
    let matchCount = 0;
    const sectionsHtml = sections.map(sec => {
      const isOpen = openSections.has(sec.idx) || isSearching;
      const secAnswered = sec.topics.flatMap(t=>t.items).filter(i => currentVisit.answers[i.id] && currentVisit.answers[i.id].status).length;
      const topicsHtml = sec.topics.map(topic => {
        const visItems = topic.items.filter(itemMatchesFilter);
        if (!visItems.length) return '';
        matchCount += visItems.length;
        const itemsHtml = visItems.map(item => renderItem(item)).join('');
        const label = topic.topicName ? `${topic.topicRef} · ${escapeHtml(topic.topicName)}` : topic.topicRef;
        const topicRiskBox = (riskLevel === 'topic' && !isSearching)
          ? renderRiskBox(`${type}_topic_${topic.topicRef}`, null) : '';
        const topicBulkRow = (riskLevel === 'topic' && !isSearching)
          ? renderBulkRow(type, topic.items.map(i => i.id), true) : '';
        return `<div class="hs-topic-label">${label}</div>${topicBulkRow}${topicRiskBox}${itemsHtml}`;
      }).join('');
      if (!topicsHtml) return '';
      const sectionRiskBox = (riskLevel === 'section' && !isSearching)
        ? renderRiskBox(`${type}_sec_${sec.idx}`, null) : '';
      const sectionBulkRow = (riskLevel === 'section' && !isSearching)
        ? renderBulkRow(type, sec.topics.flatMap(t => t.items).map(i => i.id), false) : '';
      return `
      <div class="hs-section ${isOpen ? 'open' : ''}" data-sec="${sec.idx}">
        <button class="hs-section-head" data-toggle="${sec.idx}">
          <div>
            <div class="hs-section-title">${escapeHtml(sec.title)}</div>
            <div class="hs-section-count">${secAnswered}/${sec.count} completed</div>
          </div>
          <div class="hs-section-chevron">▸</div>
        </button>
        <div class="hs-section-body">${sectionRiskBox}${sectionBulkRow}${topicsHtml}</div>
      </div>`;
    }).join('');

    // Preserve focus + cursor position in the search box across re-renders, since
    // typing triggers a full innerHTML rebuild of this screen.
    const searchWasFocused = document.activeElement && document.activeElement.id === 'search-input';
    const searchCursor = searchWasFocused ? document.activeElement.selectionStart : null;

    document.getElementById('view-checklist').innerHTML = `
      <div class="hs-topbar">
        <div class="hs-topbar-row">
          <button class="hs-icon-btn" id="btn-home">←</button>
          <div style="flex:1;min-width:0;">
            <div class="hs-topbar-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(currentVisit.meta.site)}</div>
            <div class="hs-topbar-sub">${escapeHtml(fmtDate(currentVisit.meta.date))}${currentVisit.meta.inspector ? ' · ' + escapeHtml(currentVisit.meta.inspector) : ''}</div>
          </div>
          <button class="hs-icon-btn" id="btn-photos">📷</button>
          <button class="hs-icon-btn" id="btn-report">📄</button>
          <button class="hs-icon-btn" id="btn-export">↗</button>
        </div>
        <div class="hs-type-tabs" style="margin:12px 0 0;">
          ${Object.values(REPORT_TYPES).map((rt) => `
            <button class="hs-type-tab ${currentTab === rt.key ? 'on' : ''}" data-checklist-tab="${rt.key}">${escapeHtml(rt.label)}</button>
          `).join('')}
        </div>
        <div class="hs-progress-track">${segs}</div>
        <div class="hs-progress-label"><span>${answered} of ${total} items</span><span>${Math.round(answered/total*100)}%</span></div>
      </div>
      <div class="hs-container">
        <div class="hs-search-row">
          <span class="hs-search-icon">🔎</span>
          <input type="text" id="search-input" class="hs-search-input" placeholder="Find a question…" value="${escapeHtml(searchQuery)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          ${isSearching ? `<button class="hs-search-clear" id="search-clear">✕</button>` : ''}
        </div>
        ${isSearching ? `<div class="hs-search-count">${matchCount} match${matchCount === 1 ? '' : 'es'}</div>` : ''}
        <div class="hs-filter-bar">
          <button class="hs-chip ${filterPriority1?'on':''}" id="chip-p1">Priority 1 only</button>
          <button class="hs-chip ${filterNotCompliant?'on':''}" id="chip-notcompliant">Not compliant only</button>
          <button class="hs-chip ${filterIncomplete?'on':''}" id="chip-incomplete">Unanswered only</button>
          <button class="hs-chip" id="chip-expand">Expand all</button>
          <button class="hs-chip" id="chip-collapse">Collapse all</button>
        </div>
        ${sectionsHtml || (isSearching ? `<div class="hs-empty">No items match "${escapeHtml(searchQuery.trim())}".</div>` : '')}
      </div>
      <div style="height:8px;"></div>
      `;

    const searchInput = document.getElementById('search-input');
    searchInput.oninput = () => { searchQuery = searchInput.value; renderChecklist(); };
    if (searchWasFocused) {
      searchInput.focus();
      if (searchCursor != null) searchInput.setSelectionRange(searchCursor, searchCursor);
    }
    const searchClear = document.getElementById('search-clear');
    if (searchClear) searchClear.onclick = () => { searchQuery = ''; renderChecklist(); };

    document.getElementById('btn-home').onclick = () => {
      if (unsaved && !confirm('You have unsaved changes. Leave without saving?')) return;
      showScreen('view-home');
      renderHome();
    };
    document.getElementById('btn-photos').onclick = () => { renderPhotosScreen(); showScreen('view-photos'); };
    document.getElementById('btn-report').onclick = () => { renderReportPicker(); showScreen('view-report'); };
    document.getElementById('btn-export').onclick = () => { renderExport(); showScreen('view-export'); };
    document.querySelectorAll('[data-checklist-tab]').forEach((el) => {
      el.onclick = () => { currentTab = el.getAttribute('data-checklist-tab'); openSections = new Set([0]); renderChecklist(); };
    });
    document.getElementById('chip-p1').onclick = () => { filterPriority1 = !filterPriority1; renderChecklist(); };
    document.getElementById('chip-notcompliant').onclick = () => { filterNotCompliant = !filterNotCompliant; renderChecklist(); };
    document.getElementById('chip-incomplete').onclick = () => { filterIncomplete = !filterIncomplete; renderChecklist(); };
    document.getElementById('chip-expand').onclick = () => { openSections = new Set(sections.map(s=>s.idx)); renderChecklist(); };
    document.getElementById('chip-collapse').onclick = () => { openSections = new Set(); renderChecklist(); };
    document.querySelectorAll('[data-toggle]').forEach(el => {
      el.onclick = () => {
        const idx = parseInt(el.getAttribute('data-toggle'));
        if (openSections.has(idx)) openSections.delete(idx); else openSections.add(idx);
        renderChecklist();
      };
    });
    document.querySelectorAll('[data-status]').forEach(el => {
      el.onclick = () => {
        const id = el.getAttribute('data-item');
        const status = el.getAttribute('data-status');
        const cur = currentVisit.answers[id] || { status: null, notes: '' };
        cur.status = (cur.status === status) ? null : status;
        currentVisit.answers[id] = cur;
        currentVisit.meta.updatedAt = new Date().toISOString();
        if (isLinked(id) && !isUnlinkedForVisit(id)) {
          propagateToPartner(id);
          toast('Also filled in on the linked item');
        }
        markDirty();
        renderChecklist();
      };
    });
    document.querySelectorAll('[data-notes]').forEach(el => {
      el.oninput = () => {
        const id = el.getAttribute('data-notes');
        const cur = currentVisit.answers[id] || { status: null, notes: '' };
        cur.notes = el.value;
        currentVisit.answers[id] = cur;
        currentVisit.meta.updatedAt = new Date().toISOString();
        if (isLinked(id) && !isUnlinkedForVisit(id)) propagateToPartner(id);
        markDirty();
      };
    });
    document.querySelectorAll('[data-unlink]').forEach(el => {
      el.onclick = () => {
        const id = el.getAttribute('data-unlink');
        setPairUnlinked(id, true);
        markDirty();
        renderChecklist();
        toast('Separated — these will no longer copy to each other');
      };
    });
    document.querySelectorAll('[data-relink]').forEach(el => {
      el.onclick = () => {
        const id = el.getAttribute('data-relink');
        setPairUnlinked(id, false);
        propagateToPartner(id);
        markDirty();
        renderChecklist();
        toast('Re-linked — this answer has been copied across');
      };
    });
    document.querySelectorAll('[data-risk-sev]').forEach(el => {
      el.onclick = () => {
        const [key, v] = el.getAttribute('data-risk-sev').split('|');
        setRiskScore(key, 'severity', parseInt(v));
      };
    });
    document.querySelectorAll('[data-risk-lik]').forEach(el => {
      el.onclick = () => {
        const [key, v] = el.getAttribute('data-risk-lik').split('|');
        setRiskScore(key, 'likelihood', parseInt(v));
      };
    });
    document.querySelectorAll('[data-bulk-yes]').forEach(el => {
      el.onclick = () => bulkSetStatus(el.getAttribute('data-bulk-yes'), 'C');
    });
    document.querySelectorAll('[data-bulk-na]').forEach(el => {
      el.onclick = () => bulkSetStatus(el.getAttribute('data-bulk-na'), 'NA');
    });
    document.querySelectorAll('[data-photo-input]').forEach(el => {
      el.onchange = (e) => {
        const id = el.getAttribute('data-photo-input');
        const files = Array.from(e.target.files || []);
        e.target.value = '';
        if (files.length) handlePhotoAdd(id, files);
      };
    });
    document.querySelectorAll('.hs-photo-thumbs').forEach(el => {
      bindPhotoThumbEvents(el.getAttribute('data-thumbs-for'));
    });

    let bb = document.getElementById('hs-bottombar-checklist');
    if (!bb) {
      bb = document.createElement('div');
      bb.id = 'hs-bottombar-checklist';
      bb.className = 'hs-bottombar';
      document.getElementById('view-checklist').appendChild(bb);
    }
    bb.innerHTML = `
      <div class="hs-save-status" id="hs-save-status"></div>
      <button class="hs-bottombar-btn ghost" id="btn-export-2">Export</button>
      <button class="hs-bottombar-btn" id="btn-save">Save progress</button>
    `;
    document.getElementById('btn-export-2').onclick = () => { renderExport(); showScreen('view-export'); };
    document.getElementById('btn-save').onclick = saveVisitToFile;
    updateSaveIndicator();
  }

  function saveVisitToFile() {
    const text = JSON.stringify(currentVisit, null, 2);
    const blob = new Blob([text], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = slug(currentVisit.meta.site) + '_' + currentVisit.meta.date + '_checklist.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    markClean();
    toast('Saved — check your Downloads / Files app');
  }

  function renderItem(item) {
    const a = currentVisit.answers[item.id] || {};
    const pClass = item.priority === '1' ? 'p1' : item.priority === '2' ? 'p2' : 'p3';
    const pLabel = item.priority ? 'P' + item.priority : '—';
    const photoCount = (a.photos || []).length;

    let linkRow = '';
    if (isLinked(item.id)) {
      const partner = findItemById(LINK_PARTNER[item.id]);
      const partnerLabel = partner ? `${partner.ref} on ${getType(itemTypeOf(partner.id)).label}` : 'the other checklist';
      const unlinked = isUnlinkedForVisit(item.id);
      linkRow = unlinked
        ? `<div class="hs-link-row hs-link-off">Not linked right now with ${escapeHtml(partnerLabel)} <button class="hs-link-btn" data-relink="${item.id}">Re-link</button></div>`
        : `<div class="hs-link-row">🔗 Linked with ${escapeHtml(partnerLabel)} — answering here fills that one in too <button class="hs-link-btn" data-unlink="${item.id}">Separate</button></div>`;
    }

    return `
      <div class="hs-item">
        <div class="hs-item-top">
          <div class="hs-item-badges">
            <span class="hs-ref-badge mono">${escapeHtml(item.ref)}</span>
            <span class="hs-p-badge" style="background:var(--${pClass})">${pLabel}</span>
          </div>
          <div class="hs-item-text">${escapeHtml(item.name)}${item.finding ? `<div class="hs-item-finding"><strong>What to look for:</strong> ${escapeHtml(item.finding)}</div>` : ''}</div>
        </div>
        ${linkRow}
        <div class="hs-status-row">
          <button class="hs-status-btn ${a.status==='C'?'on-c':''}" data-item="${item.id}" data-status="C">Compliant</button>
          <button class="hs-status-btn ${a.status==='NC'?'on-nc':''}" data-item="${item.id}" data-status="NC">Not compliant</button>
          <button class="hs-status-btn ${a.status==='NA'?'on-na':''}" data-item="${item.id}" data-status="NA">N/A</button>
        </div>
        <textarea class="hs-notes" placeholder="Notes / evidence for write-up…" data-notes="${item.id}">${escapeHtml(a.notes || '')}</textarea>
        <div class="hs-photo-row">
          <label class="hs-photo-add">
            <span class="hs-photo-add-label">📷 Add photo${photoCount ? ` (${photoCount})` : ''}</span>
            <input type="file" accept="image/*" capture="environment" multiple data-photo-input="${item.id}">
          </label>
          <div class="hs-photo-thumbs" id="photothumbs-${item.id}" data-thumbs-for="${item.id}">${renderPhotoThumbs(item)}</div>
        </div>
      </div>`;
  }

  function renderPhotoThumbs(item) {
    const photos = (currentVisit.answers[item.id] && currentVisit.answers[item.id].photos) || [];
    return photos.map((p, i) => `
      <div class="hs-thumb">
        <img src="${p.dataUrl}" data-photo-view="${item.id}:${i}">
        <button class="hs-thumb-del" data-photo-del="${item.id}:${i}">×</button>
      </div>`).join('');
  }

  function bindPhotoThumbEvents(itemId) {
    const container = document.getElementById('photothumbs-' + itemId);
    if (!container) return;
    container.querySelectorAll('[data-photo-view]').forEach(el => {
      el.onclick = () => {
        const [id, idx] = el.getAttribute('data-photo-view').split(':');
        openLightbox(id, parseInt(idx));
      };
    });
    container.querySelectorAll('[data-photo-del]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        const [id, idx] = el.getAttribute('data-photo-del').split(':');
        const cur = currentVisit.answers[id];
        if (!cur || !cur.photos) return;
        cur.photos.splice(parseInt(idx), 1);
        currentVisit.meta.updatedAt = new Date().toISOString();
        if (isLinked(id) && !isUnlinkedForVisit(id)) {
          propagateToPartner(id);
          updateItemPhotos(LINK_PARTNER[id]);
        }
        markDirty();
        updateItemPhotos(id);
      };
    });
  }

  function updateItemPhotos(itemId) {
    const container = document.getElementById('photothumbs-' + itemId);
    if (!container) return;
    const item = findItemById(itemId);
    container.innerHTML = renderPhotoThumbs(item);
    bindPhotoThumbEvents(itemId);
    const row = container.closest('.hs-photo-row');
    const labelSpan = row && row.querySelector('.hs-photo-add-label');
    const count = ((currentVisit.answers[itemId] && currentVisit.answers[itemId].photos) || []).length;
    if (labelSpan) labelSpan.textContent = `📷 Add photo${count ? ` (${count})` : ''}`;
  }

  function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const maxDim = 1400;
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = () => reject(new Error('image load failed'));
        img.src = reader.result;
      };
      reader.onerror = () => reject(new Error('file read failed'));
      reader.readAsDataURL(file);
    });
  }

  async function handlePhotoAdd(itemId, files) {
    const cur = currentVisit.answers[itemId] || { status: null, notes: '' };
    if (!cur.photos) cur.photos = [];
    toast(files.length > 1 ? 'Processing photos…' : 'Processing photo…');
    for (const file of files) {
      try {
        const dataUrl = await compressImage(file);
        cur.photos.push({ id: 'p' + Date.now() + Math.random().toString(36).slice(2, 7), dataUrl, takenAt: new Date().toISOString() });
      } catch (err) {
        console.error('photo processing failed', err);
      }
    }
    currentVisit.answers[itemId] = cur;
    currentVisit.meta.updatedAt = new Date().toISOString();
    if (isLinked(itemId) && !isUnlinkedForVisit(itemId)) {
      propagateToPartner(itemId);
      updateItemPhotos(LINK_PARTNER[itemId]);
    }
    markDirty();
    updateItemPhotos(itemId);
    toast('Photo added — tap Save progress to keep it');
    warnIfLarge();
  }

  function warnIfLarge() {
    try {
      const approxBytes = JSON.stringify(currentVisit).length;
      if (approxBytes > 15 * 1024 * 1024) {
        toast('Visit file is getting large — save now and consider fewer photos per item');
      }
    } catch (e) {}
  }

  function openLightbox(itemId, idx) {
    const cur = currentVisit.answers[itemId];
    if (!cur || !cur.photos || !cur.photos[idx]) return;
    const p = cur.photos[idx];
    let ov = document.getElementById('hs-lightbox');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'hs-lightbox';
      ov.className = 'hs-lightbox';
      document.getElementById('hs-app-root').appendChild(ov);
    }
    ov.innerHTML = `
      <div class="hs-lightbox-inner">
        <img src="${p.dataUrl}">
        <div class="hs-lightbox-hint">Press and hold the photo to save it to your camera roll</div>
      </div>
      <button class="hs-lightbox-close">✕</button>`;
    ov.classList.add('show');
    ov.querySelector('.hs-lightbox-close').onclick = () => ov.classList.remove('show');
    ov.onclick = (e) => { if (e.target === ov) ov.classList.remove('show'); };
  }

  // ---------- Photos review screen ----------
  function renderPhotosScreen() {
    const typeGroups = Object.values(REPORT_TYPES).map((rt) => {
      const groups = [];
      rt.sections.forEach(sec => {
        sec.topics.forEach(topic => {
          topic.items.forEach(item => {
            const photos = (currentVisit.answers[item.id] && currentVisit.answers[item.id].photos) || [];
            if (photos.length) groups.push({ item, photos });
          });
        });
      });
      return { rt, groups };
    }).filter(g => g.groups.length);

    const totalPhotos = typeGroups.reduce((sum, tg) => sum + tg.groups.reduce((s, g) => s + g.photos.length, 0), 0);
    const body = typeGroups.length ? typeGroups.map(tg => `
      <div class="hs-topic-label" style="margin:0 0 8px;border-radius:8px;">${escapeHtml(tg.rt.label)}</div>
      ${tg.groups.map(g => `
        <div class="hs-photo-group">
          <div class="hs-photo-group-head"><span class="hs-ref-badge mono">${escapeHtml(g.item.ref)}</span> ${escapeHtml(g.item.name)}</div>
          <div class="hs-photo-thumbs">
            ${g.photos.map((p, i) => `<div class="hs-thumb"><img src="${p.dataUrl}" data-photo-view="${g.item.id}:${i}"></div>`).join('')}
          </div>
        </div>`).join('')}
    `).join('') : `<div class="hs-empty"><div class="hs-empty-icon">📷</div>No photos added yet — use the camera button on any checklist item.</div>`;

    document.getElementById('view-photos').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-checklist-photos" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>Photos${totalPhotos ? ' (' + totalPhotos + ')' : ''}</strong>
        </div>
        <p style="color:var(--sub);font-size:13px;margin-top:0;">Tap a photo to view it full-size, or press and hold to save it to your camera roll. Photos live inside your visit file — remember to tap <strong>Save progress</strong> on the checklist screen to keep them.</p>
        ${body}
      </div>`;
    document.getElementById('btn-back-checklist-photos').onclick = () => showScreen('view-checklist');
    document.querySelectorAll('#view-photos [data-photo-view]').forEach(el => {
      el.onclick = () => {
        const [id, idx] = el.getAttribute('data-photo-view').split(':');
        openLightbox(id, parseInt(idx));
      };
    });
  }

  // ---------- Export (plain-text summary) ----------
  // ---------- Printable report (H&S / Fire Safety, each separate) ----------
  // Same auto-fill rule as agreed: any Not Compliant among a letter's mapped items -> No.
  // Else any Compliant (and no NC) -> Yes. Else all answered are N/A -> N/A. Else blank.
  function computeTick(itemIds) {
    const statuses = itemIds.map(id => (currentVisit.answers[id] && currentVisit.answers[id].status) || null).filter(Boolean);
    if (!statuses.length) return null;
    if (statuses.includes('NC')) return 'No';
    if (statuses.includes('C')) return 'Yes';
    if (statuses.every(s => s === 'NA')) return 'N/A';
    return null;
  }
  function reportSectionHasContent(def, riskKey) {
    const scored = !!(currentVisit.riskScores && currentVisit.riskScores[riskKey]);
    const anyAnswered = def.requirements.some(req => req.itemIds.some(id => currentVisit.answers[id] && currentVisit.answers[id].status));
    return scored || anyAnswered;
  }
  function reportTickCell(mark, want) {
    return `<td class="rp-tick">${mark === want ? '\u2713' : ''}</td>`;
  }
  function reportRow(letter, text, itemIds, letterSuffix) {
    const tick = computeTick(itemIds);
    return `<tr><td class="rp-letter">${escapeHtml(letter)}${letterSuffix || ''}</td><td class="rp-text">${escapeHtml(text)}</td>${reportTickCell(tick,'Yes')}${reportTickCell(tick,'No')}${reportTickCell(tick,'N/A')}</tr>`;
  }
  function buildHsReportSectionHtml(topicRef, def) {
    const riskKey = `hs_topic_${topicRef}`;
    const score = getRiskScore(riskKey);
    const band = riskBand(score.severity, score.likelihood);
    const rating = band ? band.rating : '—';
    const bandLabel = band ? band.shortLabel : 'Not yet scored';
    const bandColor = band ? band.color : '#999999';
    const rows = def.requirements.map(req => reportRow(req.letter, req.text, req.itemIds)).join('');
    return `
      <div class="rp-block">
        <table class="rp-header">
          <tr>
            <td class="rp-hdr-cell rp-ref">${escapeHtml(topicRef)}</td>
            <td class="rp-hdr-cell rp-name">${escapeHtml(def.topicName)}</td>
            <td class="rp-hdr-cell rp-risklabel">Risk Rating</td>
            <td class="rp-hdr-cell rp-ratingnum">${rating}</td>
            <td class="rp-hdr-cell rp-band" style="background:${bandColor}">${escapeHtml(bandLabel)}</td>
          </tr>
          <tr><td class="rp-hdr-cell rp-label" colspan="2">Hazard</td><td class="rp-val" colspan="3">${escapeHtml(def.hazard)}</td></tr>
          <tr><td class="rp-hdr-cell rp-label" colspan="2">People Exposed to Hazard</td><td class="rp-val" colspan="3">${escapeHtml(def.peopleExposed)}</td></tr>
          <tr><td class="rp-hdr-cell rp-label" colspan="2">Area Where Hazard Present</td><td class="rp-val" colspan="3">${escapeHtml(def.area)}</td></tr>
          <tr><td class="rp-hdr-cell rp-label" colspan="2">Severity of Injury</td><td class="rp-val" colspan="3">${score.severity || 'Not yet scored'}</td></tr>
          <tr><td class="rp-hdr-cell rp-label" colspan="2">Likelihood of Injury</td><td class="rp-val" colspan="3">${score.likelihood || 'Not yet scored'}</td></tr>
          <tr><td class="rp-hdr-cell rp-label" colspan="2">Specific Legislation</td><td class="rp-val" colspan="3">${(def.legislation||[]).map(l=>escapeHtml(l)).join('<br>')}</td></tr>
        </table>
        <table class="rp-compliance">
          <tr><td class="rp-hdr-cell" colspan="2">Compliance with Standard</td><td class="rp-hdr-cell" colspan="3"></td></tr>
          <tr><td class="rp-hdr-cell rp-colhead">Action Plan Ref:</td><td class="rp-hdr-cell rp-colhead">General Requirements</td><td class="rp-hdr-cell rp-colhead">Yes</td><td class="rp-hdr-cell rp-colhead">No</td><td class="rp-hdr-cell rp-colhead">N/A</td></tr>
          ${rows}
        </table>
      </div>`;
  }
  function buildFireReportSectionHtml(secKey, def) {
    const riskKey = `fire_${secKey}`;
    const score = getRiskScore(riskKey);
    const band = riskBand(score.severity, score.likelihood);
    const rating = band ? band.rating : '—';
    const bandLabel = band ? band.shortLabel : 'Not yet scored';
    const bandColor = band ? band.color : '#999999';
    const rows = def.requirements.map(req => reportRow(req.letter, req.text, req.itemIds, ')')).join('');
    return `
      <div class="rp-block">
        <table class="rp-header">
          <tr>
            <td class="rp-hdr-cell rp-firetitle">Fire risk assessment</td>
            <td class="rp-hdr-cell rp-risklabel">Risk Rating</td>
            <td class="rp-hdr-cell rp-ratingnum">${rating}</td>
            <td class="rp-hdr-cell rp-band" style="background:${bandColor}">${escapeHtml(bandLabel)}</td>
          </tr>
          <tr><td class="rp-hdr-cell rp-label">Hazard</td><td class="rp-val" colspan="3">${escapeHtml(def.hazard)}</td></tr>
          <tr><td class="rp-hdr-cell rp-label">People Exposed To Hazard</td><td class="rp-val" colspan="3">${escapeHtml(def.peopleExposed)}</td></tr>
          <tr><td class="rp-hdr-cell rp-label">Likelihood of Fire</td><td class="rp-val" colspan="3">${score.likelihood || 'Not yet scored'}</td></tr>
          <tr><td class="rp-hdr-cell rp-label">Likely Consequences of Fire</td><td class="rp-val" colspan="3">${score.severity || 'Not yet scored'}</td></tr>
          <tr><td class="rp-hdr-cell rp-label">Area Where Hazard Present</td><td class="rp-val" colspan="3">${escapeHtml(def.area)}</td></tr>
        </table>
        <table class="rp-compliance">
          <tr><td class="rp-hdr-cell" colspan="2">Control / Preventative Measures</td><td class="rp-hdr-cell" colspan="3">Compliance with Standard</td></tr>
          <tr><td class="rp-hdr-cell rp-colhead"></td><td class="rp-hdr-cell rp-colhead"></td><td class="rp-hdr-cell rp-colhead">Yes</td><td class="rp-hdr-cell rp-colhead">No</td><td class="rp-hdr-cell rp-colhead">N/A</td></tr>
          ${rows}
        </table>
      </div>`;
  }
  function buildReportHtml(type) {
    const m = currentVisit.meta;
    let blocksHtml = '';
    let included = 0;
    if (type === 'hs') {
      Object.entries(REPORT_MAP.hs || {}).forEach(([topicRef, def]) => {
        if (!reportSectionHasContent(def, `hs_topic_${topicRef}`)) return;
        included++;
        blocksHtml += buildHsReportSectionHtml(topicRef, def);
      });
    } else {
      Object.entries(REPORT_MAP.fire || {}).forEach(([secKey, def]) => {
        if (!reportSectionHasContent(def, `fire_${secKey}`)) return;
        included++;
        blocksHtml += buildFireReportSectionHtml(secKey, def);
      });
    }
    return { included, html: `
      <div class="rp-title">${escapeHtml(getType(type).label)} Report — ${escapeHtml(m.site)}</div>
      <div class="rp-subtitle">${escapeHtml(fmtDate(m.date))}${m.inspector ? ' · ' + escapeHtml(m.inspector) : ''}${m.reportRef ? ' · ' + escapeHtml(m.reportRef) : ''}</div>
      ${blocksHtml || '<div class="rp-empty">Nothing scored or answered yet for this report.</div>'}
    ` };
  }

  function buildExportText() {
    const m = currentVisit.meta;
    let out = `SITE VISIT CHECKLIST\n`;
    out += `Site: ${m.site}\n`;
    if (m.address) out += `Address: ${m.address}\n`;
    out += `Date: ${fmtDate(m.date)}\n`;
    if (m.inspector) out += `Inspector: ${m.inspector}\n`;
    if (m.reportRef) out += `WRMonline report ref: ${m.reportRef}\n`;

    Object.values(REPORT_TYPES).forEach((rt) => {
      const riskLevel = RISK_LEVEL_BY_TYPE[rt.key] || 'topic';
      const answered = countAnswered(currentVisit.answers, rt.items);
      const hasItemContent = rt.items.some(i => hasAnyInput(currentVisit.answers[i.id]));
      const hasRiskContent = Object.keys(currentVisit.riskScores || {}).some(k => k.indexOf(rt.key + '_') === 0);
      if (!hasItemContent && !hasRiskContent) return;
      out += `\n${'='.repeat(50)}\n${rt.label.toUpperCase()} — Completed: ${answered}/${rt.items.length}\n${'='.repeat(50)}\n`;
      rt.sections.forEach(sec => {
        const secRiskKey = `${rt.key}_sec_${sec.idx}`;
        const secRiskScore = getRiskScore(secRiskKey);
        const secRisk = riskLevel === 'section' ? riskBand(secRiskScore.severity, secRiskScore.likelihood) : null;
        const secItems = sec.topics.flatMap(t=>t.items).filter(i => hasAnyInput(currentVisit.answers[i.id]));
        const hasAnyTopicRisk = riskLevel === 'topic' && sec.topics.some(t => {
          const s = getRiskScore(`${rt.key}_topic_${t.topicRef}`);
          return !!riskBand(s.severity, s.likelihood);
        });
        if (!secItems.length && !secRisk && !hasAnyTopicRisk) return;
        out += `\n${sec.title}\n${'-'.repeat(sec.title.length)}\n`;
        if (secRisk) out += `Risk Rating: ${secRisk.rating} — ${secRisk.label}\n`;
        sec.topics.forEach(topic => {
          const topicRiskKey = `${rt.key}_topic_${topic.topicRef}`;
          const topicRiskScore = getRiskScore(topicRiskKey);
          const topicRisk = riskLevel === 'topic' ? riskBand(topicRiskScore.severity, topicRiskScore.likelihood) : null;
          const items = topic.items.filter(i => hasAnyInput(currentVisit.answers[i.id]));
          if (!items.length && !topicRisk) return;
          if (topicRisk) out += `\n[${topic.topicRef}] Risk Rating: ${topicRisk.rating} — ${topicRisk.label}\n`;
          items.forEach(item => {
            const a = currentVisit.answers[item.id];
            const statusLabel = a.status === 'C' ? 'COMPLIANT' : a.status === 'NC' ? 'NOT COMPLIANT' : a.status === 'NA' ? 'N/A' : 'NOT SET';
            let linkNote = '';
            if (isLinked(item.id)) {
              const partner = findItemById(LINK_PARTNER[item.id]);
              if (partner) linkNote = ` [linked with ${partner.ref} on ${getType(itemTypeOf(partner.id)).label}]`;
            }
            out += `\n[${item.ref}] ${item.name} (P${item.priority||'-'}) — ${statusLabel}${linkNote}\n`;
            if (a.notes && a.notes.trim()) out += `  Notes: ${a.notes.trim()}\n`;
            if (a.photos && a.photos.length) out += `  Photos: ${a.photos.length} attached (open the Photos tab or the saved visit file to view)\n`;
          });
        });
      });
    });
    return out;
  }
  function hasAnyInput(a) {
    return !!(a && (a.status || (a.notes && a.notes.trim()) || (a.photos && a.photos.length)));
  }

  // ---------- Report screens ----------
  function renderReportPicker() {
    const hsCount = Object.entries(REPORT_MAP.hs || {}).filter(([ref, def]) => reportSectionHasContent(def, `hs_topic_${ref}`)).length;
    const fireCount = Object.entries(REPORT_MAP.fire || {}).filter(([key, def]) => reportSectionHasContent(def, `fire_${key}`)).length;
    document.getElementById('view-report').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-checklist-report" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>Report</strong>
        </div>
        <p style="color:var(--sub);font-size:13px;margin-top:0;">Builds a separate, print-ready report for each checklist, auto-filled from the answers and risk scores on this visit. Only sections with data are included.</p>
        <button class="hs-new-visit-btn" id="btn-report-hs" style="margin-bottom:12px;">Health &amp; Safety Report ${hsCount ? `(${hsCount} section${hsCount===1?'':'s'})` : '(nothing scored yet)'}</button>
        <button class="hs-new-visit-btn" id="btn-report-fire">Fire Safety Report ${fireCount ? `(${fireCount} section${fireCount===1?'':'s'})` : '(nothing scored yet)'}</button>
      </div>`;
    document.getElementById('btn-back-checklist-report').onclick = () => showScreen('view-checklist');
    document.getElementById('btn-report-hs').onclick = () => renderReportView('hs');
    document.getElementById('btn-report-fire').onclick = () => renderReportView('fire');
  }
  function renderReportView(type) {
    const { included, html } = buildReportHtml(type);
    document.getElementById('view-report').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-report-picker" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>${escapeHtml(getType(type).label)} Report</strong>
          <button class="hs-bottombar-btn" id="btn-print-report" style="margin-left:auto;">Print / Save as PDF</button>
        </div>
        <div id="rp-container">${html}</div>
      </div>`;
    document.getElementById('btn-back-report-picker').onclick = () => renderReportPicker();
    document.getElementById('btn-print-report').onclick = () => window.print();
  }

  function renderExport() {
    const text = buildExportText();
    document.getElementById('view-export').innerHTML = `
      <div class="hs-container hs-export-wrap">
        <div class="hs-back-row">
          <button class="hs-icon-btn" id="btn-back-checklist" style="background:var(--floor);color:var(--navy);">←</button>
          <strong>Export summary</strong>
        </div>
        <p style="color:var(--sub);font-size:13px;margin-top:0;">Copy this into an email, notes app, or straight into WRMonline while you write up the report. This is a read-only summary — use "Save progress" on the checklist screen to keep an editable copy.</p>
        <div class="hs-export-actions">
          <button class="hs-btn-primary" id="btn-copy">Copy to clipboard</button>
          <button class="hs-btn-secondary" id="btn-download">Download .txt</button>
        </div>
        <textarea class="hs-export-text" id="export-text" readonly>${escapeHtml(text)}</textarea>
      </div>`;
    document.getElementById('btn-back-checklist').onclick = () => showScreen('view-checklist');
    document.getElementById('btn-copy').onclick = async () => {
      try {
        await navigator.clipboard.writeText(text);
        toast('Copied to clipboard');
      } catch (e) {
        const ta = document.getElementById('export-text');
        ta.select(); document.execCommand('copy');
        toast('Copied to clipboard');
      }
    };
    document.getElementById('btn-download').onclick = () => {
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = slug(currentVisit.meta.site) + '_summary.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('Downloaded');
    };
  }

  function toast(msg) {
    let t = document.getElementById('hs-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'hs-toast';
      t.className = 'hs-toast';
      document.getElementById('hs-app-root').appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ---------- Offline caching (Service Worker) ----------
  // Makes the page work with no connection after it's been opened once while online.
  // Registers a real sw.js file that must sit alongside this HTML file on the server.
  let offlineReady = false;
  function setupOfflineCache() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('./sw.js', { scope: './', updateViaCache: 'none' }).then(() => {
      offlineReady = true;
    }).catch((err) => {
      offlineReady = false;
      console.warn('Offline cache unavailable:', err);
    });
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      const homeVisible = document.getElementById('view-home') && document.getElementById('view-home').classList.contains('active');
      if (homeVisible) renderHome();
    });
  }

  // ---------- Boot ----------
  function boot() {
    root.innerHTML = `
      <div id="view-home" class="hs-screen active"></div>
      <div id="view-new" class="hs-screen"></div>
      <div id="view-checklist" class="hs-screen"></div>
      <div id="view-photos" class="hs-screen"></div>
      <div id="view-report" class="hs-screen"></div>
      <div id="view-export" class="hs-screen"></div>
    `;
    setupOfflineCache();
    renderHome();
    renderNewVisitForm();
  }
  boot();
})();
</script>
