lace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/A2/xx", "name": "Work at Height \u2013 Assessments had been Completed for Work At Height Activities", "finding": "Stepladders and kick stools were used on site. However, risk assessments had not been completed for work at height activities.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Complete risk assessments for the work at height activities. The results of the risk assessments must be communicated to workers.", "priority": "1"}, {"id": "i171", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/B1/xx", "name": "Work at Height \u2013 Work at Height Permits are being Issued for Tasks Performed at Height", "finding": "Work at Height Permit were not being issued for tasks performed at heights, ensuring that all necessary precautions are taken.", "reason": "Employer are required to ensure that work at height is; properly planned, appropriately supervised, carried out in a manner which is so far as is reasonably practicable safe, planning includes the selection of work equipment, planning of work includes planning for emergencies/rescue and that work at height is carried out only when the weather conditions do not jeopardise the health or safety of persons involved in the work.", "recommendation": "Ensure that Work at Height Permits are issued to authorise work, i.e. working on scaffolds/roofs/elevated platforms to ensure that safety measures are in place.", "priority": "2"}, {"id": "i172", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/C1/xx", "name": "Work at Height \u2013 Workers had Received Work at Height Awareness Instruction and Training", "finding": "There was no evidence that workers carrying out work at height activities had received work at height awareness instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers complete work at height awareness training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i173", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/C2/xx", "name": "Work at Height \u2013 Working at Height Awareness Information and Training Provided", "finding": "Records indicated that workers carrying out work at height activities had been provided with work at height awareness information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up-to-date.", "priority": "2"}, {"id": "i174", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/D1/xx", "name": "Work at Height \u2013 Edge Protection System Installed on the Roof", "finding": "There was no edge protection system installed on the roof of the building.", "reason": "Where work is carried out at height, every employer is required to take suitable and sufficient measures to prevent, so far as is reasonably practicable, any person falling a distance liable to cause personal injury.", "recommendation": "Install and edge protection system to the roof of the building. Ensure that edge protection systems are inspected annually.", "priority": "3"}, {"id": "i175", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/E1/xx", "name": "Work at Height \u2013 \u2018Caution Fragile Surface\u2019 Signage Displayed", "finding": "There was no \u2018caution fragile surface\u2019 signage display.", "reason": "Where any person at work may pass across or near, or work on, from or near, a fragile surface, every employer shall ensure that prominent warning notices are affixed at the approach to the place where the fragile surface is situated.", "recommendation": "Display \u2018caution fragile surface\u2019 signage.", "priority": "2"}, {"id": "i176", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/F1/xx", "name": "Work at Height \u2013 Security Measure in Place to Prevent Unauthorised Access to External Fire Escape Staircase", "finding": "There were no security measures in place to prevent unauthorised access to the external fire escape staircase.", "reason": "Employers are required to provide devices to prevent unauthorised persons.", "recommendation": "Install security measures to the external fire escape staircase, ensuring that it can be quickly/easily opened (single locking device with no key) in the event of an emergency.", "priority": "3"}, {"id": "i177", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/G1/xx", "name": "Work at Height \u2013 Stepladder/Mobile Steps/Kick Stools in Good Condition", "finding": "Stepladders/mobile steps/kick stools were in poor condition.", "reason": "Employers are required to ensure that work equipment exposed to conditions causing deterioration which is liable to result in dangerous situations is inspected and that records are maintained up-to-date.", "recommendation": "Prohibit use and remove/dispose of the damaged stepladders/ mobile steps/kick stools. Replacement stepladders must be Ensure that recorded monthly inspections of stepladders/mobile steps/kick stools are carried out.", "priority": "1"}, {"id": "i178", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/G2/xx", "name": "Work at Height \u2013 Stepladder/Mobile Steps/Kick Stools Checks Recorded", "finding": "Recorded checks of stepladders/mobile steps/kick stools were not carried out.", "reason": "Employers are required to ensure that work equipment exposed to conditions causing deterioration which is liable to result in dangerous situations is inspected and that records are maintained up-to-date.", "recommendation": "Create a ladder log and attached ladder tags to stepladders/ mobile steps/kick stools. Ensure that recorded monthly inspections of stepladders/mobile steps/kick stools are carried out.", "priority": "1"}, {"id": "i179", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/G3/xx", "name": "Work at Height \u2013 Fixed Ladder Inspections Undertaken", "finding": "Fixed ladders inspections were not being undertaken.", "reason": "Employers are required to ensure that work equipment exposed to conditions causing deterioration which is liable to result in dangerous situations is inspected and that records are maintained up to date.", "recommendation": "Prohibit use of the fixed ladder(s). Arrange for the fixed ladder(s) to be inspected, ladder tag affixed and that any recommendations within the report are implemented. Records are maintained up to date. Ensure that fixed ladders are inspected annually.", "priority": "2"}, {"id": "i180", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/C3/xx", "name": "Work at Height \u2013 Workers Using Harness/Restrain Lanyards have been Provided Information, Instruction and Training", "finding": "There was no evidence that workers had been provided with harness/restrain lanyard information, instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Prohibit any work at height activities where the use of harnesses/restrain lanyards are required. Provide workers with harness and lanyard training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "1"}, {"id": "i181", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/C4/xx", "name": "Work at Height \u2013 Workers Using Mobile Access Towers had been Provided with Training", "finding": "There was no evidence that workers had been provided with training for the use of mobile access towers.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Prohibit any work at height activities where the use of mobile access towers is required. Provide workers with PASMA Mobile Access Tower training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "1"}, {"id": "i182", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/C5/xx", "name": "Work at Height \u2013 Works Operating MEWPS has been Provided with Training", "finding": "There was no evidence that workers had been provided with training to operate MEWPs.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Prohibit any work at height activities where the use of MEWPs are required. Provide workers with IPAF MEWP training: IPAF 1a: Static Vertical - Vertical personnel platforms (static) IPAF 1b: Static Boom - Self-propelled booms (outriggers), trailers/push-arounds, vehicle-mounted platforms IPAF 3a: Mobile Vertical - Scissor lifts, vertical personnel platforms (mobile) IPAF 3b: Mobile Boom - Self-propelled booms IPAF PAV: Push around verticals (PAV) Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "1"}, {"id": "i183", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/D2/xx", "name": "Work at Height \u2013 Fixed Ladder Over 6m Fitted with a Safety Cage/Fall Arrest System", "finding": "There was a fixed ladder over 6m, which was not fitted with a safety cage/fall arrest system.", "reason": "Where work is carried out at height, every employer is required to take suitable and sufficient measures to prevent, so far as is reasonably practicable, any person falling a distance liable to cause personal injury.", "recommendation": "Install a safety cage and fall arrest system to the fixed ladder. Provide workers with harness/fall arrest and rescue training. Develop/communicate/practice an emergency rescue plan. Provide workers with helmet (with chin strap).", "priority": "3"}, {"id": "i184", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/E2/xx", "name": "Work at Height \u2013 Fall Protection Cover Over Skylights in Place", "finding": "There was no fall protection covers over the skylights.", "reason": "Employers are required to ensure that suitable and sufficient coverings/guard rails/or similar means of protection of fragile surface are provided.", "recommendation": "Arrange for fall protection covers/or guarding to be installed to skylights. Display \u2018caution fragile surface\u2019 signage.", "priority": "3"}, {"id": "i185", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/F2/xx", "name": "Work at Height \u2013 Security Measure in Place to Prevent Unauthorised Access to Fixed Ladders", "finding": "There were no security measures in place to prevent unauthorised access to the fixed ladders.", "reason": "Employers are required to provide devices to prevent unauthorised persons.", "recommendation": "Install a ladder guard to the fixed ladders.", "priority": "2"}, {"id": "i186", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/G4/xx", "name": "Work at Height \u2013 Inspections of the Mansafe are Undertaken", "finding": "Inspections of the Mansafe were not being undertaken.", "reason": "Employers are required to ensure that work equipment exposed to conditions causing deterioration which is liable to result in dangerous situations is inspected and that records are maintained up to date.", "recommendation": "Prohibit use of the Mansafe system. Arrange for the Mansafe system to be inspected and that any recommendations within the report are implemented. Records are maintained up to date. Ensure that Mansafe systems are inspected annually.", "priority": "1"}, {"id": "i187", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/G5/xx", "name": "Work at Height \u2013 Harness/Restrain Lanyard Inspections Undertaken", "finding": "Inspections of harnesses/restrain lanyards were not being undertaken.", "reason": "Employers are required to ensure that work equipment exposed to conditions causing deterioration which is liable to result in dangerous situations is inspected and that records are maintained up to date.", "recommendation": "Arrange for harnesses/restrain lanyards to be every 6-months. Ensure that records are maintained up to date.", "priority": "1"}, {"id": "i188", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/G6/xx", "name": "Work at Height \u2013 Edge Protection System Inspections Undertaken", "finding": "An edge protection system had been installed. However, inspections of the edge protection system were not being undertaken.", "reason": "Employers are required to ensure that work equipment exposed to conditions causing deterioration which is liable to result in dangerous situations is inspected and that records are maintained up-to-date.", "recommendation": "Arrange for the inspection of the edge protection system to be carried out, tags (dated) affixed and ensure that if any remedial actions were identified, that they are implemented in order of priority and records maintained to verify works were completed. Records are maintained up to date. Ensure that edge protection systems are inspected annually.", "priority": "2"}, {"id": "i189", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/A1/xx", "name": "Workplace Safety \u2013 Maintenance Record Available", "finding": "Up-to-date maintenance records for the premises were not available, Refer to: 3.6 Electrical safety. 3.11 Gas safety. 3.12 Passenger lift; and 3.17 Water safety.", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Ensure the premises is maintained and that documentation is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "i190", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/A2/xx", "name": "Workplace Safety - Housekeeping Standard Adequate", "finding": "The overall standard of housekeeping was inadequate.", "reason": "Good housekeeping and waste management is essential to reduce sources of fuel in the event of a fire or trips hazards/obstructions and there is a requirement to ensure that workplaces are kept sufficiently clean.", "recommendation": "Improve and monitor housekeeping daily as part of fire, health and safety management.", "priority": "2"}, {"id": "i191", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/B1/xx", "name": "Workplace Safety \u2013 Ventilation inside the Workplace Sufficient", "finding": "Workers reported issues of ventilation inside the workplace.", "reason": "There is a requirement that effective and suitable provisions are made to ensure that the workplace is ventilated by a sufficient quantity of fresh or purified air.", "recommendation": "Ensure that Planned Preventative Maintenance (PPM) is place for air-conditioning system/Heating, Ventilation, and Air Conditioning (HVAC) systems.", "priority": "2"}, {"id": "i192", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/C1/xx", "name": "Workplace Safety \u2013 Temperature Inside the Workplace Sufficient", "finding": "Workers reported issues of temperature inside the workplace.", "reason": "The temperature inside the workplace should provide reasonable comfort without the need for special clothing.", "recommendation": "Ensure that controls are in place to maintain: Minimum temperatures of: 16oc for normal activities; and 13oc for physically demanding tasks. In extreme heat, increasing ventilation, providing fans, supplying drinking water, and allowing more frequent breaks. Ensure that Planned Preventative Maintenance (PPM) is place for central heating systems, over-door/curtain heaters, air-conditioning system/ Heating, Ventilation, and Air Conditioning (HVAC) systems.", "priority": "2"}, {"id": "i193", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/D1/xx", "name": "Workplace Safety \u2013 Lighting Levels Sufficient", "finding": "Workers reported issues of lighting levels (i.e. too bright/dim).", "reason": "There is a requirement that the workplace shall have suitable and sufficient lighting and so far as is reasonably practicable, be by natural light.", "recommendation": "Arrange for a lighting level assessment to be carried out and implement controls measures.", "priority": "2"}, {"id": "i194", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/E1/xx", "name": "Workplace Safety \u2013 Goods Stored do not Pose of Risk of Falling", "finding": "There was an accumulation of stored materials/goods reducing the space to move within the room, increasing the likelihood of trips or being struck by falling items.", "reason": "There is a requirement that rooms where persons work shall have sufficient floor area, height and unoccupied space for purposes of health, safety and welfare.", "recommendation": "Reduce the amount of stored materials/goods. Install shelving systems and provide storage boxes. Ensure that this is monitored daily as part of fire, health and safety management. Monthly workplace fire, health and safety checklists are completed.", "priority": "2"}, {"id": "i195", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/F1/xx", "name": "Workplace Safety \u2013 Items not Stored Beneath Work Desks", "finding": "Items were being stored beneath work desks, reducing the amount of leg room.", "reason": "There is a requirement that workstations shall be so arranged that it is suitable both for any person at work in the workplace who is likely to work at that workstation and for any work of the undertaking which is likely to be done there.", "recommendation": "Remove the items stored beneath work desks. Ensure that this is monitored daily as part of fire, health and safety management. Monthly workplace fire, health and safety checklists are completed.", "priority": "2"}, {"id": "i196", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G1/xx", "name": "Workplace Safety \u2013 No Items Stored in Walkways", "finding": "There were stored items in walkways increasing the likelihood of trips.", "reason": "There is a requirement that flooring in a workplace and the surface of every traffic route in a workplace shall be kept free from obstructions and from any article or substance which may cause a person to slip, trip or fall.", "recommendation": "Remove the stored items from walkways. Ensure that workers are reminded to keep walkways clear. Ensure that this is monitored daily as part of fire, health and safety management. Monthly workplace fire, health and safety checklists are completed.", "priority": "2"}, {"id": "i197", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G2/xx", "name": "Workplace Safety \u2013 No Trailing Wires Observed", "finding": "There were trailing wires in walkways increasing the likelihood of trips.", "reason": "There is a requirement that flooring in a workplace and the surface of every traffic route in a workplace shall be kept free from obstructions and from any article or substance which may cause a person to slip, trip or fall.", "recommendation": "Ensure that walkways are kept clear of trailing wires. Where this is not reasonably practicable use floor cable covers that are low-profile and highly visible (i.e. yellow high-visibility bands). Ensure that workers are reminded to keep walkways clear. Ensure that this is monitored daily as part of fire, health and safety management. Monthly workplace fire, health and safety checklists are completed.", "priority": "2"}, {"id": "i198", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G3/xx", "name": "Workplace Safety \u2013 Internal Flooring in Good Condition", "finding": "Aeras of the floor internally was in poor condition, increasing the likelihood of trips.", "reason": "There is a requirement that flooring in a workplace and the surface of every traffic route in a workplace shall be of a construction such that the floor or surface of the traffic route is suitable for the purpose for which it is used.", "recommendation": "Arrange for a competent person to carry out repairs to the flooring. Monthly workplace fire, health and safety checklists are completed. Ensure that workers are encouraged to report damage/defects.", "priority": "2"}, {"id": "i199", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G4/xx", "name": "Workplace Safety \u2013 External Walkways in Good Condition", "finding": "Aeras of walkways externally were in poor condition, i.e. uneven paving, potholes, increasing the likelihood of trips.", "reason": "There is a requirement that flooring in a workplace and the surface of every traffic route in a workplace shall be of a construction such that the floor or surface of the traffic route is suitable for the purpose for which it is used.", "recommendation": "Arrange for a competent person to carry out repairs to the flooring. Monthly workplace fire, health and safety checklists are completed. Ensure that workers are encouraged to report damage/defects.", "priority": "2"}, {"id": "i200", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G5/xx", "name": "Workplace Safety \u2013 Flooring Clear of Trip Hazards", "finding": "Areas of the site had undergone a change of use. Bolt floor fixings were present where shelving/pallet racking systems removed, increasing the likelihood of trips or damage to lifting equipment/aids.", "reason": "There is a requirement that flooring in a workplace and the surface of every traffic route in a workplace shall be kept free from obstructions and from any article or substance which may cause a person to slip, trip or fall.", "recommendation": "Arrange for the bolts to be removed.", "priority": "2"}, {"id": "i201", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G6/xx", "name": "Workplace Safety - Internal Vehicle/Traffic Route Flooring in Good Condition", "finding": "Areas of vehicle/traffic route flooring internally was in poor condition, increasing the likelihood falling loads, loss of vehicle control or tipping over.", "reason": "There is a requirement that flooring in a workplace and the surface of every traffic route in a workplace shall be of a construction such that the floor or surface of the traffic route is suitable for the purpose for which it is used.", "recommendation": "Arrange for a competent person to carry out repairs to the flooring. Monthly workplace fire, health and safety checklists are completed. Ensure that workers are encouraged to report damage/defects.", "priority": "2"}, {"id": "i202", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G7/xx", "name": "Workplace Safety \u2013 No Obstructions at Head Height Observed", "finding": "There were permanent obstructions at head height.", "reason": "There is a requirement that workplaces must be organised in such a way that pedestrians can circulate in a safe manner.", "recommendation": "Install high-visibility (black/yellow) foam protection and display hazard warning signage \u201cmind your head\u201d.", "priority": "2"}, {"id": "i203", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/H1/xx", "name": "Workplace Safety \u2013 Handrails Fitted to Stairs", "finding": "Handrails were not fitted to the stairs.", "reason": "There is a requirement that handrails are provided on all traffic routes which are staircases.", "recommendation": "Arrange for a competent person to install handrails to the stairs in accordance with Approved Document K; Protection from falling, collision and impact.", "priority": "2"}, {"id": "i204", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/I1/xx", "name": "Workplace Safety \u2013 Static Shelving Stacked Correctly", "finding": "Static shelving systems had been installed on the mezzanine. Whilst there was edge protection to prevent falls, there was a risk that goods stored on the shelving system could fall, striking persons below.", "reason": "Employers must, where necessary to prevent injury to any person, take suitable and sufficient steps to prevent, so far as is reasonably practicable, the fall of any material or object.", "recommendation": "Arrange for a competent person to install mesh permitter fencing/edge protection to prevent persons below being struck by falling items.", "priority": "3"}, {"id": "i205", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/I2/xx", "name": "Workplace Safety \u2013 No Risk of Items Falling from Mezzanine", "finding": "An edge protection system had been installed to the mezzanine. Whilst there was edge protection to prevent falls, there was a risk that items could fall, striking persons below.", "reason": "Employers must, where necessary to prevent injury to any person, take suitable and sufficient steps to prevent, so far as is reasonably practicable, the fall of any material or object.", "recommendation": "Arrange for a competent person to install toe/kickboards where pedestrian routes are nearby.", "priority": "2"}, {"id": "i206", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/J1/xx", "name": "Workplace Safety \u2013 Glass Partitions / Doors Fitted with Manifestations", "finding": "There were glass partitions/doors within the building which were not fitted with manifestations, increasing the likelihood of people coming in to contact with while moving about the building.", "reason": "Windows or other transparent or translucent surfaces in a wall or partition and every transparent or translucent surface in a door or gate must be appropriately marked or incorporate features so as, in either case, to make it apparent.", "recommendation": "Manifestations must be fitted to the glass partitions/doors in accordance with Approved Document K; Protection from falling, collision and impact.", "priority": "2"}, {"id": "i207", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/K1/xx", "name": "Workplace Safety \u2013 Windows on Ground Floor do not Open into an Area that People are likely to Collide with them", "finding": "Windows on the Ground Floor opened outwards projecting into an area where people are likely to collide with them.", "reason": "No window shall be in a position when open which is likely to expose any person in the workplace to a risk to his health or safety.", "recommendation": "Arrange for a competent person to install window restrictors to windows on the Ground Floor.", "priority": "2"}, {"id": "i208", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/K2/xx", "name": "Workplace Safety \u2013 Windows on Upper Floors Fitted with Window Restrictors", "finding": "Windows on the upper floor(s) were not fitted with window restrictors.", "reason": "No window shall be in a position when open which is likely to expose any person in the workplace to a risk to his health or safety.", "recommendation": "Arrange for a competent person to install window restrictors to windows on the upper floor(s).", "priority": "2"}, {"id": "i209", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/Q1/xx", "name": "Welfare - Toilets and Hand-Washing Facilities in Good Condition", "finding": "Toilets and washing facilities were in poor condition.", "reason": "Suitable and sufficient sanitary conveniences must be provided at readily accessible places and kept in a clean and orderly condition.", "recommendation": "Arrange for a competent person to carry out repairs or replace toilets and hand-washing facilities. Ensure that toilets and hand-washing facilities are inspected as part of monthly workplace health and safety checks. Ensure that workers are encouraged to report damage/defects.", "priority": "2"}, {"id": "i210", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/Q2/xx", "name": "Welfare \u2013 Toilets and Hand-Washing Facilities Available", "finding": "Toilets and hand-washing facilities were not found in a clean and orderly condition.", "reason": "Suitable and sufficient sanitary conveniences must be provided at readily accessible places and kept in a clean and orderly condition.", "recommendation": "Ensure that the toilets and hand-washing facilities provided are kept in a clean and orderly condition. Ensure that toilets and hand-washing facilities are inspected as part of monthly workplace health and safety checks. Monitor as part of day-to-day fire, health and safety management. Ensure that workers are made aware of site rules regarding the use of toilets and hand-washing facilities.", "priority": "2"}, {"id": "i211", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/R1/xx", "name": "Welfare \u2013 Drinking Water Provided", "finding": "There was no provision of drinking water.", "reason": "An adequate supply of wholesome drinking water must be provided for all persons at work in the workplace.", "recommendation": "Provide a floor standing bottle-fed water dispenser with cool and cold taps.", "priority": "2"}, {"id": "i212", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/S1/xx", "name": "Welfare \u2013 Accommodation for Work Clothing / Personal Clothing Provided", "finding": "Accommodation for work clothing/personal clothing was not provided, so that it can be hung in a clean, warm, dry well-ventilated place.", "reason": "Suitable and sufficient accommodation must be provided for the clothing of any person at work which is not worn during working hours; and for clothing which is worn by any person at work but which is not taken home.", "recommendation": "Provide accommodation for work clothing/personal clothing, so that it can be hung in a clean, warm, dry well-ventilated place.", "priority": "2"}, {"id": "i213", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/T1/xx", "name": "Welfare \u2013 Changing Rooms Provided for Workers", "finding": "There was no changing room provided for workers who are required to change into workwear and store personal clothing.", "reason": "Suitable and sufficient facilities must be provided for any person at work in the workplace to change clothing in all cases where the person has to wear special clothing for the purpose of work", "recommendation": "Provide changing rooms and lockers.", "priority": "2"}, {"id": "i214", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/U1/xx", "name": "Workplace Safety \u2013 Physical Safeguards in Place to Limited Unauthorised Access", "finding": "There was a lack of physical safeguards around the site to reduce the likelihood of unauthorised access.", "reason": "It is the duty of every employer to ensure, so far as is reasonably practicable, the health, safety and welfare at work of all his employees.", "recommendation": "Specify what/and where additional physical safeguards are needed.", "priority": "2"}, {"id": "i215", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/U2/xx", "name": "Workplace Safety \u2013 Physical Safeguards in Place to Limited Unauthorised Access", "finding": "Physical safeguards had been installed around the site to reduce the likelihood of unauthorised access. However, they were in poor condition.", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Arrange for a competent person to repair/or replace the physical safeguards. Ensure that physical barriers are inspected as part of monthly workplace health and safety checks. Monitor as part of day-to-day fire, health and safety management. Ensure that workers are encouraged to report damage/defects.", "priority": "2"}, {"id": "i216", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/V1/xx", "name": "Welfare \u2013 Rest Facilities in Good Condition", "finding": "Rest facilities were in poor condition.", "reason": "Suitable and sufficient rest facilities must be provided at readily accessible places and kept in a clean and orderly condition.", "recommendation": "Arrange for a competent person to carry out repairs or replace damaged facilities. Ensure that rest areas are inspected as part of monthly workplace health and safety checks. Ensure that workers are encouraged to report damage/defects.", "priority": "3"}, {"id": "i217", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/V2/xx", "name": "Welfare \u2013 Sufficient Seating and Tables Provided for Workers", "finding": "Sufficient seating and tables were not provided for the number of workers likely to use them at one time.", "reason": "Rest rooms and rest areas must be provided with an adequate number of tables and adequate seating with backs for the number of persons at work likely to use them at any one time", "recommendation": "Provide additional seating and tables within the rest area.", "priority": "2"}, {"id": "i218", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/W1/xx", "name": "Safety Signage \u2013 Sufficient Signage in Place", "finding": "There was a lack of safety signage.", "reason": "There is a requirement to ensure that safety signs are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Ensure that the following signage is displayed: First aid (detail names/location of first aid kit). Caution hot water (adjacent to hot taps). No unauthorised access (plant room). Head impact (low ceiling). Lift trucks. Caution mind the step. Fragile roof. Mandatory PPE signage (ears/eyes/face/head/high vis/foot). Note: where more than one sign is required, use possible use a single multi-message sign.", "priority": "2"}, {"id": "i219", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/W2/xx", "name": "Safety Signage \u2013 In Good Condition", "finding": "Safety signage was in poor condition (worn/faded/damaged).", "reason": "There is a requirement to ensure that safety signs are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Replace worn/faded/damaged safety signage. Note: where more than one sign is required, use possible use a single multi-message sign.", "priority": "2"}, {"id": "i220", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/G8/xx", "name": "Workplace Safety \u2013 External Vehicle/Traffic Route Flooring in Good Condition", "finding": "Areas of vehicle/traffic route flooring externally was in poor condition, increasing the likelihood falling loads, loss of vehicle control or tipping over.", "reason": "There is a requirement that flooring in a workplace and the surface of every traffic route in a workplace shall be of a construction such that the floor or surface of the traffic route is suitable for the purpose for which it is used.", "recommendation": "Arrange for a competent person to carry out repairs to the flooring. Monthly workplace fire, health and safety checklists are completed. Ensure that workers are encouraged to report damage/defects.", "priority": "2"}, {"id": "i221", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/I3/xx", "name": "Workplace Safety \u2013 Pallet Safety Gate Installed on Mezzanine", "finding": "Edge protection had been installed the mezzanine. However, there was no pallet safety gate installed.", "reason": "Where work is carried out at height, every employer is required to take suitable and sufficient measures to prevent, so far as is reasonably practicable, any person falling a distance liable to cause personal injury.", "recommendation": "Arrange for competent person to install a pallet safety gate to the mezzanine.", "priority": "2"}, {"id": "i222", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/I4/xx", "name": "Workplace Safety \u2013 Pallet Racking Running Parallel to Walkways Fitted with Safety Mesh", "finding": "Pedestrian walkways ran parallel to sections of pallet racking systems, which were not fitted with pallet racking safety mesh backing. There was a risk that goods stored on the racking system could fall, striking persons below.", "reason": "Employers must, where necessary to prevent injury to any person, take suitable and sufficient steps to prevent, so far as is reasonably practicable, the fall of any material or object.", "recommendation": "Arrange for a competent person to install pallet racking safety mesh backing where pedestrian routes are nearby.", "priority": "2"}, {"id": "i223", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/L1/xx", "name": "Workplace Safety \u2013 Separation between Pedestrians and Vehicles were in Place", "finding": "There was no separation of pedestrians and vehicles.", "reason": "Every workplace must be organised in such a way that pedestrians and vehicles can circulate in a safe manner.", "recommendation": "Mark out pedestrian/vehicle routes using floor markings and physical barriers.", "priority": "2"}, {"id": "i224", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/M1/xx", "name": "Workplace Safety \u2013 Signage/Road/Floor Markings Warning of Traffic Routes were in Place", "finding": "There was a lack of signage/road/floor markings warning of potential hazards in traffic routes used by vehicles on site.", "reason": "All traffic routes must be suitably indicated where necessary for reasons of health or safety.", "recommendation": "Display hazard/mandatory/prohibition signage at pedestrian and vehicle entrances. Mark out pedestrian/vehicle routes using floor marking or physical barriers.", "priority": "2"}, {"id": "i225", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/N1/xx", "name": "Workplace Safety \u2013 Directions to Indicate Buildings, Departments, etc. were Displayed at Site Entrances", "finding": "There was a lack of directions at the site entrance to indicate buildings, departments, etc.", "reason": "All traffic routes must be suitably indicated where necessary for reasons of health or safety.", "recommendation": "Display signage at the entrance to site indicating: Staff/visitor parking. Reception. Yard Office & Yard Note: Include site safety rules, i.e. speed restriction, no smoking and hazards, i.e. pedestrians, lift truck operations, etc.", "priority": "2"}, {"id": "i226", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/P1/xx", "name": "Workplace Safety \u2013 Planned Preventative Maintenance Plan (PPM) in Place for Vehicle Shutter Door(s).", "finding": "There was no Planned Preventative Maintenance Plan (PPM) in place for the vehicle shutter door(s).", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Ensure that PPM is in place for the vehicle shutter door(s) and that records are maintained up to date.", "priority": "2"}, {"id": "i227", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/P2/xx", "name": "Workplace Safety - Planned Preventative Maintenance Plan (PPM) for Vehicle Shutter Door(s) Overdue", "finding": "Planned Preventative Maintenance (PPM) for vehicle shutter doors was overdue.", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Ensure that PPM is in place for the vehicle shutter door(s) and that records are maintained up to date.", "priority": "2"}, {"id": "i228", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/P3/xx", "name": "Workplace Safety - Vehicle Shutter Door(s) Remedial/Correction Actions Completed", "finding": "Remedial actions for the vehicle shutter doors were detailed in the most recent Planned Preventative Maintenance (PPM) documentation. However, there were no records to verify that works had been completed.", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Ensure that the remedial works for the vehicle shutter doors are implemented and records are readily to verify that works were completed.", "priority": "2"}, {"id": "i229", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/P4/xx", "name": "Workplace Safety - Planned Preventative Maintenance Plan (PPM) for High-Speed / Fast Action Doors in Place", "finding": "There was no Planned Preventative Maintenance Plan (PPM) in place for the high-speed shutter/fast action door(s).", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Ensure that PPM is in place for the high-speed shutter/fast action door(s) and that records are maintained up to date.", "priority": "2"}, {"id": "i230", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/P5/xx", "name": "Workplace Safety - Planned Preventative Maintenance Plan (PPM) for High-Speed / Fast Action Doors up to date", "finding": "Planned Preventative Maintenance (PPM) for high-speed shutter/fast action door(s) was overdue.", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Ensure that PPM is in place for the high-speed shutter/fast action door(s) and that records are maintained up to date.", "priority": "2"}, {"id": "i231", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.19", "topicName": "Workplace Safety (Incl. Slips and Trips)", "ref": "3.19/P6/xx", "name": "Workplace Safety - High-Speed / Fast Action Door Remedial/Correction Actions Completed", "finding": "Remedial actions for the high-speed shutter/fast action door(s) were detailed in the most recent Planned Preventative Maintenance (PPM) documentation. However, there were no records to verify that works had been completed.", "reason": "There is a requirement that the workplace, equipment, devices and systems are maintained (including cleaned as appropriate) in an efficient state/working order and in good repair.", "recommendation": "Ensure that the remedial works for the high-speed shutter/fast action door(s) are implemented and records are readily to verify that works were completed.", "priority": "2"}, {"id": "i232", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/A1/xx", "name": "Work Equipment \u2013 Product Safety Requirements Considered when Selecting New work Equipment/Machinery", "finding": "Product safety requirements, i.e. noise/vibration, were not being considered when selecting new work equipment/machinery.", "reason": "In selecting work equipment, employers must have regard to the working conditions and to the risks to the health and safety of persons which exist in the premises or undertaking in which that work equipment is to be used and any additional risk posed by the use of that work equipment.", "recommendation": "Ensure that the Provision and Use of Work Equipment Policy and Procedure is implemented when selecting new work equipment/machinery.", "priority": "2"}, {"id": "i233", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/B1/xx", "name": "Work Equipment \u2013 Risk Assessments Completed for Work Activities taking into Account the Type of Work Equipment", "finding": "Risk assessments had not been completed for work activities taking into account the type of work equipment.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Create a risk assessment register identifying all work areas and activities. Complete risk assessments for the work areas and activities. The results of the risk assessments must be communicated to workers.", "priority": "1"}, {"id": "i234", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/C1/xx", "name": "Work Equipment - Planned Preventative Maintenance (PPM) for Work Equipment in Place", "finding": "There were no records of Planned Preventative Maintenance (PPM) for work equipment.", "reason": "Employer must ensure that work equipment is maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that a PPM program is implemented for work equipment. Maintain up-to-date work equipment maintenance records.", "priority": "2"}, {"id": "i235", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/C2/xx", "name": "Work Equipment - Planned Preventative Maintenance (PPM) for Work Equipment is Up to Date", "finding": "Records indicated that Planned Preventative Maintenance (PPM) for work equipment was overdue.", "reason": "Employer must ensure that work equipment is maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that a PPM program is implemented for work equipment. Maintain up-to-date work equipment maintenance records.", "priority": "2"}, {"id": "i236", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/C3/xx", "name": "Work Equipment \u2013 Pre-Use Checks Completed", "finding": "Recorded pre-use checks of work equipment by workers was not being carried out.", "reason": "There is a requirement that work equipment exposed to conditions causing deterioration which is liable to result in dangerous situations is inspected and records maintained.", "recommendation": "Ensure that recorded pre-use checks (refer to manufacturers operator manual) of work equipment are carried out. Maintain up-to-date records of pre-use operator checks.", "priority": "2"}, {"id": "i237", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/D1/xx 3.20/E1/xx", "name": "Work Equipment \u2013 Workers have received Training for Work Equipment in Use", "finding": "There was no evidence that workers had received training for the work equipment they were operating.", "reason": "Employers must ensure that all persons who use work equipment have received adequate training for purposes of health and safety, including training in the methods which may be adopted when using the work equipment, any risks which such use may entail and precautions to be taken.", "recommendation": "Ensure that workers are provided with information, instruction and training for the work equipment that they are operating. Develop Safe Operating Procedures for work equipment and communicate to workers. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "1"}, {"id": "i238", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/F1/xx", "name": "Work Equipment \u2013 Work Equipment Labelled with UKCA or CE Markings", "finding": "Work equipment used on site did were not labelled with either UKCA (UK Conformity Assessed) or CE marking.", "reason": "Every employer must ensure that an item of work equipment conforms at all times with any essential requirements, other than requirements which, at the time of its being first supplied or put into service in any place in which these Regulations apply, did not apply to work equipment of its type (after 31st December 1992).", "recommendation": "Remove and replace work equipment from site which is not labelled with either UKCA (UK Conformity Assessed) or CE marking. Ensure that new work equipment is labelled with UKCA (UK Conformity Assessed) or CE marking and has the Declaration of Conformity documentation.", "priority": "1"}, {"id": "i239", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/G1/xx", "name": "Work Equipment \u2013 Machinery Guards in Place", "finding": "There was unguarded machinery.", "reason": "Measures must be taken to prevent access to any dangerous part of machinery.", "recommendation": "Install fixed/interlocked guarding to machinery.", "priority": "1"}, {"id": "i240", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/G2/xx", "name": "Work Equipment - Machinery Guards in Place", "finding": "Machine guarding had been removed from machinery.", "reason": "Measures must be taken to prevent access to any dangerous part of machinery.", "recommendation": "Replace the missing machine guarding. Ensure that workers carry out recorded pre-use checks of work equipment/machinery. Remind workers to report unsafe conditions to supervisors/line managers.", "priority": "1"}, {"id": "i241", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/G3/xx", "name": "Work Equipment - Machinery Guards in Good Condition", "finding": "Machine guarding was in poor condition.", "reason": "Machine guarding must be maintained in an efficient state, in efficient working order and in good repair", "recommendation": "Replace the damaged machine guarding. Ensure that workers carry out recorded pre-use checks of work equipment/machinery. Remind workers to report unsafe conditions to supervisors/line managers.", "priority": "1"}, {"id": "i242", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/H1/xx", "name": "Work Equipment \u2013 Hot Surfaces on Machinery were Protected with Hazard Signage in Place", "finding": "There were hot surfaces on machinery which were not protected or hazard warning signage affixed.", "reason": "Employers must ensure that work equipment, parts of work equipment and any article or substance produced, used or stored in work equipment which, in each case, is at a high or very low temperature shall have protection where appropriate so as to prevent injury to any person by burn, scald or sear.", "recommendation": "Insulate hot surfaces of machinery. Installed fixed permitter guarding. Display hot surface hazard warning signage.", "priority": "1"}, {"id": "i243", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/I1/xx", "name": "Work Equipment \u2013 Machinery/Equipment Could Not be Restarted with Interlocking Guards, etc in Place", "finding": "Work equipment/machinery could be restarted, although safety measures, i.e. interlocked guarding, were in place.", "reason": "Every employer shall ensure that, where appropriate, work equipment is provided with one or more controls for the purposes of starting the work equipment (including re-starting after a stoppage for any reason).", "recommendation": "Arrange for a competent person to investigate operational controls and implement controls to prevent equipment/machinery start up when interlocked guarding is open.", "priority": "1"}, {"id": "i244", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/J1/xx", "name": "Work Equipment \u2013 Emergency Stop Control Function Checks Documented", "finding": "Emergency stop controls were fitted to work equipment/machinery. However, there were no recorded function checks.", "reason": "Emergency stop controls must be provided where the other safeguards in place are not adequate to prevent risk when an irregular event occurs and bring the equipment to a safe condition in a safe manner.", "recommendation": "Ensure that recorded pre-use checks of work equipment are carried out, including e-stop function checks. Maintain up-to-date records of pre-use operator checks.", "priority": "1"}, {"id": "i245", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/K1/xx", "name": "Work Equipment \u2013 Controls for Work Equipment Clearly Marked", "finding": "Controls for work equipment were not clearly marked.", "reason": "Employers must ensure that all controls for work equipment are clearly visible and identifiable, including by appropriate marking where necessary.", "recommendation": "Ensure that controls for work equipment are clearly visible and identifiable.", "priority": "1"}, {"id": "i246", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/M1/xx", "name": "Work Equipment - Equipment/Machinery Could be Isolated from Sources of Energy", "finding": "Work equipment/machinery could not be isolated from the sources of energy.", "reason": "Employer must ensure that where appropriate work equipment is provided with suitable means to isolate it from all its sources of energy.", "recommendation": "Arrange for a competent person to installed devices so that equipment/machinery can be isolated form sources of energy and locked off/out.", "priority": "2"}, {"id": "i247", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/N1/xx", "name": "Work Equipment \u2013 Equipment/Machinery Bolted to the Floor", "finding": "Work equipment/machinery used on site had not been bolted to the floor.", "reason": "Employers must ensure that work equipment or any part of work equipment is stabilised by clamping or otherwise where necessary for purposes of health or safety.", "recommendation": "Ensure that work equipment/machinery is bolted to the floor.", "priority": "2"}, {"id": "i248", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/N2/xx", "name": "Work Equipment - Equipment/Machinery Bolted to Workbench", "finding": "Work equipment/machinery used on site had not been bolted to the workbench.", "reason": "Every employer shall ensure that work equipment or any part of work equipment is stabilised by clamping or otherwise where necessary for purposes of health or safety.", "recommendation": "Ensure that work equipment/machinery is bolted to the workbench.", "priority": "2"}, {"id": "i249", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/O1/xx", "name": "Work Equipment \u2013 Lighting where Equipment/Machinery Located is Sufficient", "finding": "There was a lack off lighting where work equipment/machinery was used/operated.", "reason": "Employer must ensure that suitable and sufficient lighting, which takes account of the operations to be carried out, is provided at any place where a person uses work equipment.", "recommendation": "Install additional lighting where work equipment/machinery was used/operated.", "priority": "1"}, {"id": "i250", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/P1/xx", "name": "Work Equipment \u2013 Hazard Signage Displayed on Equipment/Machinery", "finding": "Hazard warning signage was not displayed on work equipment/machinery.", "reason": "Employer must ensure that work equipment is marked in a clearly visible manner with any marking appropriate for reasons of health and safety.", "recommendation": "Affix hazard warning signage on work equipment/machinery.", "priority": "2"}, {"id": "i251", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/P2/xx", "name": "Work Equipment - Equipment/Machinery Hazard Signage in Good Condition", "finding": "Hazard warning signage displayed in work equipment/machinery was worn/faded.", "reason": "Employer must ensure that work equipment is marked in a clearly visible manner with any marking appropriate for reasons of health and safety.", "recommendation": "Replace worn/faded hazard waring signage on work equipment/machinery.", "priority": "2"}, {"id": "i252", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/H2/xx", "name": "Work Equipment \u2013 Hot Surfaces on Machinery were Protected with Hazard Signage in Place", "finding": "There were hot surfaces on machinery which were not protected or hazard warning signage affixed.", "reason": "Employers must ensure that work equipment, parts of work equipment and any article or substance produced, used or stored in work equipment which, in each case, is at a high or very low temperature shall have protection where appropriate so as to prevent injury to any person by burn, scald or sear.", "recommendation": "Insulate hot surfaces of machinery. Installed fixed permitter guarding. Display hot surface hazard warning signage.", "priority": "1"}, {"id": "i253", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/I2/xx", "name": "Work Equipment \u2013 Machinery/Equipment Could Not be Restarted with Interlocking Guards, etc in Place", "finding": "Work equipment/machinery could be restarted, although safety measures, i.e. interlocked guarding, were in place.", "reason": "Every employer shall ensure that, where appropriate, work equipment is provided with one or more controls for the purposes of starting the work equipment (including re-starting after a stoppage for any reason).", "recommendation": "Arrange for a competent person to investigate operational controls and implement controls to prevent equipment/machinery start up when interlocked guarding is open.", "priority": "1"}, {"id": "i254", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.20", "topicName": "Work Equipment", "ref": "3.20/Q1/xx", "name": "Work Equipment \u2013 Keys were not left in Unattended Equipment/Machinery", "finding": "Keys were left in unattended work equipment/machinery control panels.", "reason": "Work equipment should be prevented from unauthorised start-up.", "recommendation": "Ensure that workers are reminded to remove keys from the work equipment/machinery control panels when not in use and left unattended.", "priority": "1"}, {"id": "i255", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/A1/xx", "name": "Pressure Systems Safety - Written Scheme of Examination (WSE) for Commercial Coffee Machine(s) Available", "finding": "A copy of the Written Scheme of Examination (WSE) for the commercial coffee machine(s) was not readily available at the time of the visit.", "reason": "Users of an installed system and owner of a mobile system shall not operate the system or allow it to be operated unless he has a written scheme for the periodic examination.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the WSE for the coffee machine(s).", "priority": "1"}, {"id": "i256", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/A2/xx", "name": "Pressure Systems Safety -", "finding": "The Written Scheme of Examination (WSE) for the for the commercial coffee machine(s) had expired.", "reason": "Users of an installed system and owner of a mobile system shall not operate the system or allow it to be operated unless he has a written scheme for the periodic examination.", "recommendation": "Arrange for the Written Scheme of Examination to be reviewed.", "priority": "1"}, {"id": "i257", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/A3/xx", "name": "Pressure Systems Safety - Written Scheme of Examination (WSE) for Pressure System Available", "finding": "A copy of the Written Scheme of Examination (WSE) for the pressure system was not readily available at the time of the visit.", "reason": "Users of an installed system and owner of a mobile system shall not operate the system or allow it to be operated unless he has a written scheme for the periodic examination.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the WSE for the pressure system.", "priority": "1"}, {"id": "i258", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/A4/xx", "name": "Pressure Systems Safety - Written Scheme of Examination (WSE) for Pressure System Up to Date", "finding": "The Written Scheme of Examination (WSE) for the pressure system had expired.", "reason": "Users of an installed system and owner of a mobile system shall not operate the system or allow it to be operated unless he has a written scheme for the periodic examination.", "recommendation": "Arrange for the Written Scheme of Examination to be reviewed.", "priority": "1"}, {"id": "i259", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/B1/xx", "name": "Pressure Systems Safety - Thorough Annual PSSR Testing & Boiler Inspection Documentation for Commercial Coffee Machine Up to Date", "finding": "The annual PSSR Testing & Boiler Inspection for the commercial coffee machine(s) was overdue.", "reason": "There is a requirement to ensure that those parts of the pressure system included in the scheme of examination are examined by a competent person within the intervals specified in the scheme.", "recommendation": "Arrange for a competent engineer to carry out the annual PSSR Testing & Boiler Inspection for the commercial coffee machine(s). Ensure that if any remedial actions were identified that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a annual PSSR Testing & Boiler Inspection program is put in place and that records are maintained up to date.", "priority": "1"}, {"id": "i260", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/B2/xx", "name": "Pressure Systems Safety - Thorough Annual PSSR Testing & Boiler Inspection Documentation for Commercial Coffee Machine Available", "finding": "Thorough annual PSSR Testing & Boiler Inspection documentation for the commercial coffee machine(s) was not available at the time of the visit.", "reason": "There is a requirement to ensure that those parts of the pressure system included in the scheme of examination are examined by a competent person within the intervals specified in the scheme.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the PSSR Testing & Boiler Inspection documentation. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that PSSR Testing & Boiler Inspections are maintained up to date.", "priority": "1"}, {"id": "i261", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/B3/xx", "name": "Pressure Systems Safety - Thorough Examination Documentation for Pressure System Up to Date", "finding": "The Thorough Examination of the pressure system was overdue.", "reason": "There is a requirement to ensure that those parts of the pressure system included in the scheme of examination are examined by a competent person within the intervals specified in the scheme.", "recommendation": "Arrange for a competent engineer to carry out the Thorough Examination of the pressure system. Ensure that if any remedial actions were identified that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a Thorough Examination program is put in place and that records are maintained up to date.", "priority": "1"}, {"id": "i262", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/B4/xx", "name": "Pressure Systems Safety - Thorough Examination Documentation for Pressure System Available", "finding": "Thorough Examination documentation for the pressure system was not available at the time of the visit.", "reason": "There is a requirement to ensure that those parts of the pressure system included in the scheme of examination are examined by a competent person within the intervals specified in the scheme.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the Thorough Examination documentation. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that Thorough Examinations are maintained up to date.", "priority": "1"}, {"id": "i263", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/C1/xx", "name": "Pressure Systems Safety \u2013 Coffee Machine Information, Instruction and Training Provided", "finding": "There was no evidence that workers operating the commercial coffee machine(s) have been provided with information, instruction and training.", "reason": "The user of an installed system and the owner of a mobile system shall provide for any person operating the system adequate and suitable instructions for the safe operation of the system and the action to be taken in the event of any emergency.", "recommendation": "Ensure that workers who operate commercial coffee machines are provided with information, instruction and training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i264", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/C2/xx", "name": "Pressure Systems Safety \u2013 Pressure System Information, Instruction and Training Provided", "finding": "There was no evidence that workers operating the pressure system had been provided with information, instruction and training.", "reason": "The user of an installed system and the owner of a mobile system shall provide for any person operating the system adequate and suitable instructions for the safe operation of the system and the action to be taken in the event of any emergency.", "recommendation": "Ensure that workers who operate the pressure system are provided with information, instruction and training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i265", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/D1/xx", "name": "Pressure Systems Safety - Preventative Maintenance Records for Commercial Coffee Machine(s) Available", "finding": "Up-to-date records of preventative maintenance of the commercial coffee machine(s), including water filter changes, descaling, and deep cleaning were not readily available at the time of the visit.", "reason": "The user of an installed system and the owner of a mobile system shall ensure that the system is properly maintained in good repair, so as to prevent danger.", "recommendation": "Ensure that up-to-date preventative maintenance records for the commercial coffee machine(s) are available. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a preventative maintenance program is in place.", "priority": "2"}, {"id": "i266", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.21", "topicName": "Pressure Systems Safety", "ref": "3.21/D2/xx", "name": "Pressure Systems Safety \u2013 Preventative Maintenance Records for Pressure Systems Available", "finding": "Up-to-date preventative maintenance records for the pressure system were not available at the time of the visit.", "reason": "The user of an installed system and the owner of a mobile system shall ensure that the system is properly maintained in good repair, so as to prevent danger.", "recommendation": "Ensure that up-to-date preventative maintenance records for the pressure system are available. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a preventative maintenance program is in place.", "priority": "2"}, {"id": "i267", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.22", "topicName": "Activity Risk Assessments", "ref": "3.22/A1/xx", "name": "Activity Risk Assessments - Completed for All Areas", "finding": "Risk assessments had not been completed for work areas and activities.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work
