on. Arrange for a BCP to be developed that to take account possible significant events that could occur. Communicate the BCP to those with allocated responsibilities. Ensure that BCP is practised, i.e. table-top exercise, working through a range of scenarios and establish the effectiveness of your responses or practices evacuations/lockdowns. Maintain up-to-date records.", "priority": "2"}, {"id": "i69", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.7", "topicName": "Emergency Arrangements", "ref": "3.7/A2/xx 3.7/C2/xx 3.7/D2/xx 3.7/E2/xx", "name": "Emergency Arrangements - Local Emergency Plans in Place", "finding": "There were no local emergency plans in place.", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Planning for incidents and emergencies is essential for several reasons, safety, resilience, financial stability and reputation. Develop emergency plans that to take account possible significant events that could occur, for example: Violence/weapons (lockdowns/invacuations); Bomb threats. Building collapse/debris falling from a building. Gas leaks and explosion. Flooding. Loss of building services, i.e. water supply, electricity, gas. Chemical spills. Disturbance of asbestos (if found to be present). Adverse weather. Major accident, i.e. fire. Communicate the emergency plans to those with allocated responsibilities and workers. Ensure that emergency plans are practised, i.e. table-top exercise, working through a range of scenarios and establish the effectiveness of your responses or practices evacuations/lockdowns. Maintain up-to-date records.", "priority": "2"}, {"id": "i70", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.7", "topicName": "Emergency Arrangements", "ref": "3.7/B1/xx", "name": "Emergency Arrangements \u2013 Emergency Plan for Health & Safety Incidents in Place", "finding": "There were local emergency plans in place. However, there events that could occur on site and no emergency plans were in place.", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Planning for incidents and emergencies is essential for several reasons: safety, resilience, financial stability and reputation. Develop emergency plans that to take account possible significant events that could occur, for example: Violence/weapons. Bomb threats. Building collapse/debris falling from a building. Gas leaks and explosion. Flooding. Loss of building services, i.e. water supply, electricity, gas. Major accident, i.e. fire. Communicate the emergency plans to those with allocated responsibilities and workers.", "priority": "2"}, {"id": "i71", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.7", "topicName": "Emergency Arrangements", "ref": "3.7/C3/xx", "name": "Emergency Arrangements \u2013 Emergency Plans Identified Appointed Persons and their Roles and Responsibilities", "finding": "The emergency plans did not identify appointed persons and their roles and responsibilities.", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Review the emergency plans and ensure that persons with appointed roles and responsibilities are documented. Ensure that the emergency plans are communicated to those appointed with roles and responsibilities. Provide additional information, instruction and training, i.e. operation of fire alarm control panel, isolation points for water or gas. Ensure that emergency plans are practised, i.e. table-top exercise, working through a range of scenarios and establish the effectiveness of your responses or practices evacuations/lockdowns.", "priority": "2"}, {"id": "i72", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.7", "topicName": "Emergency Arrangements", "ref": "3.7/C4/xx", "name": "Emergency Arrangements \u2013 Appointed Persons Understood their Role in the Emergency Plan and had been Provided with Information, Instruction and Training", "finding": "The emergency plans identified those appointed with roles and responsibilities. However, they did not understand what they should do in an emergency nor provided with any information, instruction and training.", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Ensure that the emergency plans are communicated to those appointed with roles and responsibilities. Provide additional information, instruction and training, i.e. operation of fire alarm control panel, isolation points for water or gas. Ensure that emergency plans are practised, i.e. table-top exercise, working through a range of scenarios and establish the effectiveness of your responses or practices evacuations/lockdowns.", "priority": "2"}, {"id": "i73", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.7", "topicName": "Emergency Arrangements", "ref": "3.7/D3/xx", "name": "Emergency Arrangements \u2013 Emergency Plans Communicated to Workers", "finding": "There were local emergency plans in place. However, these had not been communicated to workers.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that the emergency plans are communicated to workers so that they understand what actions to take.", "priority": "2"}, {"id": "i74", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.7", "topicName": "Emergency Arrangements", "ref": "3.7/E3/xx", "name": "Emergency Arrangements \u2013 Records Verified Emergency Plan Scenarios had been Practiced", "finding": "There were no records to verify that emergency plan scenarios had been practised.", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Ensure that emergency plans are practised, i.e. table-top exercise, working through a range of scenarios and establish the effectiveness of your responses or practices evacuations/lockdowns. Maintain up-to-date records.", "priority": "3"}, {"id": "i75", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.8", "topicName": "Enforcement Visits", "ref": "3.8/A1/xx", "name": "Enforcement Visits \u2013 No Prohibition Notices Issued", "finding": "The company had been issued with a prohibition notice.", "reason": "Enforcement/prohibition notices are part of the HSE\u2019s regulatory functions and be served during or following a inspection where non-compliance with health and safety regulations were identified.", "recommendation": "Cease the prohibited activity by the date specified in the notice. Implement remedial measures within the specified timescale to address dangerous activity.", "priority": "1"}, {"id": "i76", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.8", "topicName": "Enforcement Visits", "ref": "3.8/A2/xx", "name": "Enforcement Visits - No Notices of Contravention Issued", "finding": "The company had been issued with a Notice of Contravention (NOC).", "reason": "Enforcement/prohibition notices are part of the HSE\u2019s regulatory functions and be served during or following an inspection where non-compliance with health and safety regulations were identified.", "recommendation": "Implement remedial measures within the specified timescale to address dangerous activity.", "priority": "1"}, {"id": "i77", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.8", "topicName": "Enforcement Visits", "ref": "3.8/A3/xx", "name": "Enforcement Visits - No Improvement Notices Issued", "finding": "The company had been issued with an Improvement Notice.", "reason": "Enforcement/prohibition notices are part of the HSE\u2019s regulatory functions and be served during or following an inspection where non-compliance with health and safety regulations were identified.", "recommendation": "Implement remedial measures within the specified timescale to address dangerous activity.", "priority": "1"}, {"id": "i78", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.8", "topicName": "Enforcement Visits", "ref": "3.8/B1/xx", "name": "Enforcement Visits \u2013 Procedure to Follow should Enforcement Authority Visit Site Understood by Relevant Parties", "finding": "Those with allocated health and safety roles and responsibilities were unaware of the procedure to follow should Enforcement Authority inspectors visit site.", "reason": "Under the Health and Safety at Work Act, the HSE and other regulators can visit and inspect your premises without any advance notification and can enter your workplace at any reasonable time.", "recommendation": "Make sure management and relevant workers are familiar with the Enforcement Authority Visits Policy and Procedure.", "priority": "2"}, {"id": "i79", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.9", "topicName": "Environmental Management", "ref": "3.9/A1/xx", "name": "Environmental Management \u2013 Substances being Used/Handled on Site were Stored Correctly", "finding": "Various substances were used/handled on site which were not being stored suitably.", "reason": "There is a requirement to make suitable and sufficient assessment of the risk and implement/maintain control measures.", "recommendation": "Ensure that: A COSHH Register is developed and maintained, including quantities of substances. Safety Data Sheets (SDS\u2019s) are obtained and kept readily available on site. COSHH Assessments are completed and control measures implemented; and Substances are stored in accordance with the SDS/COSHH Assessment and within a COSHH cabinets/on bunded trays which can contain 110% of the container\u2019s contents.", "priority": "2"}, {"id": "i80", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/A1/xx", "name": "First Aid \u2013 Training First Aiders Present", "finding": "There were no trained first aiders.", "reason": "Employers are required to provide/or ensure that there is provided, such number of suitable persons (trained/qualified) as is adequate for rendering first-aid to workers if they are injured or become ill at work.", "recommendation": "Carry out a first aid needs assessment to determine: The number of trained first aiders required. Provision of Mental Health First Aiders. Level of first aid training required; and First aid provisions (i.e. type/size/number of first aid kits/provision of defibrillator).", "priority": "2"}, {"id": "i81", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/A2/xx", "name": "First Aid \u2013 Sufficient Number of First Aiders Trained", "finding": "There were insufficient trained first aiders.", "reason": "Employers are required to provide/or ensure that there is provided, such number of suitable persons (trained/qualified) as is adequate for rendering first-aid to workers if they are injured or become ill at work.", "recommendation": "Carry out a first aid needs assessment to determine: The number of trained first aiders required. Provision of Mental Health First Aiders. Level of first aid training required; and First aid provisions (i.e. type/size/number of first aid kits).", "priority": "2"}, {"id": "i82", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/A3/xx", "name": "First Aid \u2013 Refresher Training Completed", "finding": "First aider refresher training must be provided.", "reason": "Employers are required to provide/or ensure that there is provided, such number of suitable persons (trained/qualified) as is adequate for rendering first-aid to workers if they are injured or become ill at work.", "recommendation": "Arrange for refresher first aid training.", "priority": "2"}, {"id": "i83", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/B1/xx", "name": "First Aid \u2013 Signage Displayed Informing of Location of First Aid Kit and Identifying First Aiders", "finding": "There was no signage displayed informing workers of the location of first aid equipment or first aiders.", "reason": "Employers are required to inform workers of the arrangements that have been made in connection with the provision of first-aid, including the location of equipment, facilities and personnel.", "recommendation": "Ensure that signage is displayed identifying the: Location of first aid equipment; and First aiders.", "priority": "2"}, {"id": "i84", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/B2/xx", "name": "First Aider \u2013 No Tablets Present in the First Aid Kit", "finding": "Tablets (i.e. Paracetamol/Ibuprofen)/medicines were in the first aid kit/cupboard where the first aid was located.", "reason": "First aid at work does not include giving tablets or medicines to treat illness and as such, tablets and medicines must not be kept within the workplace.", "recommendation": "Remove tablets/medicines. Ensure that first aiders undertake routine checks of first aid kits. Inform workers that their medication is not to be left in the workplace and not shared with colleagues.", "priority": "1"}, {"id": "i85", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/C1/xx", "name": "First Aid \u2013 All First Aid Contents Fully Present and in Date", "finding": "The contents of the first aid kit(s) had expired/were depleted.", "reason": "Employers are required to provide/ensure that there are provided, such equipment and facilities as are adequate and appropriate in the circumstances for enabling first-aid to be rendered to his workers if they are injured or become ill at work.", "recommendation": "Restock first aid kit(s); Ensure that first aiders undertake routine checks of first aid kits and that they are kept fully stocked and that they have not expired; and Ensure that first aid kits are inspected as part of monthly fire, health and safety workplace checklists.", "priority": null}, {"id": "i86", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/C2/xx", "name": "First Aid \u2013 Defibrillation Battery and Pats in Date", "finding": "The defibrillator battery/pads had expired.", "reason": "Employers are required to maintain defibrillators.", "recommendation": "Replace the defibrillator battery/pads. Ensure that recorded weekly checks are undertaken; and Ensure that any maintenance guidelines in the manufacturer\u2019s operator manual are undertaken.", "priority": "1"}, {"id": "i87", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/C3/xx", "name": "First Aid \u2013 Weekly Defibrillator Checks were Recorded", "finding": "Weekly recorded checks of defibrillators were not being undertaken.", "reason": "Employers are required to maintain defibrillators.", "recommendation": "Ensure that recorded weekly checks are undertaken; and Ensure that any maintenance guidelines in the manufacturer\u2019s operator manual are undertaken.", "priority": "1"}, {"id": "i88", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/D1/xx", "name": "First Aid \u2013 Eye Wash Stations Present", "finding": "There were no eye wash stations.", "reason": "Employers are required to provide/ensure that there are provided, such equipment and facilities as are adequate and appropriate in the circumstances for enabling first-aid to be rendered to his workers if they are injured or become ill at work.", "recommendation": "Ensure that eye wash stations are located is work areas where workers are exposed to substances.", "priority": "1"}, {"id": "i89", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/D2/xx", "name": "First Aid \u2013 Eye Wash Station Contents Fully Present and in Date", "finding": "The contents of the eye wash stations had expired/depleted.", "reason": "Employers are required to provide/ensure that there are provided, such equipment and facilities as are adequate and appropriate in the circumstances for enabling first-aid to be rendered to his workers if they are injured or become ill at work.", "recommendation": "Restock eye wash station(s); Ensure that first aiders undertake routine checks of eye wash stations and that they are kept fully stocked and that they have not expired; and Ensure that first aid kits are inspected as part of monthly fire, health and safety workplace checklists.", "priority": "1"}, {"id": "i90", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.10", "topicName": "First Aid and Accidents", "ref": "3.10/E1/xx", "name": "First Aid \u2013 Accident and Incidents were all Reported", "finding": "Accidents and incidents were not being reported, recorded, notified, and investigated as necessary to prevent recurrences.", "reason": "There is a requirement for employers to record/investigate accidents and incidents and notify the HSE of reportable incidents.", "recommendation": "Ensure that the Accident & Incident Reporting & Investigation Policy and Procedure is implemented.", "priority": "1"}, {"id": "i91", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.11", "topicName": "Gas Safety", "ref": "3.11/A1/xx", "name": "Gas Safety \u2013 Annual Gas Safety Inspection Report Available", "finding": "There was evidence that the annual gas safety inspection had been undertaken, however, a copy of the gas safety inspection report was not readily available at the time of the visit.", "reason": "Annual gas safety inspections on all the gas appliances installed on the property, including the flues and boilers must be undertaken by a Gas Safe registered engineer.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the gas safety inspection report and ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy. Ensure that if any remedial/corrective actions were identified that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i92", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.11", "topicName": "Gas Safety", "ref": "3.11/A2/xx", "name": "Gas Safety \u2013 Annual Gas Safety Inspection Remedial / Corrective Actions Completed", "finding": "The annual gas safety inspection had been completed within the last 12-months, and a copy of the gas safety inspection report was available. However, remedial/corrective actions were detailed in the report and at the time of the visit, there were no records to verify that remedial/corrective actions had been completed.", "reason": "Gas system(s) must be maintained with records available to demonstrate compliance with legislation.", "recommendation": "Engage a Gas Safe registered engineer to implement the remedial/corrective actions in order of priority/specified time scales and ensure that documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i93", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.11", "topicName": "Gas Safety", "ref": "3.11/A3/xx", "name": "Gas Safety \u2013 Gas Safety Inspection Completed", "finding": "It could not be confirmed at the time of the visit when the most recent annual gas safety inspection had been undertaken.", "reason": "Annual gas safety inspections on all the gas appliances installed on the property, including the flues and boilers must be undertaken by a Gas Safe registered engineer.", "recommendation": "If the annual gas safety inspection was not completed within the last 12-months, engage a Gas Safe registered engineer to carry out the annual gas safety inspection. Ensure that if any remedial/corrective actions were identified that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "1"}, {"id": "i94", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.11", "topicName": "Gas Safety", "ref": "3.11/B1/xx", "name": "Gas Safety \u2013 Gas Pipework Clearly Identifiable", "finding": "Gas pipework was not clearly identifiable.", "reason": "All gas pipework in non-domestic premises must be colour coded (i.e. painted or banding with gas marker tape).", "recommendation": "Engage a Gas Safe registered engineer to colour code the gas pipework.", "priority": "2"}, {"id": "i95", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.11", "topicName": "Gas Safety", "ref": "3.11/C1/xx", "name": "Gas Safety \u2013 Relevant Staff Aware of Gas Isolation Points and Understood What Actions to take in the Event of an Emergency", "finding": "Workers with allocated fire, health and safety roles and responsibilities were not aware of the gas isolation point or what action to take in the event of an emergency.", "reason": "There is a requirement to establish appropriate procedures to be followed in the event of serious and imminent danger to persons at work and nominate a sufficient number of competent persons to implement those procedures.", "recommendation": "Ensure that there is a gas emergency plan in place and that it is communicated to workers with allocated fire, health and safety roles and responsibilities.", "priority": "2"}, {"id": "i96", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.11", "topicName": "Gas Safety", "ref": "3.11/D1/xx", "name": "Gas Safety \u2013 LPG Cylinders Stored Securely / Outside", "finding": "LPG cylinders stored insecurely/within the building.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Minimise the amount of LPG cylinders stored on site. LPG cylinders must be stored within a gas cylinder storage cage, kept locked shut and fitted with safety signs and warning notices A risk assessment must be completed and LPG cylinders to be stored externally where there is good natural air ventilation. The LPG cylinder storage area must be: At ground level. Segregated 3m from other store areas (sources of fuel), vegetation and sources ignition. 2m away from final exits/windows/ventilation and conditioning systems /surface water drains of the building. 3m away from vehicle routes. Not directly beneath overhead power or other cables. Accommodate grouping by hazard classification, i.e. full/empty or unserviceable cylinders. Allow for the use manual handling aids, i.e. cylinder trolley. The location of LPG cylinder store must be recorded within the site\u2019s hazardous locations floor plan.", "priority": "1"}, {"id": "i97", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.11", "topicName": "Gas Safety", "ref": "3.11/E1/xx", "name": "Gas Safety \u2013 LPG Cylinder Storage Safety Signage and Warning Notices in Place", "finding": "LPG cylinders were being stored externally within a gas cylinder storage cage/kept locked shut. However, safety signs and warning notices were not displayed on the cage.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Ensure that safety signs and warning notices are displayed on the cage.", "priority": "1"}, {"id": "i98", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/A1/xx", "name": "Passenger Lift - Thorough Examination Documentation Available", "finding": "Thorough examination documentation for the passenger lift(s) was not available at the time of the visit.", "reason": "There is a requirement that a thorough examination of passenger lifts is undertaken every 6-months and it is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the thorough examination documentation. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination is maintained up to date.", "priority": "1"}, {"id": "i99", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/A2/xx", "name": "Passenger Lift \u2013 Thorough Examination was in Date", "finding": "The thorough examination of the passenger lift was overdue.", "reason": "There is a requirement that a thorough examination of passenger lifts is undertake every 6-months.", "recommendation": "Arrange for the thorough examination of the passenger lift to be carried out. Ensure that if any remedial actions were identified that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination program is put in place and that records are maintained up to date.", "priority": "1"}, {"id": "i100", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/B1/xx", "name": "Passenger Lift \u2013 Safe Working Load of the Passenger Lift was Identifiable", "finding": "The Safe Working Load (SWL) of the passenger lift was not identifiable.", "reason": "There is a requirement that the SWL of lifting equipment is clearly marked.", "recommendation": "Ensure that SWL signage (maximum wright/number of people it can carry) for the passenger lift is clearly displayed.", "priority": "2"}, {"id": "i101", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/C1/xx", "name": "Passenger Lift \u2013 Passenger Lift Doors and Lift Car Levels were being Completed", "finding": "Checks of the passenger lift doors (opening/closing/sensors) and that the lift car is level with the floor of the Lift Lobby were not being completed as part of monthly fire, health and safety workplace checklists.", "reason": "A program of routine workplace health and safety inspections are an important part of overall health and safety management; proactively identifying potential hazards for corrective action to prevent incidents.", "recommendation": "Ensure that checks of passenger lift doors (opening/closing/ sensors) and that the lift car is level with the floor of the Lift Lobby (i.e. monthly) are being completed as part of monthly fire, health and safety workplace checklists.", "priority": "2"}, {"id": "i102", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/D1/xx", "name": "Passenger Lift \u2013 Emergency Plan for Trapped Passengers in Place", "finding": "There was no documented emergency plan for trapped passengers in lifts.", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Develop an emergency plan for trapped passengers in lifts. Communicate the emergency plan to those with allocated responsibilities. Ensure that emergency plan is practised. Ensure that function checks of the alarm system within the lift car are carried out and records maintained.", "priority": "2"}, {"id": "i103", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/E1/xx", "name": "Passenger Lift - Machine Guarding to Lifting Equipment in Place", "finding": "Machine guarding to lifting equipment within the Lift Motor Room was not in place.", "reason": "There is a requirement that machinery is safe to use and equipped with machine guarding.", "recommendation": "Ensure that machine guarding is installed to prevent access to dangerous parts of machinery before any part of a person enters a danger zone. Ensure that machine guarding is routinely checked to ensure they continue to provide the necessary protection.", "priority": "2"}, {"id": "i104", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/F1/xx", "name": "Passenger Lift \u2013 Passenger Lift Motor Room Door Locked", "finding": "The Passenger Lift Motor Room door was no locked shut.", "reason": "There is a requirement to take such general precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Ensure that the Passenger Lift Motor Room door is kept locked shut and that this is monitored daily as part of fire, health and safety management.", "priority": "1"}, {"id": "i105", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/G1/xx", "name": "Passenger Lift \u2013 Electrical Safety Rubber Matting within the Lift Motor Room Adjacent to the Control Cabinet", "finding": "There was no electrical safety rubber matting within the Lift Motor Room adjacent to the control cabinet.", "reason": "There is a requirement to take such general precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Fit an electrical safety rubber matting within the Lift Motor Room adjacent to the control cabinet.", "priority": "2"}, {"id": "i106", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.12", "topicName": "Lift Equipment \u2013 Passenger Lift N/A \u2013 whole section", "ref": "3.12/G1/xx", "name": "Passenger Lift \u2013 Poster to Explain Action to take if Someone is Electrocuted Displayed in the Lift Motor Room", "finding": "There was no poster to explain the action to take if someone is electrocuted within the Lift Motor Room.", "reason": "There is a requirement to ensure that safety signs/poster are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Display a poster to explain the action to take if someone is electrocuted within the Lift Motor Room.", "priority": "2"}, {"id": "i107", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/A1/xx", "name": "Lifting Equipment \u2013 MEWP Documentation Available", "finding": "Thorough examination documentation for the Mobile Elevated Working Platform (MEWP) was not available at the time of the visit.", "reason": "There is a requirement that through examinations of MEWPs is undertaken every 6-months and it is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the thorough examination documentation. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination is maintained up-to-date.", "priority": "1"}, {"id": "i108", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/A2/xx", "name": "Lifting Equipment \u2013 Thorough Examination of MEWP was in Date", "finding": "The thorough examination of the Mobile Elevated Working Platform (MEWP) was overdue.", "reason": "There is a requirement that through examinations of MEWPs is undertaken every 6-months and it is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Prohibit access/use of the MEWP and arrange for the thorough examination of the MEWP to be carried out. Ensure that if any remedial actions were identified that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination program is put in place and that records are maintained up to date.", "priority": "1"}, {"id": "i109", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/A3/xx", "name": "Lifting Equipment - Thorough Examination of Lifting Equipment Available", "finding": "Thorough examination documentation for lifting equipment was not available at the time of the visit.", "reason": "There is a requirement that through examinations of lifting equipment is undertaken annually and it is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the thorough examination documentation. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination is maintained up-to-date.", "priority": "1"}, {"id": "i110", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/A4/xx", "name": "Lifting Equipment - Thorough Examination of Lifting Equipment was in Date", "finding": "The thorough examination of the lifting equipment was overdue.", "reason": "There is a requirement that through examinations of lifting equipment is undertaken annually and it is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Prohibit access/use of lifting equipment and arrange for the thorough examination of lifting equipment to be carried out. Ensure that if any remedial actions were identified that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination program is put in place and that records are maintained up to date.", "priority": "1"}, {"id": "i111", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/A5/xx", "name": "Lifting Equipment - Thorough Examination of Lifting Equipment Accessories was Available", "finding": "Thorough examination documentation for lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) was not available at the time of the visit.", "reason": "There is a requirement that through examinations of lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) is undertaken every 6-months and it is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the thorough examination documentation. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination is maintained up-to-date.", "priority": "1"}, {"id": "i112", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/A6/xx", "name": "Lifting Equipment - Thorough Examination of Lifting Equipment Accessories was in Date", "finding": "The thorough examination of the lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) was overdue.", "reason": "There is a requirement that through examinations of lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) is undertaken every 6-months and it is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Prohibit access/use of the lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) and arrange for the thorough examination of the lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) to be carried out. Ensure that if any remedial actions were identified, that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination program is put in place and that records are maintained up-to-date.", "priority": "1"}, {"id": "i113", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/B1/xx", "name": "Lifting Equipment \u2013 Safe Working Loads of the MEWP was Identifiable", "finding": "The Safe Working Load (SWL) of the Mobile Elevated Working Platform (MEWP) was not identifiable.", "reason": "There is a requirement that the SWL of lifting equipment is clearly marked.", "recommendation": "Ensure that SWL signage (maximum weight/number of people it can carry) for the MEWP is clearly displayed.", "priority": "2"}, {"id": "i114", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/B2/xx", "name": "Lifting Equipment - Safe Working Loads of the Lifting Equipment was Identifiable", "finding": "The Safe Working Load (SWL) of the lifting equipment was not identifiable.", "reason": "There is a requirement that the SWL of lifting equipment is clearly marked.", "recommendation": "Ensure that SWL signage for the lifting equipment is clearly displayed.", "priority": "2"}, {"id": "i115", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/B3/xx", "name": "Lifting Equipment - Safe Working Loads of the Lifting Equipment Accessories was Identifiable", "finding": "The Safe Working Load (SWL) of the lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) was not identifiable.", "reason": "There is a requirement that the SWL of lifting equipment is clearly marked.", "recommendation": "Ensure that SWL signage for the lifting equipment accessories (i.e. slings, chains, shackles, clamps, etc.) is clearly displayed.", "priority": "2"}, {"id": "i116", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/C1/xx", "name": "Lifting Equipment \u2013 A Documented Emergnecy Plan for the Rescue of Trapped Persons Operating the MEWP was Available", "finding": "There was no documented emergency plan for the rescue of trapped persons operating the Mobile Elevated Working Platform (MEWP).", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Develop an emergency plan for the rescue of trapped persons operating the Mobile Elevated Working Platform (MEWP). Communicate the emergency plan to those with allocated responsibilities. Ensure that emergency plan is practised. Ensure that function checks of the alarm system within the lift car are carried out and records maintained.", "priority": "2"}, {"id": "i117", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/D1/xx", "name": "Lifting Equipment \u2013 Keys were Not Left in Lift Trucks when Not in Use", "finding": "Keys were being left in lift trucks when not in use.", "reason": "There is a requirement to remove key from lift trucks when not in use, to prevent unauthorised use which could lead to accidents.", "recommendation": "Ensure that workers are reminded to remove keys from the lift truck when not in use and left unattended.", "priority": "2"}, {"id": "i118", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/D2/xx", "name": "Lifting Equipment - Keys were Not Left in MEWPs when Not in Use", "finding": "Keys were being left in the Mobile Elevated Working Platform (MEWP) when not in use.", "reason": "There is a requirement to remove key from Mobile Elevated Working Platform (MEWP) when not in use, to prevent unauthorised use which could lead to accidents.", "recommendation": "Ensure that workers are reminded to remove keys from the MEWP when not in use and left unattended.", "priority": "2"}, {"id": "i119", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/E1/xx", "name": "Lifting Equipment \u2013 Daily Lift Truck Checklists were Completed", "finding": "Daily lift truck safety checklists were not being completed.", "reason": "There is a requirement that work equipment is maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that recorded daily lift truck safety checklists are being completed.", "priority": "1"}, {"id": "i120", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/E2/xx", "name": "Lifting Equipment \u2013 MEWP Pre-Use Safety Checklists were Completed", "finding": "Mobile Elevated Working Platform (MEWP) pre use safety checklists were not being completed.", "reason": "There is a requirement that work equipment is maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that recorded MEWP pre use safety checklists were not being completed.", "priority": "1"}, {"id": "i121", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/E3/xx", "name": "Lifting Equipment - Daily Lift Equipment Checklists were Completed", "finding": "Daily lifting equipment safety checklists were not being completed.", "reason": "There is a requirement that work equipment is maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that recorded daily lifting equipment safety checklists are being completed.", "priority": "1"}, {"id": "i122", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/F1/xx", "name": "Lifting Equipment \u2013 Only Trained Staff were Operating Lift Trucks", "finding": "Lift trucks were being operated by workers who had not been trained.", "reason": "There is a requirement for the provision of information, instruction and training to workers.", "recommendation": "Prohibit the use of lift trucks by untrained workers. Arrange for workers required to operate lift trucks to be trained for the appropriate lift truck certification (i.e. counterbalance, reach truck, rough terrain).", "priority": "1"}, {"id": "i123", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/F2/xx", "name": "Lifting Equipment - Only Trained Staff were Operating MEWPs", "finding": "Mobile Elevated Working Platforms (MEWPs) were being operated by workers who had not been trained.", "reason": "There is a requirement for the provision of information, instruction and training to workers.", "recommendation": "Prohibit the use of MEWPs by untrained workers. Arrange for workers required to operate MEWPs to be trained for the appropriate MEWP certification.", "priority": "1"}, {"id": "i124", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/F3/xx", "name": "Lifting Equipment - Only Trained Staff were Operating Lifting Equipment", "finding": "Lifting equipment was being operated by workers who had not been trained.", "reason": "There is a requirement for the provision of information, instruction and training to workers.", "recommendation": "Prohibit the use of lifting equipment by untrained workers. Arrange for workers required to operate lifting equipment to be trained.", "priority": "1"}, {"id": "i125", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.13", "topicName": "Lifting Equipment N/A \u2013 whole section", "ref": "3.13/F4/xx", "name": "Lifting Equipment - Only Trained Staff were Carrying Out Slinging and Lifting Operations", "finding": "Slinging and lifting operations were being undertaken by untrained workers.", "reason": "There is a requirement for the provision of information, instruction and training to workers.", "recommendation": "Prohibit slinging and lifting operations by untrained workers. Arrange for workers required to carry out slinging and lifting operations to be trained.", "priority": "1"}, {"id": "i126", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/A1/xx 3.14/C1/xx", "name": "Noise \u2013 Noise Assessments had been Undertaken", "finding": "No noise assessment of the workplace had been undertaken.", "reason": "Employers must protect their workers from workplace noise exposure.", "recommendation": "Arrange for a noise assessment of the workplace to be carried out and implement recommendations within specified timescales/ priority.", "priority": "2"}, {"id": "i127", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/B1/xx", "name": "Noise - Noise Assessments had been Reviewed for New Machinery/Work Processes", "finding": "There were new work processes/machinery, however, the existing noise assessment had not been reviewed,", "reason": "Employers must protect their workers from workplace noise exposure.", "recommendation": "Arrange for a noise assessment of the workplace to be carried out and implement recommendations within specified timescales/ priority.", "priority": "2"}, {"id": "i128", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/B2/xx", "name": "Noise - Noise Assessments had been Reviewed", "finding": "The noise assessment of the workplace should now be reviewed.", "reason": "Employers must protect their workers from workplace noise exposure.", "recommendation": "Arrange for a noise assessment of the workplace to be carried out and implement recommendations within specified timescales/ priority.", "priority": null}, {"id": "i129", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/C2/xx", "name": "Noise - Noise Assessments Recommendations has been Implemented", "finding": "A noise assessment of the workplace had been undertaken. However, the recommendations had not been implemented.", "reason": "Employers must protect their workers from workplace noise exposure.", "recommendation": "Ensure that the recommendations in the noise assessment report are implemented io order of priority/timescales.", "priority": "2"}, {"id": "i130", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/D1/xx", "name": "Noise \u2013 PPE had been Issues to Workers where Requried", "finding": "PPE (hearing protection) had been issued to workers; however, a noise assessment had not been completed.", "reason": "There is a requirement to ensure that suitable personal protective equipment is provided to workers who may be exposed to a risk to their health or safety while at work except where and to the extent that such risk has been adequately controlled by other means which are equally or more effective.", "recommendation": "Arrange for a noise assessment of the workplace to be carried out and implement PPE recommendations (i.e. correct specified Single Number Rating (SNR) hearing protection).", "priority": "2"}, {"id": "i131", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/E1/xx", "name": "Noise \u2013 PPE was in Good Condition", "finding": "PPE (hearing protection) issued to workers was in poor condition.", "reason": "There is a requirement that any PPE provided to workers is maintained (including replaced or cleaned as appropriate) in an efficient state, in efficient working order and in good repair.", "recommendation": "Implement a process for the replacement or cleaning of PPE. Ensure that workers are aware of the process for replacing PPE in poor condition or cleaning.", "priority": "2"}, {"id": "i132", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/E2/xx", "name": "Noise \u2013 PPE was being Stored Correctly", "finding": "PPE (hearing protection) was not being stored so to prevent damage or contamination from other hazards.", "reason": "There is a requirement for the provision of accommodation/ storage of PPE/RPE which has been issued to workers.", "recommendation": "Ensure that workers are provided suitable accommodation/ storage for PPE that they have been issued.", "priority": "2"}, {"id": "i133", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/F1/xx", "name": "Noise \u2013 Occupational Health Surveillance Programme in Place for Workers Exposed to Noise", "finding": "There was no occupational health surveillance program in place for workers exposed to noise.", "reason": "Employers are required to provide workers with occupational health surveillance, having regard to the risks to their health and safety which are identified by risk assessments and taking account of exposure monitoring.", "recommendation": "Carryout/review noise assessment and where identified, implement an occupational health surveillance/monitoring program (repeated periodically) in consultation with an Occupational Health specialist. The occupational health surveillance/monitoring program should include Audiometry (Hearing) tests.", "priority": "2"}, {"id": "i134", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/F2/xx", "name": "Noise \u2013 Ongoing Occupational Health Surveillance Programme in Place for Workers Exposed to Noise", "finding": "Occupational health surveillance for workers exposed to noise had been undertaken. However, there was no program in place for ongoing monitoring.", "reason": "Employers are required to provide workers with occupational health surveillance, having regard to the risks to their health and safety which are identified by risk assessments and taking account of exposure monitoring.", "recommendation": "Review noise assessment and where identified, implement an occupational health surveillance/monitoring program (repeated periodically) in consultation with an Occupational Health specialist. The occupational health surveillance/monitoring program should include Audiometry (Hearing) tests.", "priority": "2"}, {"id": "i135", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/G1/xx", "name": "Noise - Workers Exposed to Noise have Received Noise Awareness Instruction and Training", "finding": "There was no evidence that workers exposed to noise in the workplace had received noise awareness instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers complete noise awareness training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i136", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.14", "topicName": "Noise N/A \u2013 whole section", "ref": "3.14/G2/xx", "name": "Noise - Workers Exposed to Noise, Noise Awareness Instruction and Training had been Refreshed", "finding": "Records indicated that workers exposed to noise had been provided with noise awareness information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i137", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/A1/xx", "name": "Storage Racking - Safe Working Load Signage Displayed on Pallet Racking System(s)", "finding": "Safe Working Load (SWL) signage was not displayed on the pallet racking system(s).", "reason": "Employers are required to display SWL signage on pallet racking systems.", "recommendation": "Ensure that SWL is displayed on the pallet racking system(s) so that workers are aware of the load capacities and safe usage guidelines.", "priority": "1"}, {"id": "i138", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/A2/xx", "name": "Storage Racking - Safe Working Load Signage Displayed on Static/Mobile Shelving", "finding": "Safe Working Load (SWL) signage was not displayed on static/mobile shelving.", "reason": "Employers are required to display SWL signage on shelving systems.", "recommendation": "Ensure that SWL is displayed on the shelving system(s) so that workers are aware of the load capacities and safe usage guidelines.", "priority": "1"}, {"id": "i139", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/A3/xx", "name": "Storage Racking \u2013 Safe Working Load Signage Displayed Correct Capacity", "finding": "Safe Working Load (SWL) signage was displayed on static/mobile shelving. However, the SWL capacity was not detailed on the signage.", "reason": "Employers are required to display SWL signage on shelving systems.", "recommendation": "Ensure that SWL is displayed on the shelving system(s) complete with the SWL capacity information, so that workers are aware of the load capacities and safe usage guidelines.", "priority": "1"}, {"id": "i140", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/B1/xx", "name": "Storage Racking \u2013 Fixed/Mobile Shelving in Good Cond a copy of the annual mobile shelving inspection/service report, implement any recommendations and maintain records to verify works were completed.", "priority": "2"}, {"id": "i148", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/B3/xx", "name": "Storage Racking \u2013 Pallet Racking System(s) in Good Condition", "finding": "Sections of the pallet racking system(s) were in poor condition increasing the likelihood of falling goods on to persons nearby/below or causing property/goods damage.", "reason": "There is a requirement that work equipment is inspected and maintained to confirm they are working safely and efficiently and comply with regulations.", "recommendation": "Make area of pallet racking safe and segregate. Arrange for a SEMA inspection of the racking system and implement recommendations within specified timescale/priority and maintain records to verify works were completed. Review risk assessment and investigate the immediate/ underlying/root causes of damage and implement any additional controls to prevent damage.", "priority": "1"}, {"id": "i149", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/B4/xx", "name": "Storage Racking - Goods on Pallet Racking System(s) Were Stored Correctly", "finding": "Goods were poorly stored on the pallet racking system(s) increasing the likelihood of falling goods on to persons nearby/below or causing property/goods damage.", "reason": "Employers are required to take reasonable steps to protect the health, safety and welfare of workers and other affected by their work.", "recommendation": "Implement and communicate controls to workers to ensure that goods are safely stored on the pallet racking system(s).", "priority": "1"}, {"id": "i150", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/B5/xx", "name": "Storage Racking \u2013 Floor Between Pallet Racking Aisles was Clear", "finding": "Goods were being stored on the floor between pallet racking aisles increasing the likelihood of accidents, i.e. lift truck/pallet truck collisions, falling loads due to multiple lifting operations, increasing fire loading between racking isles, or causing property/goods damage.", "reason": "Employers are required to take reasonable steps to protect the health, safety and welfare of workers and other affected by their work.", "recommendation": "Implement and communicate controls to workers to ensure that goods are safely stored on the pallet racking system(s).", "priority": "2"}, {"id": "i151", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/C3/xx", "name": "Storage Racking \u2013 Workers Completing In-House Monthly Pallet Racking Inspections Had Completed a \u2018Rack Safety\u2019 Awareness Course", "finding": "Workers were completing in-house monthly pallet racking inspections. However, workers had not completed a \u2018rack safety\u2019 awareness course.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers who undertake in-house pallet racking inspections complete: SEMA Rack Safety Awareness Course. SEMA Cantilever Rack Safety Awareness Course. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i152", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/C4/xx", "name": "Storage Racking \u2013 In-House Pallet Racking Inspections Recorded", "finding": "In-house recorded pallet racking inspections were not being completed.", "reason": "There is a requirement that work equipment is inspected and maintained to confirm they are working safely and efficiently and comply with regulations.", "recommendation": "Ensure that monthly in-house recorded pallet racking inspections are completed and that if any defects are identified, that immediate/appropriate action is taken. Ensure that workers who undertake in-house pallet racking inspections complete: SEMA Rack Safety Awareness Course. SEMA Cantilever Rack Safety Awareness Course.", "priority": "2"}, {"id": "i153", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/C5/xx", "name": "Storage Racking - In-House Pallet Racking Inspections up to Date", "finding": "In-house recorded pallet racking inspections were not up to date.", "reason": "There is a requirement that work equipment is inspected and maintained to confirm they are working safely and efficiently and comply with regulations.", "recommendation": "Ensure that monthly in-house recorded pallet racking inspections are completed and that if any defects are identified, that immediate/appropriate action is taken. Ensure that workers who undertake in-house pallet racking inspections complete: SEMA Rack Safety Awareness Course. SEMA Cantilever Rack Safety Awareness Course.", "priority": "2"}, {"id": "i154", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/D5/xx", "name": "Storage Racking - Annual SEMA Pallet Racking Inspections Report was in Date", "finding": "The annual SEMA Pallet Racking inspection was overdue.", "reason": "There is a requirement that work equipment is inspected and maintained to confirm they are working safely and efficiently and comply with regulations.", "recommendation": "Arrange for a SEMA Pallet Racking inspection to be undertaken, implement any recommendations and maintain records to verify works were completed. Ensure that there is an annual SEMA Pallet Racking inspection program in place.", "priority": "1"}, {"id": "i155", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.15", "topicName": "Storage Racking", "ref": "3.15/D6/xx", "name": "Storage Racking \u2013 Annual SEMA Pallet Racking Inspections Report was Available", "finding": "A copy of the most recent annual SEMA Pallet Racking inspection report was not readily available at the time of the visit.", "reason": "There is a requirement that work equipment is inspected and maintained to confirm they are working safely and efficiently and comply with regulations.", "recommendation": "Obtain a copy of the annual SEMA Pallet racking inspection report, implement any recommendations and maintain records to verify works were completed.", "priority": "1"}, {"id": "i156", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/A1/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 Risk Assessment Completed for Work Activities where Workers are Exposed to Vibration", "finding": "Risk assessments had not been completed for work activities where workers exposed to vibration in the workplace.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Create a risk assessment register identifying all work activities where workers exposed to vibration in the workplace. Complete risk assessments for the work activities. Arrange for Hand-Arm Vibration (HAV) Testing to be undertaken to measure real-time vibration magnitude during use/record daily usage duration (trigger time) and calculate exposure points to identify required controls. The results of the risk assessments must be communicated to workers.", "priority": "2"}, {"id": "i157", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/A2/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 HAV Testing Completed", "finding": "Risk assessments had been completed for work activities where workers exposed to vibration in the workplace. However, no Hand-Arm Vibration (HAV) Testing had been undertaken.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Arrange for HAV Testing to be undertaken to measure real-time vibration magnitude during use/record daily usage duration (trigger time) and calculate exposure points to identify required controls.", "priority": "2"}, {"id": "i158", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/B1/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 HAVs Risk Assessments Reviewed", "finding": "Risk assessments completed for work activities where workers exposed to vibration in the workplace. However, the risk assessments now need to be reviewed.", "reason": "There is a requirement that risk assessments are reviewed at least annually, and more frequently if there are significant changes in the workplace, work equipment, after incidents/results of health surveillance, or when regulations are updated.", "recommendation": "Review risk assessments completed for work activities where workers exposed to vibration in the workplace. The results of these risk assessments will need to be communicated to workers.", "priority": "2"}, {"id": "i159", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/B2/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 HAVS Testing has been Reviewed", "finding": "Hand-Arm Vibration (HAV) Testing had been undertaken. However, the HAV Testing now needs to be reviewed.", "reason": "HAV testing should be repeated: When new tools, accessories, or attachments are introduced After health concerns or health surveillance identification As tools age (vibration levels can increase over time) At least annually as part of your vibration management plan", "recommendation": "Arrange for HAV Testing to be undertaken to measure real-time vibration magnitude during use/record daily usage duration (trigger time) and calculate exposure points to identify required controls.", "priority": "2"}, {"id": "i160", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/C1/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 Workers Exposed to HAVS have Received Vibration Awareness Instruction and Training", "finding": "There was no evidence that workers exposed to vibration in the workplace had received vibration awareness instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers complete vibration awareness training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i161", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/C2/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 Workers Exposed to HAVS Vibration Awareness Instruction and Training has been Reviewed", "finding": "Records indicated that workers exposed to vibration had been provided with vibration awareness information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i162", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/D1/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 Occupational Health Surveillance Program in Place for Workers Exposed to HAVS", "finding": "There was no occupational health surveillance program in place for workers exposed to vibration.", "reason": "Employers are required to provide workers with occupational health surveillance, having regard to the risks to their health and safety which are identified by risk assessments and taking account of exposure monitoring.", "recommendation": "Carryout/review risk assessments and Hand-Arm Vibration (HAV) Testing for activities where workers are exposed to vibration and where identified, implement an occupational health surveillance/monitoring program (repeated periodically) in consultation with an Occupational Health specialist. The occupational health surveillance/monitoring program should include Hand Arm Vibration Syndrome (HAVS) (White Finger)).", "priority": "2"}, {"id": "i163", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.16", "topicName": "Vibration (Hand-arm Vibration (HAV)) N/A \u2013 whole section", "ref": "3.16/D2/xx", "name": "Vibration (Hand-Arm Vibration (HAV)) \u2013 Ongoing Occupational Health Surveillance Program in Place for Workers Exposed to HAVS", "finding": "Occupational health surveillance for workers exposed to vibration had been undertaken. However, there was no program in place for ongoing monitoring.", "reason": "Employers are required to provide workers with occupational health surveillance, having regard to the risks to their health and safety which are identified by risk assessments and taking account of exposure monitoring.", "recommendation": "Implement an occupational health surveillance/monitoring program (repeated periodically) in consultation with an Occupational Health specialist. The occupational health surveillance/monitoring program should include Hand Arm Vibration Syndrome (HAVS) (White Finger)).", "priority": "2"}, {"id": "i164", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.17", "topicName": "Water Safety", "ref": "3.17/A1/xx 3.17/B1/xx", "name": "Water Safety \u2013 Legionella Risk Assessment Completed", "finding": "A Legionella Risk Assessment of the sites water system had not been undertaken to enable valid decisions about the measures needed to prevent or adequately control the exposure of their employees to legionella bacteria.", "reason": "It is the responsibility of the statutory duty holder to ensure a legionella risk assessment is undertaken, and, that there is a suitable legionella control regime in place.", "recommendation": "Arrange for a Legionella Risk Assessment of the sites water system to be undertaken. Implement Legionella Risk Assessment recommendations and maintain up-to-date records. Implement a Legionella Written Scheme of Control, a formal document outlining how to manage the risks associated with Legionella bacteria in water systems, which includes: Identification of risks; Control measures; and Monitoring and maintenance scheme. Maintain up-to-date records of monitoring and maintenance.", "priority": "2"}, {"id": "i165", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.17", "topicName": "Water Safety", "ref": "3.17/A2/xx 3.17/B2/xx", "name": "Water Safety - Legionella Risk Assessment Available", "finding": "A Legionella Risk Assessment of the sites water system had been undertaken. However, a copy of the report was not readily available at the time of the visit.", "reason": "It is the responsibility of the statutory duty holder to ensure a legionella risk assessment is undertaken, and, that there is a suitable legionella control regime in place.", "recommendation": "Obtain a copy of the Legionella Risk Assessment. Implement Legionella Risk Assessment recommendations and maintain up-to-date records. Implement a Legionella Written Scheme of Control, a formal document outlining how to manage the risks associated with Legionella bacteria in water systems, which includes: Identification of risks. Control measures; and Monitoring and maintenance scheme. Maintain up-to-date records of monitoring and maintenance.", "priority": "2"}, {"id": "i166", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.17", "topicName": "Water Safety", "ref": "3.17/A3/xx", "name": "Water Safety - Legionella Risk Assessment Reviewed", "finding": "A Legionella Risk Assessment of the sites water sy ents)", "sectionIdx": 2, "topicRef": "3.17", "topicName": "Water Safety", "ref": "3.17/B4/xx", "name": "Water Safety \u2013 Records of Monitoring and Maintenance of the Water System in Place", "finding": "A Legionella Risk Assessment had been completed, and a documented Legionella Written Scheme of Control was in place. However, records of monitoring and maintenance of the water system were not up to date.", "reason": "It is the responsibility of the statutory duty holder to ensure a legionella risk assessment is undertaken, and, that there is a suitable legionella control regime in place.", "recommendation": "Implement Legionella Risk Assessment recommendations and maintain up-to-date records. Implement a Legionella Written Scheme of Control, a formal document outlining how to manage the risks associated with Legionella bacteria in water systems, which includes: Identification of risks. Control measures; and Monitoring and maintenance scheme. Maintain up-to-date records of monitoring and maintenance.", "priority": "2"}, {"id": "i169", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.18", "topicName": "Work at Height", "ref": "3.18/A1/xx", "name": "Work at Height \u2013 Risk Assessments Completed", "finding": "Risk assessments had not been completed for work at height activities.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Create a risk assessment register identifying all work at height activities. Complete risk assessments for the work at height activities. The results of the risk assessments must be communicated to workers.", "priority": "1"}, {"id": "i170", "section": "3. Planning and Implementing (Workp
