<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Site Checklists">
<meta name="theme-color" content="#1F3864">
<meta name="mobile-web-app-capable" content="yes">
<title>Site Visit Checklists (Offline)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231F3864'/%3E%3Cpath d='M28 52 L43 67 L74 33' stroke='white' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body style="margin:0;padding:0;">
<div id="hs-app-root"></div>
<style>
  #hs-app-root, #hs-app-root * { box-sizing: border-box; }
  #hs-app-root {
    --navy: #1F3864;
    --navy-deep: #142544;
    --ink: #1C2530;
    --sub: #5B6472;
    --line: #E3E6EB;
    --paper: #FFFFFF;
    --floor: #F4F6F9;
    --ok: #237A4F;
    --ok-bg: #E6F4EC;
    --bad: #B2382C;
    --bad-bg: #FBEAE8;
    --na: #7A8391;
    --na-bg: #EEF0F3;
    --p1: #B2382C;
    --p2: #B8791A;
    --p3: #5B6472;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--floor);
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.4;
  }
  #hs-app-root .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
  #hs-app-root button { font-family: inherit; cursor: pointer; }
  #hs-app-root input, #hs-app-root textarea { font-family: inherit; font-size: 15px; }

  /* ---------- Top bar ---------- */
  .hs-topbar {
    position: sticky; top: 0; z-index: 30;
    background: var(--navy);
    color: #fff;
    padding: 14px 16px 12px;
  }
  .hs-topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .hs-topbar-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .hs-topbar-sub { font-size: 12px; color: #C3CEE3; margin-top: 1px; }
  .hs-icon-btn {
    background: rgba(255,255,255,0.14); border: none; color: #fff;
    width: 34px; height: 34px; border-radius: 9px; font-size: 15px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .hs-icon-btn:active { background: rgba(255,255,255,0.28); }
  .hs-progress-track {
    margin-top: 12px; height: 7px; border-radius: 4px; background: rgba(255,255,255,0.18);
    overflow: hidden; display: flex;
  }
  .hs-progress-seg { height: 100%; background: #6FCF97; transition: width .25s ease; }
  .hs-progress-label { font-size: 11.5px; color: #C3CEE3; margin-top: 6px; display: flex; justify-content: space-between; }

  /* ---------- Generic screens ---------- */
  .hs-screen { display: none; padding-bottom: 90px; min-height: 100vh; }
  .hs-screen.active { display: block; }
  .hs-container { max-width: 720px; margin: 0 auto; }

  /* ---------- Home / visit list ---------- */
  .hs-home-header { padding: 28px 20px 8px; }
  .hs-home-header h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .hs-home-header p { margin: 0; color: var(--sub); font-size: 14px; }
  .hs-new-visit-btn {
    margin: 16px 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--navy); color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 15.5px; font-weight: 600; width: calc(100% - 40px);
  }
  .hs-new-visit-btn:active { background: var(--navy-deep); }
  .hs-visit-list { padding: 4px 20px; }
  .hs-visit-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .hs-visit-card-main { flex: 1; min-width: 0; }
  .hs-visit-card-site { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hs-visit-card-meta { font-size: 12.5px; color: var(--sub); margin-top: 2px; }
  .hs-visit-ring { flex-shrink: 0; text-align: center; }
  .hs-ring-pct { font-size: 12.5px; font-weight: 700; color: var(--navy); }
  .hs-ring-label { font-size: 9.5px; color: var(--sub); }
  .hs-visit-del { background: none; border: none; color: var(--bad); font-size: 12.5px; padding: 6px; flex-shrink: 0; }
  .hs-empty { padding: 40px 30px; text-align: center; color: var(--sub); font-size: 14px; }
  .hs-empty-icon { font-size: 30px; margin-bottom: 10px; }

  /* ---------- New visit form ---------- */
  .hs-form-wrap { padding: 20px; }
  .hs-field { margin-bottom: 16px; }
  .hs-field label { display: block; font-size: 12.5px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .hs-field input {
    width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px 13px;
    font-size: 16px; background: var(--paper); color: var(--ink);
  }
  .hs-field input:focus { outline: none; border-color: var(--navy); }
  .hs-field select {
    width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px 13px;
    font-size: 16px; background: var(--paper); color: var(--ink); font-family: inherit;
  }
  .hs-field select:focus { outline: none; border-color: var(--navy); }
  .hs-form-actions { display: flex; gap: 10px; margin-top: 22px; }
  .hs-btn-primary {
    flex: 1; background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 13px; font-size: 15px; font-weight: 600;
  }
  .hs-btn-secondary {
    background: var(--paper); color: var(--navy); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 18px; font-size: 15px; font-weight: 600;
  }

  /* ---------- Checklist screen ---------- */
  .hs-meta-strip {
    background: #EAF0FB; padding: 10px 16px; font-size: 12.5px; color: var(--navy-deep);
    display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .hs-filter-bar {
    display: flex; gap: 8px; padding: 12px 16px 4px; overflow-x: auto;
  }
  .hs-chip {
    border: 1px solid var(--line); background: var(--paper); color: var(--sub);
    border-radius: 999px; padding: 7px 13px; font-size: 12.5px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }
  .hs-chip.on { background: var(--navy); color: #fff; border-color: var(--navy); }

  .hs-section { margin: 14px 16px 0; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: var(--paper); }
  .hs-section-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 13px 15px; background: var(--paper); border: none; width: 100%; text-align: left;
  }
  .hs-section-title { font-weight: 700; font-size: 14.5px; color: var(--ink); }
  .hs-section-count { font-size: 12px; color: var(--sub); margin-top: 1px; }
  .hs-section-chevron { color: var(--sub); font-size: 13px; transition: transform .18s ease; flex-shrink: 0; }
  .hs-section.open .hs-section-chevron { transform: rotate(90deg); }
  .hs-section-body { display: none; border-top: 1px solid var(--line); }
  .hs-section.open .hs-section-body { display: block; }

  .hs-topic-label {
    padding: 10px 15px 4px; font-size: 11.5px; font-weight: 700; color: var(--navy);
    text-transform: uppercase; letter-spacing: .04em; background: #F8FAFD;
  }

  .hs-item { padding: 12px 15px; border-top: 1px solid var(--line); }
  .hs-item:first-of-type { border-top: none; }
  .hs-item-top { display: flex; align-items: flex-start; gap: 8px; }
  .hs-item-badges { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; padding-top: 1px; }
  .hs-ref-badge { font-size: 10px; font-weight: 700; color: var(--sub); background: var(--floor); border-radius: 5px; padding: 2px 5px; }
  .hs-p-badge { font-size: 9.5px; font-weight: 700; color: #fff; border-radius: 5px; padding: 1px 5px; }
  .hs-item-text { flex: 1; font-size: 14px; line-height: 1.35; padding-top: 1px; }
  .hs-item-finding { font-size: 12px; color: var(--sub); font-style: italic; margin-top: 4px; line-height: 1.35; }
  .hs-item-finding strong { font-style: normal; font-weight: 700; }
  .hs-status-row { display: flex; gap: 6px; margin-top: 10px; }
  .hs-status-btn {
    flex: 1; border: 1px solid var(--line); background: var(--paper); border-radius: 8px;
    padding: 8px 4px; font-size: 12px; font-weight: 700; color: var(--sub); text-align: center;
  }
  .hs-status-btn.on-c { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
  .hs-status-btn.on-nc { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); }
  .hs-status-btn.on-na { background: var(--na-bg); border-color: var(--na); color: var(--na); }
  .hs-notes {
    margin-top: 8px; width: 100%; border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-size: 13.5px; resize: vertical; min-height: 34px; background: var(--floor);
    color: var(--ink);
  }
  .hs-notes:focus { outline: none; border-color: var(--navy); background: var(--paper); }
  .hs-notes::placeholder { color: #A5ACB6; }

  /* ---------- Bottom bar ---------- */
  .hs-bottombar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    background: var(--paper); border-top: 1px solid var(--line);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; align-items: center;
  }
  .hs-save-status { font-size: 11.5px; color: var(--sub); flex: 1; }
  .hs-bottombar-btn {
    background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 11px 16px; font-size: 13.5px; font-weight: 700;
  }
  .hs-bottombar-btn.ghost { background: var(--paper); color: var(--navy); border: 1px solid var(--line); }

  /* ---------- Export screen ---------- */
  .hs-export-wrap { padding: 18px 18px 30px; }
  .hs-export-actions { display: flex; gap: 10px; margin-bottom: 14px; }
  .hs-export-text {
    width: 100%; min-height: 55vh; border: 1px solid var(--line); border-radius: 10px;
    padding: 12px; font-size: 12.5px; background: var(--paper); color: var(--ink);
    white-space: pre-wrap;
  }
  .hs-toast {
    position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--ink); color: #fff; padding: 9px 16px; border-radius: 999px; font-size: 12.5px;
    opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 50;
  }
  .hs-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hs-back-row { display: flex; align-items: center; gap: 8px; padding: 4px 4px 8px; }
</style>
<style>
  #hs-app-root .hs-file-btn { display:inline-flex; }
  #hs-app-root .hs-file-btn input[type=file] { display:none; }
  #hs-app-root .hs-unsaved-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--p1);
    display: inline-block; margin-right: 6px; vertical-align: middle;
  }
  #hs-app-root .hs-save-banner {
    background: #FFF6E5; border: 1px solid #F0D89B; color: #8A5A00;
    border-radius: 10px; padding: 10px 12px; font-size: 12.5px; margin: 0 16px 4px;
  }
  #hs-app-root .hs-load-drop {
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 18px;
    text-align: center; color: var(--sub); font-size: 13px; margin: 0 20px 16px;
  }
  #hs-app-root .hs-offline-status {
    margin: 0 20px 16px; border-radius: 10px; padding: 10px 12px; font-size: 12.5px; line-height: 1.4;
  }
  #hs-app-root .hs-offline-status.ready { background: #E6F4EC; color: #1E6B44; border: 1px solid #BFE3CE; }
  #hs-app-root .hs-offline-status.pending { background: #FFF6E5; color: #8A5A00; border: 1px solid #F0D89B; }

  #hs-app-root .hs-type-tabs {
    display: flex; gap: 6px; background: rgba(255,255,255,0.14);
    border-radius: 10px; padding: 4px;
  }
  #hs-app-root .hs-type-tab {
    flex: 1; border: none; background: transparent; color: rgba(255,255,255,0.85); font-weight: 700;
    font-size: 13px; padding: 8px 10px; border-radius: 7px;
  }
  #hs-app-root .hs-type-tab.on { background: #fff; color: var(--navy); }

  #hs-app-root .hs-bulk-row { display: flex; gap: 8px; margin: 8px 15px 0; }
  #hs-app-root .hs-bulk-btn {
    flex: 1; border: 1px dashed var(--line); background: var(--paper); color: var(--navy);
    border-radius: 8px; padding: 7px 8px; font-size: 11.5px; font-weight: 700;
  }
  #hs-app-root .hs-bulk-btn.hs-bulk-na { color: var(--sub); }

  #hs-app-root .hs-search-row {
    display: flex; align-items: center; gap: 8px; background: var(--paper);
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; margin: 12px 0 0;
  }
  #hs-app-root .hs-search-icon { font-size: 13px; opacity: 0.6; flex-shrink: 0; }
  #hs-app-root .hs-search-input {
    flex: 1; border: none; outline: none; font-size: 15px; background: transparent; color: var(--ink); min-width: 0;
  }
  #hs-app-root .hs-search-input::placeholder { color: #A5ACB6; }
  #hs-app-root .hs-search-clear {
    border: none; background: var(--floor); color: var(--sub); width: 22px; height: 22px;
    border-radius: 50%; font-size: 11px; flex-shrink: 0; padding: 0;
  }
  #hs-app-root .hs-search-count { font-size: 12px; color: var(--sub); margin: 8px 2px 0; }

  #hs-app-root .hs-log-issue-btn {
    width: 100%; background: var(--navy); color: #fff; border: none; border-radius: 12px;
    padding: 13px; font-size: 14.5px; font-weight: 700; margin: 12px 0 4px;
  }
  #hs-app-root .hs-log-issue-btn:active { background: var(--navy-deep); }
  #hs-app-root .hs-toolbar-row { display: flex; gap: 8px; align-items: stretch; }
  #hs-app-root .hs-toolbar-row .hs-log-issue-btn { margin: 12px 0 4px; }
  #hs-app-root .hs-log-issue-btn-compact { flex: 1.3; }
  #hs-app-root .hs-fsd-toolbar-btn {
    flex: 1; background: var(--paper); color: var(--navy); border: 1.5px solid var(--line);
    border-radius: 12px; padding: 13px 8px; font-size: 13px; font-weight: 700; margin: 12px 0 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #hs-app-root .hs-fsd-toolbar-btn:active { background: var(--floor); }
  #hs-app-root .hs-li-breadcrumb { font-size: 12.5px; color: var(--sub); margin: 12px 2px 8px; line-height: 1.6; }
  #hs-app-root .hs-li-crumb { background: none; border: none; color: var(--navy); font-weight: 700; font-size: 12.5px; padding: 0; }
  #hs-app-root .hs-li-crumb-current { color: var(--sub); font-weight: 600; }
  #hs-app-root .hs-li-sep { color: var(--sub); margin: 0 2px; }
  #hs-app-root .hs-li-list { display: flex; flex-direction: column; gap: 8px; }
  #hs-app-root .hs-li-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 14px; text-align: left; width: 100%;
  }
  #hs-app-root .hs-li-row:active { background: var(--floor); }
  #hs-app-root .hs-li-row-main { display: flex; flex-direction: column; gap: 4px; font-size: 14px; font-weight: 600; flex: 1; min-width: 0; }
  #hs-app-root .hs-li-row .hs-ref-badge { align-self: flex-start; }
  #hs-app-root .hs-li-count { font-size: 12px; color: var(--sub); font-weight: 500; }
  #hs-app-root .hs-li-chevron { color: var(--sub); font-size: 18px; flex-shrink: 0; }

  #hs-app-root .hs-li-detail-card {
    background: var(--floor); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; margin-bottom: 12px;
  }
  #hs-app-root .hs-li-detail-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  #hs-app-root .hs-li-detail-status {
    background: var(--bad-bg); color: var(--bad); font-weight: 700; font-size: 11.5px;
    border-radius: 999px; padding: 3px 10px; margin-left: auto;
  }
  #hs-app-root .hs-li-detail-name { font-weight: 700; font-size: 15px; line-height: 1.35; }

  #hs-app-root .hs-actions-editor {
    background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 12px;
  }
  #hs-app-root .hs-actions-editor-label { font-weight: 700; font-size: 12.5px; color: var(--navy); margin-bottom: 3px; }
  #hs-app-root .hs-actions-editor-hint { font-size: 11.5px; color: var(--sub); margin-bottom: 10px; line-height: 1.4; }
  #hs-app-root .hs-actions-editor-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  #hs-app-root .hs-actions-editor-empty { font-size: 12.5px; color: var(--sub); font-style: italic; margin-bottom: 10px; }
  #hs-app-root .hs-actions-editor-row {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    background: var(--floor); border-radius: 8px; padding: 8px 10px; font-size: 13px; line-height: 1.4;
  }
  #hs-app-root .hs-actions-editor-del {
    border: none; background: none; color: var(--bad); font-size: 17px; line-height: 1; font-weight: 700;
    padding: 0 2px; flex-shrink: 0;
  }
  #hs-app-root .hs-actions-editor-add { display: flex; gap: 8px; }
  #hs-app-root .hs-actions-editor-add input {
    flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; font-size: 13.5px; min-width: 0;
  }
  #hs-app-root .hs-actions-editor-add input:focus { outline: none; border-color: var(--navy); }
  #hs-app-root .hs-actions-editor-add button {
    background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 9px 16px;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }

  #hs-app-root .hs-link-row {
    margin-top: 8px; font-size: 12px; color: var(--navy); background: #EAF0FB;
    border: 1px solid #C9D6EE; border-radius: 8px; padding: 7px 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  #hs-app-root .hs-link-row.hs-link-off { background: var(--floor); color: var(--sub); border-color: var(--line); }
  #hs-app-root .hs-link-btn {
    border: none; background: rgba(255,255,255,0.7); color: var(--navy); font-weight: 700;
    font-size: 11.5px; padding: 4px 9px; border-radius: 999px; flex-shrink: 0;
  }
  #hs-app-root .hs-link-off .hs-link-btn { background: var(--paper); }

  #hs-app-root .hs-risk-box {
    margin: 8px 15px 4px; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; background: #F8FAFD;
  }
  #hs-app-root .hs-risk-box-head { font-size: 11.5px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 8px; }
  #hs-app-root .hs-risk-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  #hs-app-root .hs-risk-row-label { font-size: 11px; color: var(--sub); width: 62px; flex-shrink: 0; }
  #hs-app-root .hs-risk-btn {
    border: 1px solid var(--line); background: var(--paper); color: var(--sub);
    border-radius: 7px; padding: 6px 8px; font-size: 11px; font-weight: 600; flex: 1; min-width: 74px;
  }
  #hs-app-root .hs-risk-btn.on { background: var(--navy); color: #fff; border-color: var(--navy); }
  #hs-app-root .hs-risk-badge {
    margin-top: 6px; text-align: center; border-radius: 7px; padding: 7px; font-size: 12.5px; font-weight: 700; color: #fff;
  }
  #hs-app-root .hs-risk-badge.risk-none { background: var(--floor); color: var(--sub); font-weight: 600; }

  #hs-app-root .hs-risk-warning {
    background: #FFF6E5; border: 1px solid #F0D89B; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
  }
  #hs-app-root .hs-risk-warning-title { font-weight: 700; font-size: 13.5px; color: #8A5A00; margin-bottom: 4px; }
  #hs-app-root .hs-risk-warning-text { font-size: 12px; color: #8A5A00; margin-bottom: 6px; line-height: 1.4; }
  #hs-app-root .hs-risk-warning-group { font-size: 12.5px; color: #8A5A00; line-height: 1.5; }
  #hs-app-root .hs-risk-badge.risk-1 { background: #4472C4; }
  #hs-app-root .hs-risk-badge.risk-2 { background: #2E9E5B; }

issions at work and cooperate with their employer, i.e. following information, instruction and training.", "recommendation": "Have informal discussion(s) with the worker(s). Provide refresher information instruction and training.", "priority": "2"}, {"id": "i7", "section": "2. Organisation", "sectionIdx": 1, "topicRef": "2.2", "topicName": "Co-operation by the workforce", "ref": "2.2.2/xx", "name": "Co-Operation \u2013 Workers were Encouraged to Participate in H&S Management Systems", "finding": "There was little evidence that workers were encouraged to participate in the health and safety management system.", "reason": "Worker participation is a requirement and essential for effective health and safety management.", "recommendation": "Encourage worker involvement through: Hazard reporting. Monthly workplace fire, health and safety checklists. Toolbox talks. Health and safety committees.", "priority": "3"}, {"id": "i8", "section": "2. Organisation", "sectionIdx": 1, "topicRef": "2.3", "topicName": "Communication and consultation", "ref": "2.3.1/xx", "name": "Communication & Consultation - Health & Safety Law Poster was on Display", "finding": "A copy of the Health and Safety Law Poster was not displayed within the workplace.", "reason": "The Health and Safety Law Poster is a legal requirement and must be displayed within the workplace.", "recommendation": "Ensure that a copy of the Health and Safety Law Poster is displayed prominently within the workplace.", "priority": "1"}, {"id": "i9", "section": "2. Organisation", "sectionIdx": 1, "topicRef": "2.3", "topicName": "Communication and consultation", "ref": "2.3.2/xx", "name": "Communication & Consultation - Health & Safety Law Poster was up to date", "finding": "A copy of the Health and Safety Law Poster was displayed however the contact information was not completed / outdated.", "reason": "The Health and Safety Law Poster is a legal requirement and must be displayed within the workplace.", "recommendation": "Ensure the contact information is updated, this should display your Health and Safety representatives", "priority": "1"}, {"id": "i10", "section": "2. Organisation", "sectionIdx": 1, "topicRef": "2.3", "topicName": "Communication and consultation", "ref": "2.3.3/xx", "name": "Communication & Consultation - H&S Committee Established", "finding": "There was no fire, health and safety committee.", "reason": "It is good practice to set up a health and safety committee.", "recommendation": "Develop a fire, health and safety committee (non-management team members) and hold meetings every 3-4 months. Communicate minutes of the fire, health and safety committee to all workers.", "priority": "3"}, {"id": "i11", "section": "2. Organisation", "sectionIdx": 1, "topicRef": "2.4", "topicName": "Competency", "ref": "2.4.1/xx", "name": "Competency \u2013 H&S Co-Ordinator had received Training", "finding": "The appointed health and safety coordinator had not received suitable and sufficient training.", "reason": "There is a legal requirement for the provision of such information, instruction, training as is necessary to ensure, so far as is reasonably practicable, the health and safety at work of his employees.", "recommendation": "Best practice would be for the Co-ordinator to complete the: IOSH Managing Safely course; and IOSH Fire Safety for Managers.", "priority": "2"}, {"id": "i12", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/A1/xx 3.1/B1/xx 3.1/C1/xx 3.1/D1/xx 3.1/E1/xx 3.1/F1/xx 3.1/G1/xx", "name": "Asbestos \u2013 Asbestos Management Survey Completed", "finding": "An Asbestos Management Survey for the site had not been completed.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes in properties built before 2000, to identify the presence of ACMs, assess their condition and implement an asbestos management plant to mitigate risks.", "recommendation": "Arrange for an Asbestos Management Survey to be completed for the site. Where ACMs were identified/presumed or areas of the site were not accessed, ensure that: There is a written asbestos management plan, setting out how the risks identified from asbestos will be managed. The asbestos management plan is communicated to those affected. Any identified or suspected ACM must be inspected and its condition assessed periodically, to check that it has not deteriorated or been damaged. Employees are given adequate information, instruction and training where that employee is or is liable to be exposed to asbestos. The asbestos management plan includes an emergency procedure which covers the action to take if asbestos is disturbed. This includes stopping work immediately, and clearing and securing the area until a competent person makes an assessment; and Where a component of a product contains asbestos, that component must be labelled, except that where the size of that component makes it impossible for a label to be fixed to it, neither that component nor the product need be labelled.", "priority": "2"}, {"id": "i13", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/A2/xx 3.1/B2/xx 3.1/C2/xx 3.1/D2/xx 3.1/E2/xx 3.1/F2/xx 3.1/G2/xx", "name": "Asbestos \u2013 Copy of the Asbestos Management Survey Available", "finding": "An Asbestos Management Survey had been completed for the site; however, a copy of the report was not available at the time of the visit.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes in properties built before 2000, to identify the presence of ACMs, assess their condition and implement an asbestos management plant to mitigate risks.", "recommendation": "Obtain a copy of the Asbestos Management Survey report. Where ACMs were identified/presumed or areas of the site were not accessed, ensure that: There is a written asbestos management plan, setting out how the risks identified from asbestos will be managed. The asbestos management plan is communicated to those affected. Any identified or suspected ACM must be inspected and its condition assessed periodically, to check that it has not deteriorated or been damaged. Ensure that employees are given adequate information, instruction and training where that employee is or is liable to be exposed to asbestos. The asbestos management plan includes an emergency procedure which covers the action to take if asbestos is disturbed. This includes stopping work immediately, and clearing and securing the area until a competent person makes an assessment; and Where a component of a product contains asbestos, that component must be labelled, except that where the size of that component makes it impossible for a label to be fixed to it, neither that component nor the product need be labelled.", "priority": "2"}, {"id": "i14", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/B3/xx 3.1/C3/xx 3.1/D3/xx 3.1/E3/xx 3.1/F3/xx 3.1/G3/xx", "name": "Asbestos \u2013 ACM\u2019s Identified or Presumed are Detailed in the Asbestos Management Plan", "finding": "Identified ACMs/presumed/areas of no access were detailed within the Asbestos Management Survey (or Type 2) report. However, there was no documented asbestos management plan.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes in properties built before 2000, to identify the presence of ACMs, assess their condition and implement an asbestos management plant to mitigate risks.", "recommendation": "Where ACMs were identified/presumed or areas of the site were not accessed, ensure that: There is a written asbestos management plan, setting out how the risks identified from asbestos will be managed. The asbestos management plan is communicated to those affected. Any identified or suspected ACM must be inspected and its condition assessed periodically, to check that it has not deteriorated or been damaged. Ensure that employees are given adequate information, instruction and training where that employee is or is liable to be exposed to asbestos. The asbestos management plan includes an emergency procedure which covers the action to take if asbestos is disturbed. This includes stopping work immediately, and clearing and securing the area until a competent person makes an assessment; and Where a component of a product contains asbestos, that component must be labelled, except that where the size of that component makes it impossible for a label to be fixed to it, neither that component nor the product need be labelled.", "priority": "2"}, {"id": "i15", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/B4/xx", "name": "Asbestos \u2013 Asbestos Management Plan Reviewed", "finding": "There was an asbestos management plan. However, the plan had not been reviewed within the last 12-months.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes in properties built before 2000, to identify the presence of ACMs, assess their condition and implement an asbestos management plant to mitigate risks.", "recommendation": "Arrange for an asbestos condition monitoring survey to be carried out and update the asbestos management plan.", "priority": "2"}, {"id": "i16", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/C4/xx", "name": "Asbestos \u2013 Asbestos Management Survey Communicated to those who may be affected", "finding": "There was no evidence that the asbestos management plan was being communicated to those who may be affected.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes communication to those who may be affected.", "recommendation": "Ensure that communication of the asbestos management plan is retained.", "priority": "2"}, {"id": "i17", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/D4/xx", "name": "Asbestos - Conditioning Monitoring Survey Completed", "finding": "Asbestos conditioning monitoring surveys had not been completed.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes in properties built before 2000, to identify the presence of ACMs, assess their condition and implement an asbestos management plant to mitigate risks.", "recommendation": "Arrange for an asbestos condition monitoring survey to be undertaken and implement any recommendations. Update the asbestos management plan. Ensure that a program of asbestos conditioning monitoring is in place (refer to most recent report for frequency).", "priority": "2"}, {"id": "i18", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/D5/xx", "name": "Asbestos \u2013 Conditioning Monitoring Survey Up to Date", "finding": "The Asbestos conditioning monitoring survey was overdue.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes in properties built before 2000, to identify the presence of ACMs, assess their condition and implement an asbestos management plant to mitigate risks.", "recommendation": "Arrange for an asbestos condition monitoring survey to be undertaken and implement any recommendations. Update the asbestos management plan. Ensure that a program of asbestos conditioning monitoring is in place (refer to most recent report for frequency).", "priority": "2"}, {"id": "i19", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/E4/xx", "name": "Asbestos \u2013 Asbestos Awareness Training Provided", "finding": "There was no evidence that asbestos awareness training had been provided to workers who manage or maybe affected by the presence of ACMs or presumed ACMs during their day-to-day work activities.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers who manage asbestos or maybe affected by the presence of ACMs or presumed ACMs during their day-to-day work activities are provided with asbestos awareness training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i20", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/F4/xx", "name": "Asbestos \u2013 Asbestos Survey covers Action to take if Asbestos is Disturbed", "finding": "There was an asbestos management plan. However, the plan did not include an emergency procedure which covers the action to take if asbestos is disturbed.", "reason": "Employers have a duty to manage asbestos containing materials (ACMs). This includes in properties built before 2000, to identify the presence of ACMs, assess their condition and implement an asbestos management plant to mitigate risks.", "recommendation": "Review the asbestos management plan and ensure that it includes an emergency procedure which covers the action to take if asbestos is disturbed. This includes stopping work immediately, and clearing and securing the area until a competent person makes an assessment", "priority": "2"}, {"id": "i21", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.1", "topicName": "Asbestos", "ref": "3.1/G4/xx", "name": "Asbestos \u2013 ACMs have been Identified and Labelled", "finding": "ACMs had been identified/presumed; however, none were labelled.", "reason": "Where a component of a product contains asbestos, in order to comply legislation, that component must be labelled, except that where the size of that component makes it impossible for a label to be fixed to it, neither that component nor the product need be labelled.", "recommendation": "Ensure that ACMs are labelled.", "priority": null}, {"id": "i22", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.2", "topicName": "Confined Spaces N/A \u2013 whole section", "ref": "3.2/A1/xx", "name": "Confined Spaces - Risk Assessments Completed", "finding": "Risk assessments had not been completed for working in confined spaces.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Prohibit confined space works. Complete risk assessments for confined space works. The results of the risk assessments must be communicated to workers.", "priority": "1"}, {"id": "i23", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.2", "topicName": "Confined Spaces N/A \u2013 whole section", "ref": "3.2/B1/xx", "name": "Confined Spaces -Safe Systems of Work and Permits to Work Issues", "finding": "Safe Systems of Work (SSOW) and Permits to Work were not being issued for working in confined spaces.", "reason": "No person at work shall enter or carry out any work in or (other than as a result of an emergency) leave a confined space otherwise than in accordance with a system of work which, in relation to any relevant specified risks, renders that work safe and without risks to health.", "recommendation": "Prohibit confined space works. Ensure that SSOW and Permits to Work are in place/ communicated to workers for confined space works.", "priority": "1"}, {"id": "i24", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.2", "topicName": "Confined Spaces N/A \u2013 whole section", "ref": "3.2/C1/xx", "name": "Confined Spaces \u2013 Training Completed", "finding": "Workers undertaking works in confined spaces had not been provided with confined space training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Prohibit confined space works. Ensure that workers complete confined space training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "1"}, {"id": "i25", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.2", "topicName": "Confined Spaces N/A \u2013 whole section", "ref": "3.2/D1/xx", "name": "Confined Spaces \u2013 Rescue Plan Documented", "finding": "Workers were undertaking works in confined spaces. However, there was no documented confined space rescue plan.", "reason": "No person at work shall enter or carry out work in a confined space unless there have been prepared in respect of that confined space, suitable and sufficient arrangements for the rescue of persons in the event of an emergency.", "recommendation": "Prohibit confined space works. Ensure that confined space rescue plans are in place. Communicate the emergency plan to those with allocated responsibilities. Ensure that emergency plan is practised. Ensure that workers are provided with confined space rescue training and rescue kit/equipment.", "priority": "1"}, {"id": "i26", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.2", "topicName": "Confined Spaces N/A \u2013 whole section", "ref": "3.2/E1/xx", "name": "Confined Spaces \u2013 Nominated Persons to Assist Rescue have Completed Training", "finding": "Workers nominated to assist in confined space rescue had not been provided with training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Prohibit confined space works. Ensure that workers complete confined space rescue training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "1"}, {"id": "i27", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.3", "topicName": "Contractors", "ref": "3.3/A1/xx", "name": "Contractors - Competence of Contractors is being Appraised and Approved", "finding": "The competence of contractors was not being appraised/ approved.", "reason": "Employers are required to conduct their undertaking in such a way as to ensure, so far as is reasonably practicable, that workers and persons not in their employment who may be affected are not exposed to risks to their health or safety.", "recommendation": "Ensure that contractors are appraised/approved before undertaking any works on site.", "priority": "2"}, {"id": "i28", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.3", "topicName": "Contractors", "ref": "3.3/A2/xx", "name": "Contractors \u2013 Competence of Contractors is being Appraised and Monitored", "finding": "The competence of contractors was being appraised/approved. However, contractors\u2019 performance/competence was not being monitored.", "reason": "Employers are required to conduct their undertaking in such a way as to ensure, so far as is reasonably practicable, that workers and persons not in their employment who may be affected are not exposed to risks to their health or safety.", "recommendation": "Ensure that contractors are appraised/approved annually.", "priority": "2"}, {"id": "i29", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.3", "topicName": "Contractors", "ref": "3.3/B1/xx", "name": "Contractors \u2013 Safety Documentation is Exchanged with Contractors", "finding": "Safety documentation was not being exchanged with contractors i.e. risk assessments, site inductions and emergency arrangements.", "reason": "Employers are required to conduct their undertaking in such a way as to ensure, so far as is reasonably practicable, that workers and persons not in their employment who may be affected are not exposed to risks to their health or safety.", "recommendation": "Ensure that safety documentation is exchange with contractors and that site inductions are provided covering welfare, site rules and emergency arrangements.", "priority": "2"}, {"id": "i30", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.3", "topicName": "Contractors", "ref": "3.3/C1/xx", "name": "Contractors \u2013 Management or Supervision of Contractors on Site is in Place", "finding": "There was no management or supervision of contractors on site.", "reason": "Employers are required to conduct their undertaking in such a way as to ensure, so far as is reasonably practicable, that workers and persons not in their employment who may be affected are not exposed to risks to their health or safety.", "recommendation": "Ensure that someone (nominated person) is allocated to supervise/undertake periodic checks of contractors whilst on site.", "priority": "2"}, {"id": "i31", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/A1/xx", "name": "COSHH \u2013 COSHH Assessment Completed", "finding": "Various substances were used on site. However, COSHH Assessments had not been completed.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Develop a COSHH Register. Obtain copies of Safety Data Sheets (SDS) and ensure that they are readily accessible on site. Carry out COSHH Assessments and implement controls measures. The results of the assessments must be communicated to workers.", "priority": "2"}, {"id": "i32", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/A2/xx", "name": "COSHH \u2013 DSEAR Assessment Completed", "finding": "Substances (highly/flammable/flammable), work processes (generating dusts/fumes/vapours), lift equipment charging stations, PV installations were present on site.", "reason": "The Dangerous Substances and Explosive Atmospheres Regulations 2002 (DSEAR) require employers to control the risks to safety from fire, explosions and substances corrosive to metals.", "recommendation": "Arrange for a DSEAR Assessment to be carried out and implement identified actions.", "priority": "2"}, {"id": "i33", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/B1/xx", "name": "COSHH \u2013 Cabinets used for COSHH Products were not Sufficient COSHH Cabinets", "finding": "Cupboards had been provided for the storage of substances used within the workplace. However, the cupboards provided were not COSHH cabinets.", "reason": "Employers should establish procedures to ensure that control measures, including PPE and any other item or facility, are properly used or applied and are not made less effective by other work practices or by improper use.", "recommendation": "Replace the cupboards with COSHH cabinets that are: COSHH, HSG51, and DSEAR 2002 safety regulations compliant. Of a durable steel body. High-visibility yellow for durability and easy identification. Fitted with locking systems to restrict access to authorised personnel. Fitted with a removable sump tray to safely contain leaks/ spillages. Fitted with GHS-compliant COSHH labels to warn of hazardous contents.", "priority": "2"}, {"id": "i34", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/B2/xx", "name": "COSHH \u2013 COSHH Cabinet is in Good Condition", "finding": "COSHH cabinets had been provided for the storage of substances used within the workplace. However, the cabinets were in poor condition.", "reason": "Employers should establish procedures to ensure that control measures, including PPE and any other item or facility, are properly used or applied and are not made less effective by other work practices or by improper use.", "recommendation": "Replace the cupboards with COSHH cabinets that are: COSHH, HSG51, and DSEAR 2002 safety regulations compliant. Of a durable steel body. High-visibility yellow for durability and easy identification. Fitted with locking systems to restrict access to authorised personnel. Fitted with a removable sump tray to safely contain leaks/ spillages. Fitted with GHS-compliant COSHH labels to warn of hazardous contents. Ensure that the condition of COSHH cabinets are monitored when completing monthly workplace fire, health and safety checklists. Workers are encouraged to report safety concerns.", "priority": "2"}, {"id": "i35", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/B3/xx", "name": "COSHH \u2013 Hazardous Products were being Stored in COSHH Cabinets", "finding": "COSHH cabinets had been provided for the storage of substances used within the workplace. However, workers were not returning hazardous substances to the COSHH cabinet after use.", "reason": "Employers should establish procedures to ensure that control measures, including PPE and any other item or facility, are properly used or applied and are not made less effective by other work practices or by improper use.", "recommendation": "Ensure that workers are given COSSH awareness information, instruction and training. Monitor as part of day-to-day fire, health and safety management.", "priority": "2"}, {"id": "i36", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/B4/xx", "name": "COSHH \u2013 Cupboards Provided for Flammable Products are Flammable Storage Cabinets", "finding": "Various flammable substances were used on site. However, the cupboards provided were not flammable storage cabinets.", "reason": "Employers should establish procedures to ensure that control measures, including PPE and any other item or facility, are properly used or applied and are not made less effective by other work practices or by improper use.", "recommendation": "Replace the cupboards with flammable storage cabinets that are: COSHH, HSG51, and DSEAR 2002 safety regulations compliant. High- and low-level ventilation to prevent build-up of fumes. Anti-corrosive, pillar-box Red for high visibility. 30-minute fire resistance. Fitted with locking systems to restrict access to authorised personnel. Fitted with a sump tray to safely contain leaks/spillages. Fitted with GHS-compliant COSHH labels to warn of hazardous contents. Ensure that the condition of COSHH cabinets is monitored when completing monthly workplace fire, health and safety checklists. Workers are encouraged to report safety concerns.", "priority": "2"}, {"id": "i37", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/E1/xx", "name": "COSHH \u2013 COSHH Training Provided", "finding": "Various substances were used on site. However, workers had not been provided with training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers complete COSHH Awareness/DSEAR awareness training. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i38", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/F1/xx", "name": "COSHH \u2013 Spill Response Plan Documented", "finding": "Various substances were used on site. However, there was no documented spill response plan.", "reason": "In order to protect the health of workers from an accident/incident/ or emergency related to the presence of a substance hazardous to health at the workplace, employers are required to have in place procedures, equipment and training.", "recommendation": "Ensure that there is a documented spill response plan in place. Communicate the spill response plan to workers with allocated responsibilities for spills. Provide a chemical spill kit. Provide spill training to workers with allocated responsibilities for spills.", "priority": "2"}, {"id": "i39", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/C2/xx", "name": "COSHH \u2013 Thorough Examination Documentation for LEV System(s) Available", "finding": "Thorough examination documentation for the LEV system(s) was not available at the time of the visit.", "reason": "Local Exhaust Ventilation (LEV) systems must undergo a thorough examination and test at least every 14-months to ensure compliance with health and safety regulations.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the thorough examination documentation. If any remedial actions were identified, ensure that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination is maintained up to date.", "priority": "1"}, {"id": "i40", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/C3/xx", "name": "COSHH \u2013 LEV Systems Thorough Examination Complete", "finding": "The thorough examination of the (LEV) system(s) was overdue.", "reason": "Local Exhaust Ventilation (LEV) systems must undergo a thorough examination and test at least every 14-months to ensure compliance with health and safety regulations.", "recommendation": "Arrange for the thorough examination of the LEV system(s) to be carried out. Ensure that if any remedial actions were identified that they are implemented in order of priority/timescale and that records are maintained to verify works were completed. Ensure that a thorough examination program is put in place and that records are maintained up to date.", "priority": "1"}, {"id": "i41", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/D2/xx", "name": "COSHH - Air Quality Monitoring Assessment Completed", "finding": "Workers were exposed to dust within the workplace generated by work processes. No air quality monitoring/assessment had been carried out.", "reason": "There is a requirement to monitor and assess hazardous substance workplace exposure limits (WELs) within the workplace, at regular intervals and should any changes occur.", "recommendation": "Arrange for air quality monitoring/assessment to be carried out, to: Calculate exposure levels. Identify/implement control measures. Develop a monitoring scheme.", "priority": "2"}, {"id": "i42", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/D3/xx", "name": "COSHH \u2013 Air Quality Monitoring Assessment Completed", "finding": "Various substances were used on site. No air quality monitoring/assessment had been carried out.", "reason": "There is a requirement to monitor and assess hazardous substance workplace exposure limits (WELs) within the workplace, at regular intervals and should any changes occur.", "recommendation": "Arrange for air quality monitoring/assessment to be carried out, to: Calculate exposure levels, Identify/implement control measures, Develop a monitoring scheme.", "priority": "2"}, {"id": "i43", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.4", "topicName": "Control of Hazardous Substances", "ref": "3.4/D4/xx", "name": "COSHH \u2013 Ongoing Air Quality Monitoring in Place", "finding": "Air quality monitoring had been carried out, to assess hazardous substance workplace exposure limits (WELs) within the workplace. However, there was no ongoing air quality monitoring at regular intervals.", "reason": "There is a requirement to monitor and assess hazardous substance workplace exposure limits (WELs) within the workplace, at regular intervals and should any changes occur.", "recommendation": "Arrange for air quality monitoring/assessment to be carried out, so as to: Review/calculate exposure levels. Review/implement control measures. Develop a monitoring scheme.", "priority": "2"}, {"id": "i44", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.5", "topicName": "Equality", "ref": "3.5/A1/xx", "name": "Equality \u2013 No Physical / Cognitive Barries Observed", "finding": "Physical/sensory/cognitive barriers were observed that may prevent access to facilities and services for disabled individuals.", "reason": "Employers are required to make reasonable adjustments to accommodate disabled individuals.", "recommendation": "Arrange for a Disability Access Audit (DDA) to be undertaken and implement improvement recommendations to enhance accessibility.", "priority": "2"}, {"id": "i45", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/A1/xx", "name": "Electrical Safety - 5-Yearly Fixed Electrical Installation Condition Inspection Overdue.", "finding": "Records indicated that the 5-yearly fixed electrical installation condition inspection was overdue.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are inspected/tested at regular intervals to check they are satisfactory condition for continued use.", "recommendation": "Engage an competent electrical engineer to carry out fixed electrical installation condition inspection; and Ensure that if any remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified, that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i46", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/A2/xx", "name": "Electrical Safety \u2013 Copy of the Fixed Electrical Installation Condition Inspection Certificate Available.", "finding": "A copy of the fixed electrical installation commissioning report was not readily available at the time of the visit.", "reason": "Electrical installation commissioning confirms the system is effective, meets requirements, and is safe to use before the system is active.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the electrical installation commissioning report; and Ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy.", "priority": "2"}, {"id": "i47", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/B1/xx", "name": "Electrical Safety - Fixed Electrical Installation Condition Remedial / Corrective Actions Completed", "finding": "Remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified in the fixed electrical installation condition report. At the time of the visit, there were no records to verify that remedial/corrective actions had been completed.", "reason": "Electrical installations deteriorate with age/use and it is a legal requirement that electrical installations are maintained for continued use.", "recommendation": "Engage an competent electrical engineer to implement the remedial/corrective actions in order of priority/specified time scales; and Ensure that documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i48", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/B2/xx", "name": "Electrical Safety - Copy of the Electrical Installation Condition Report Available", "finding": "There was evidence (label affixed to distribution board) that the electrical installation condition inspection had been undertaken. However, a copy of the electrical installation condition report was not readily available at the time of the visit.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are inspected/tested at regular intervals to check they are satisfactory condition for continued use.", "recommendation": "Liaise with the appointed contractor and obtain a copy of electrical installation condition report. Ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy; and If any remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified, ensure that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i49", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/D1/xx", "name": "Electrical Safety - In-Service Inspection and Test of Electrical Equipment (formerly PAT) Report Available", "finding": "There was evidence that In-service Inspection and Test of Electrical Equipment (formerly PAT) had been undertaken. However, a copy of the report was not readily available at the time of the visit.", "reason": "In-service Inspection and Test of Electrical Equipment (formerly PAT) must be undertaken with records maintained to demonstrate compliance with legislation.", "recommendation": "Obtain a copy of the In-service Inspection and Test of Electrical Equipment report and ensure that if any remedial actions were identified, that they have been implemented and documented evidence is available to confirm any works have been rectified.", "priority": "2"}, {"id": "i50", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/D2/xx", "name": "Electrical Safety - In-Service Inspection and Test of Electrical Equipment (formerly PAT) was in Date", "finding": "In-service Inspection and Test of Electrical Equipment (formerly PAT) was overdue.", "reason": "An In-service Inspection and Test of Electrical Equipment programme must be in place, in accordance with INDG236(REV3), to ensure that portable electrical appliances remain safe to use.", "recommendation": "Arrange for a competent person to carry out the In-service Inspection and Test of Electrical Equipment. If any remedial actions were identified that they have been implemented and documented evidence is available to confirm any works have been rectified. Ensure that an In-service Inspection and Test of Electrical Equipment programme is put in place.", "priority": "2"}, {"id": "i51", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/D3/xx", "name": "Electrical Safety - In-Service Inspection and Test of Electrical Equipment (formerly PAT) Completed", "finding": "In-service Inspection and Test of Electrical Equipment (formerly PAT) had not been carried out.", "reason": "An In-service Inspection and Test of Electrical Equipment programme must be in place, in accordance with INDG236(REV3), to ensure that portable electrical appliances remain safe to use.", "recommendation": "Arrange for a competent person to carry out the In-service Inspection and Test of Electrical Equipment. If any remedial actions were identified that they have been implemented and documented evidence is available to confirm any works have been rectified. Ensure that an In-service Inspection and Test of Electrical Equipment programme is put in place.", "priority": "2"}, {"id": "i52", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/D4/xx", "name": "Electrical Safety \u2013 Controls in Place for Use of Personal Portable Electrcial Appliances", "finding": "There were no suitable controls in place for the use of personal portable electrical appliances.", "reason": "An In-service Inspection and Test of Electrical Equipment programme must be in place, in accordance with INDG236(REV3), to ensure that portable electrical appliances remain safe to use.", "recommendation": "If workers are permitted to use personal portable electrical devices, ensure that there are suitable controls in place and that these items are included in the In-service Inspection and Test of Electrical Equipment programme (formerly PAT).", "priority": "2"}, {"id": "i53", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/E1/xx", "name": "Electrical Safety - No Damaged / Defective Electrcial Appliances Observed", "finding": "At the time of the visit damaged/defective electrical fittings were observed.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are maintained for continued use.", "recommendation": "Engage a competent electrical engineer to replace the damaged/defective electrical fittings.", "priority": "1"}, {"id": "i54", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/F1/xx", "name": "Electrical Safety \u2013 No Defective Electrcial Appliances Observed", "finding": "Defective portable electrical appliances/leads were observed.", "reason": "An In-service Inspection and Test of Electrical Equipment programme must be in place, in accordance with INDG236(REV3), to ensure that portable electrical appliances remain safe to use.", "recommendation": "The portable electrical appliances were removed at the time of the visit. Remind workers of the importance of pre-use checks of portable electrical appliances. Ensure that electrical safety is monitored daily as part of fire, health and safety management (i.e. hazard reporting). Ensure that a program (i.e. monthly) of in-house fire, health and safety inspections are undertaken and records are maintained.", "priority": "1"}, {"id": "i55", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/G1/xx", "name": "Electrical Safety \u2013 Electrical Service Cupboard / Plant Room Door Locked", "finding": "The electrical service cupboard/riser cupboard/plant room door was no locked shut.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Ensure that the electrical service cupboard/riser cupboard/plant room door is kept locked shut and that this is monitored daily as part of fire safety management.", "priority": "1"}, {"id": "i56", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/G2/xx", "name": "Electrical Safety \u2013 Service Cupboard 30-Minute Fire Rated Construction", "finding": "The electrical service cupboard was not of 30-minute fire rated construction.", "reason": "Materials meeting classifications in Approved Document B should be used.", "recommendation": "The electrical service cupboard construction should be removed, and materials meet classifications in Approved Document B used.", "priority": "3"}, {"id": "i57", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/G3/xx", "name": "Electrical Safety -Safety Signage Displayed", "finding": "There was a lack of safety signage.", "reason": "There is a requirement to ensure that safety signs are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Display electrical hazard warning signage on the electrical cupboard door(s).", "priority": "2"}, {"id": "i58", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/H1/xx", "name": "Electrical Safety \u2013 No Daisy Chaining Observed", "finding": "There was a risk of fire due to daisy-chained (linked in series) multiple socket extension leads. Daisy-chained multiple extension leads have been known to overheat and catch fire if overloaded or faulty.", "reason": "There must be sufficient numbers of power sockets installed to eliminate the use of extension leads and the use of extension leads is only permitted as a temporary measure.", "recommendation": "Ensure that multiple socket extension leads are not linked in series and are fitted with integral surge protection. Where additional electrical sockets are required, arrange for a competent electrical engineer to install them.", "priority": "1"}, {"id": "i59", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/H2/xx", "name": "Electrical Safety \u2013 Block Adaptors Not in Use", "finding": "There was a risk of fire due to the use of block adaptors. The multi-use block style adaptors have been known to overheat and catch fire if overloaded or faulty.", "reason": "There must be a sufficient number of power sockets installed to eliminate the use of block adaptors.", "recommendation": "Remove block adaptors and as an interim measure, replace with surge protected multiple socket extension leads. Ensure that multiple socket extension leads are not linked in series and are the correct cable length to avoid trailing wires. Where additional electrical sockets are required, arrange for a competent electrical engineer to install them.", "priority": "1"}, {"id": "i60", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/H3/xx", "name": "Electrical Safety -Extension Leads Not in Use", "finding": "There was a risk of fire due to the use of extension reels. Extension reels have been known to overheat if not fully unwound or faulty.", "reason": "There must be a sufficient number of power sockets installed to eliminate the use of block adaptors.", "recommendation": "Remove the extension reels and as an interim measure replace with surge protected multiple socket extension leads. Ensure that multiple socket extension leads are not linked in series and are the correct cable length to avoid trailing wires. Where additional electrical sockets are required, arrange for a competent electrical engineer to install them.", "priority": "1"}, {"id": "i61", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/A3/xx", "name": "Electrical Safety - 3-Yearly Fixed Electrical Installation Condition Inspection Overdue.", "finding": "Records indicated that the 3-yearly fixed electrical installation condition inspection was overdue.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are inspected/tested at regular intervals to check they are satisfactory condition for continued use.", "recommendation": "Engage a competent electrical engineer to carry out a fixed electrical installation condition inspection; and Ensure that if any remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified, that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i62", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/A4/xx", "name": "Electrical Safety - Electric Vehicle Charging Points (EVCP\u2019s) Commissioning Report Available", "finding": "Electric vehicle charging points (EVCP\u2019s) had been installed within the car park away from the building. A copy of the commissioning report was not readily available at the time of the visit.", "reason": "Electrical installation commissioning confirms the system is effective, meets requirements, and is safe to use before the system is active.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the electrical installation commissioning report and ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy.", "priority": "2"}, {"id": "i63", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "FS6/B3/xx", "name": "Electrical Safety - Electric Vehicle Charging Points Annual Testing and Maintenance Report Available", "finding": "Electric vehicle charging points (EVCP\u2019s) had been installed within the car park away from the building. A copy of the annual testing and maintenance report was not readily available at the time of the visit.", "reason": "The provision of EVCP\u2019s introduces the risk of electric vehicle (EV) fires on site if not managed and maintained.", "recommendation": "The following controls should be implemented: Maintenance and Servicing \u2013 EVCP\u2019s should be maintained and serviced in accordance with manufacturers recommendations. Annual \u2018invasive tests\u2019 carried out by certified contractor, such as those with NICEIC, ECA, SAFed, NAPIT or SELECT accreditation. A minimum distance of at least 2m around the charging unit and vehicle should be maintained clear of waste, vegetation, storage of stock, and other combustible materials at all times, EVCP\u2019s are visually inspected on a daily basis, Charging/parking areas should clearly be marked with signs, and Emergency manual isolation of EVCP\u2019s should be provided in a prominently sign posted and easily accessible location to allow safe shutdown of equipment in the event of a fault or failure of equipment. Ensure that documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i64", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/A5/xx", "name": "Electrical Safety - Solar Panel Installation Commissioning Report Available", "finding": "A copy of the solar panel installation commissioning report was not readily available at the time of the visit.", "reason": "Solar panel installation commissioning confirms the system is effective, meets requirements, and is safe to use before the system is active.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the solar panel installation commissioning report; and Ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy.", "priority": "2"}, {"id": "i65", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/A6/xx", "name": "Electrical Safety - Annual Solar Panel Installation Inspection Up to Date", "finding": "Records indicated that the annual solar panel installation inspection was overdue.", "reason": "Solar panel installations deteriorate with age/use, and it is a legal requirement that installations are inspected/tested at regular intervals to check they are satisfactory condition for continued use.", "recommendation": "Engage an competent engineer to carry out a solar panel installation inspection; and Ensure that if any remedial/corrective actions were identified that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed. Note: ensure that Planned preventative Maintenance (PPM) is in place in accordance with the manufacturers/installer\u2019s instructions/ BS EN IEC 62446-2 (2020) and annual inspections are undertaken.", "priority": "2"}, {"id": "i66", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/B4/xx", "name": "Electrical Safety - Solar Panel Installation Remedial/ Corrective Actions Completed", "finding": "Remedial/corrective actions were identified in the solar panel installation inspection report. At the time of the visit, there were no records to verify that remedial/corrective actions had been completed.", "reason": "Solar panel installation deteriorates with age/use and it is a legal requirement that electrical installations are maintained for continued use.", "recommendation": "Engage a competent engineer to implement the remedial/corrective actions in order of priority/specified time scales; and Ensure that documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i67", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.6", "topicName": "Electrical Safety", "ref": "3.6/B5/xx", "name": "Electrical Safety - Solar Panel Installation Inspection Report Available", "finding": "There was evidence that the solar panel installation inspection had been undertaken. However, a copy of the report was not readily available at the time of the visit.", "reason": "Solar panel installations must be maintained with records available to demonstrate compliance with legislation.", "recommendation": "Liaise with the appointed contractor and obtain a copy of inspection report. Ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy; and If any remedial/corrective actions were identified, ensure that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "i68", "section": "3. Planning and Implementing (Workplace and Administrative Risk Assessments)", "sectionIdx": 2, "topicRef": "3.7", "topicName": "Emergency Arrangements", "ref": "3.7/A1/xx 3.7/C1/xx 3.7/D1/xx 3.7/E1/xx", "name": "Emergency Arrangements \u2013 Business Continuity Plan in Place", "finding": "There was no Business Continuity Plan (BCP) in place.", "reason": "Employers are required to have emergency plans in place to respond effectively to health and safety incidents and other emergencies that may occur.", "recommendation": "Planning for incidents and emergencies is essential for several reasons: safety, resilience, financial stability and reputati
