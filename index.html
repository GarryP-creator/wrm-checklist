being undertaking,", "recommendation": "Create a risk assessment register identifying all work areas and activities. Complete risk assessments for the work areas and activities. The results of the risk assessments must be communicated to workers. The results of the risk assessments must be communicated to workers.", "priority": "1"}, {"id": "i268", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.22", "topicName": "Activity Risk Assessments", "ref": "3.22/B1/xx", "name": "Activity Risk Assessments \u2013 Reviewed", "finding": "Risk assessments had been completed for work areas/activities. However, the risk assessments now need to be reviewed.", "reason": "There is a requirement that risk assessments are reviewed at least annually, and more frequently if there are significant changes in the workplace, after incidents, or when regulations are updated.", "recommendation": "Review risk assessments completed for work areas/activities. The results of these risk assessments will need to be communicated to workers.", "priority": "2"}, {"id": "i269", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.23", "topicName": "Display Screen Equipment (DSE)", "ref": "3.23/A1/xx", "name": "Display Screen Equipment \u2013 Assessments had been Completed", "finding": "DSE assessments have not been completed for all workers.", "reason": "Employers are required to carry out DSE assessments for the purpose of assessing the health and safety risks to which those persons are exposed in consequence of that use.", "recommendation": "Ensure that workers who are DSE users complete DSE assessments and that any additional controls measures identified are implemented.", "priority": "2"}, {"id": "i270", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.23", "topicName": "Display Screen Equipment (DSE)", "ref": "3.23/B1/xx", "name": "Display Screen Equipment \u2013 Assessments has been Reviewed in the Last 24 Months", "finding": "DSE assessments had been completed. However, the DSE assessments have not been reviewed within the last 24-months.", "reason": "There is a requirement that DSE assessments are reviewed regularly, where there is reason to suspect that it is no longer valid, or where there has been a significant change in the matters to which it relates.", "recommendation": "Ensure that DSE assessments are reviewed every 24-months, where there is reason to suspect that it is no longer valid, or where there has been a significant change in the matters to which it relates.", "priority": "2"}, {"id": "i271", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.23", "topicName": "Display Screen Equipment (DSE)", "ref": "3.23/C1/xx", "name": "Display Screen Equipment \u2013 Workstations meet the Requirements Laid Out in the DSE Regulations", "finding": "The workstations do not meet the requirements laid out in The Health and Safety (Display Screen Equipment) Regulations 1992.", "reason": "Employers shall ensure that any workstation which may be used for the purposes of his undertaking meets the requirements laid down in The Health and Safety (Display Screen Equipment) Regulations 1992.", "recommendation": "Review the existing provisions of DSE workstations and ensure that the minimum requirements of The Health and Safety (Display Screen Equipment) Regulations 1992 are met.", "priority": "2"}, {"id": "i272", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.23", "topicName": "Display Screen Equipment (DSE)", "ref": "3.23/D1/xx", "name": "Display Screen Equipment \u2013 Daily Workload was Planned to Allow for Periodic Breaks", "finding": "The daily workload of DSE users was not planned to allow for periodic interruptions, i.e. breaks or changes of activity as reduce their workload at the computer.", "reason": "Employers are required to plan the daily activities of DSE users to be periodically interrupted by such breaks or changes of activity as reduce their workload at that equipment.", "recommendation": "Ensure that the daily workload of DSE users is planned to allow for breaks of 5-10 minutes per hour from DSE.", "priority": "2"}, {"id": "i273", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.23", "topicName": "Display Screen Equipment (DSE)", "ref": "3.23/E1/xx", "name": "Display Screen Equipment \u2013 Workers were Aware of the Policy and Procedure for Eyesight Tests for DSE Users", "finding": "Workers were unaware of the organisations policy and procedure regarding eyesight tests for DSE users.", "reason": "Employers are required to arrange eyesight tests for DSE users if requested and have to provide glasses if a worker needs then solely for DSE use.", "recommendation": "Ensure that DSE users are made aware of the organisations policy and procedure regarding eyesight tests.", "priority": "2"}, {"id": "i274", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.23", "topicName": "Display Screen Equipment (DSE)", "ref": "3.23/F1/xx", "name": "Display Screen Equipment \u2013 Workers had Received DSE Awareness Instruction and Training", "finding": "There was no evidence that workers had received DSE awareness instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers are given: DSE awareness information and training; Periodic refresher training; and Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i275", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.23", "topicName": "Display Screen Equipment (DSE)", "ref": "3.23/F2/xx", "name": "Display Screen Equipment - Workers DSE Awareness Instruction and Training has been Refreshed", "finding": "Records indicated that workers had been provided with DSE awareness information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i276", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/A1/xx", "name": "Driving Safely \u2013 Workers were Aware of Company Owned/Leased Vehicles Policies/Procedures", "finding": "Workers who drove for business purposes (using company owned/leased or private vehicles) were not made aware of the Transport Safety Policy/Procedures.", "reason": "Employers are required to manage health and safety risks for workers driving as part of working activities.", "recommendation": "Ensure that workers who drive for business purposes (using company owned/leased or private vehicles) are made aware of the Transport Policy/Procedure and that they have read and understood the Drivers Handbook.", "priority": "2"}, {"id": "i277", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/B1/xx", "name": "Driving Safely \u2013 A Structured Process for Completing Checks of Driving Licenses for Workers Driving for Business was in Place", "finding": "There was no structured process for completing checks of driving licenses of workers who drove for business purposes (using company owned/leased or private vehicles).", "reason": "Employers are required to manage health and safety risks for workers and others, who may be affected by driving as part of working activities.", "recommendation": "Ensure that there is a structured process in place for checking driving licenses of workers who drive for business purposes (using company owned/leased or private vehicles), whereby: High-risk drivers, i.e. those with multiple penalty points are checked monthly. Medium-risk drivers, i.e. those with some points checked 3-monhtly or 6-motnhly; and Low-risk drivers, i.e. those with clean records checked 6-monhlty or annually.", "priority": "1"}, {"id": "i278", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/C1/xx", "name": "Driving Safely \u2013 Workers were Completing Pre-Journey Checks of their Vehicles", "finding": "Workers who drove company vehicles (owned/leased) for business purposes were not completing recorded pre-journey checks of the vehicles.", "reason": "Employers are required to make sure that work equipment is maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that workers who drive for business purposes are given information and instruction to complete pre-journey vehicle checks. Ensure that recorded pre-journey vehicle checks are completed and records maintained for each vehicle.", "priority": "2"}, {"id": "i279", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/D1/xx", "name": "Driving Safely \u2013 Up to Date Records of MOT/Road Tax\u2019Insurance/Maintenance & Servicing Records were Available", "finding": "Up-to-date records of MOT/Road Tax/insurance/maintenance & servicing records for company vehicles (owned/leased) were not readily available at the time of the visit.", "reason": "Employers are required to manage health and safety risks for workers and others, who may be affected by driving as part of working activities.", "recommendation": "Ensure that up-to-date records of MOT/Road Tax/insurance/ maintenance & servicing records for company vehicles (owned/leased) are readily available.", "priority": "1"}, {"id": "i280", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/D2/xx", "name": "Driving Safely \u2013 A Structured Process for Obtaining MOT/Road Tax/Insurance/Maintenance & Servicing Records from Workers was in Place", "finding": "There was no structured process for obtaining MOT/Road Tax/insurance/maintenance & servicing records from workers who drove for business purposes using private vehicles.", "reason": "Employers are required to manage health and safety risks for workers and others, who may be affected by driving as part of working activities.", "recommendation": "Ensure that workers submit an annual self-declaration for their obligations when using private vehicles for business purposes. In particular: The vehicle is taxed. The vehicle has a valid MOT certificate (where applicable); The vehicle is serviced/maintained in accordance with the manufacturer\u2019s guidance; and The vehicle is insured for business use.", "priority": "1"}, {"id": "i281", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/E1/xx", "name": "Driving Safely \u2013 Workers Driving for Business were Aware of the Procedure to Follow if the Vehicle Broke Down or they had an Accident", "finding": "Workers who drove for business purposes were not made aware of procedures to follow if the vehicle should break down or have an accident.", "reason": "Employers are required to manage health and safety risks for workers driving as part of working activities.", "recommendation": "Ensure that workers are made aware of the Transport Policy/Procedure and that they have read and understood the Drivers Handbook.", "priority": "2"}, {"id": "i282", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/F1/xx", "name": "Driving Safely \u2013 Workers Driving for Business were given Adequate Time to Complete Business Journeys", "finding": "Workers who drove for business purposes indicated that adequate time was not allocated to complete business journeys.", "reason": "Employers are required to manage health and safety risks for workers driving as part of working activities.", "recommendation": "Ensure that journeys are planned which are safe for the driver(s), taking into consideration: Planning routes (availability of service stations, avoiding minor roads, low bridges or weight restrictions); Travel distances. Schedules to allow for drivers to adhere to The Highway Code 15-minute break every 2-hours. Avoiding peak periods of traffic; and The weather.", "priority": "1"}, {"id": "i283", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.24", "topicName": "Driving Safety", "ref": "3.24/G1/xx", "name": "Driving Safely \u2013 Adverse Weather Conditions were Taken into Consideration for Workers Driving for Business", "finding": "Workers who drove for business purposes indicated that consideration was not given to adverse weather conditions when completing business journeys.", "reason": "Employers are required to manage health and safety risks for workers driving as part of working activities.", "recommendation": "Ensure that during adverse weather, journeys are planned which are safe for the driver(s), taking into consideration: Rescheduling for when the weather has improved. Equipping company vehicles with winter tyres, correct levels of windscreen washer fluid for freezing conditions. Planning routes (availability of service stations, avoiding minor roads, low bridges or weight restrictions). Travel distances. Make allowance for additional time. Schedules to allow for drivers to adhere to The Highway Code 15-minute break every 2-hours; and Avoiding peak periods of traffic.", "priority": "1"}, {"id": "i284", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.25", "topicName": "Drugs and Alcohol Misuse", "ref": "3.25/A1/xx", "name": "Drugs and Alcohol Misuse \u2013 No Incidents Reported", "finding": "There have been incidents where workers had brought/consumed alcohol and/or drugs into the workplace.", "reason": "Employers are required to protect the health and safety of their workers. This includes recognising signs of drug and alcohol misuse.", "recommendation": "Ensure that the Alcohol and Drugs Policy and Procedure are implemented. Ensure that workers have read and understood the Workers Health and Safety Handbook. Create a supportive workplace culture that encourages workers to seek help.", "priority": "1"}, {"id": "i285", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/A1/xx", "name": "Home Working \u2013 Risk Assessments had been Completed", "finding": "A risk assessment for home working had not been completed.", "reason": "Employers are required to make a suitable and sufficient assessment of the risks to the health and safety of employees to which they are exposed whilst they are at work and the risks to the health and safety of persons not in employment arising out of or in connection with the work being undertaking,", "recommendation": "Complete a home working risk assessment. The results of the risk assessment will need to be communicated to employees.", "priority": "2"}, {"id": "i286", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/B1/xx", "name": "Home Working \u2013 Risk Assessments has been Reviewed", "finding": "The home working risk assessment had been completed. However, the risk assessment now needs to be reviewed.", "reason": "There is a requirement that risk assessments are reviewed at least annually, and more frequently if there are significant changes in the workplace, after incidents, or when regulations are updated.", "recommendation": "Review the home working risk assessment. The results of the risk assessments will need to be communicated to workers.", "priority": "2"}, {"id": "i287", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/C1/xx", "name": "Home Working \u2013 DSE Assessment have been Completed by Home Workers", "finding": "DSE assessments have not been completed for home workers.", "reason": "Employers are required to carry out DSE assessments for the purpose of assessing the health and safety risks to which those persons are exposed in consequence of that use.", "recommendation": "Ensure that home workers complete DSE assessments and that any additional controls measures identified are implemented.", "priority": "2"}, {"id": "i288", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/D1/xx", "name": "Home Working \u2013 DSE Assessments Completed by Home Workers have been Reviewed", "finding": "DSE assessments had been completed for home workers. However, the DSE assessments have not been reviewed within the last 24-months.", "reason": "There is a requirement that DSE assessments are reviewed regularly, where there is reason to suspect that it is no longer valid, or where there has been a significant change in the matters to which it relates.", "recommendation": "Ensure that home worker DSE assessments are reviewed every 24-months, where there is reason to suspect that it is no longer valid, or where there has been a significant change in the matters to which it relates.", "priority": "2"}, {"id": "i289", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/E1/xx", "name": "Home Working \u2013 Self-Assessment Forms had been Completed", "finding": "Home workers had not completed the home worker self-assessment form.", "reason": "Employers are required to conduct assessments for home workers, to ensure that the working environment is safe.", "recommendation": "Ensure that workers complete the home worker self-assessment form.", "priority": "2"}, {"id": "i290", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/F1/xx", "name": "Home Working \u2013 Daily Workload has been Planned to Allow for Periodic Breaks", "finding": "The daily workload of home worker DSE users was not planned to allow for periodic interruptions, i.e. breaks or changes of activity as reduce their workload at the computer.", "reason": "Employers are required to plan the daily activities of DSE users to be periodically interrupted by such breaks or changes of activity as reduce their workload at that equipment.", "recommendation": "Ensure that the daily workload of home worker DSE users is planned to allow for breaks of 5-10 minutes per hour from DSE.", "priority": "2"}, {"id": "i291", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/G1/xx", "name": "Home Working \u2013 Home Workers are Aware of the Policy and Procedure Regarding Eyesight Tests for DSE Users", "finding": "Home workers were unaware of the organisations policy and procedure regarding eyesight tests for DSE users.", "reason": "Employers are required to arrange eyesight tests for DSE users if requested and have to provide glasses if a worker needs then solely for DSE use.", "recommendation": "Ensure that home worker DSE users are made aware of the organisations policy and procedure regarding eyesight tests.", "priority": null}, {"id": "i292", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/H1/xx", "name": "Home Working \u2013 Home Workers had Received DSE and Remote Working Awareness Instruction and Training", "finding": "There was no evidence that workers had received DSE and Remote Working awareness instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers are given: DSE and Remote Working awareness information and training. Periodic refresher training; and Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i293", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.26", "topicName": "Home Workplace Safety", "ref": "3.26/H2/xx", "name": "Home Working - DSE and Remote Working Awareness Instruction and Training had been Refreshed", "finding": "Records indicated that workers had been provided with DSE and Remote Working awareness information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i294", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.27", "topicName": "Lone Working", "ref": "3.27/A1/xx", "name": "Lone Working - Lone Working Awareness Training Provided", "finding": "There was no evidence that workers had received Lone Working awareness instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers are given: Lone Worker awareness information and training. Periodic refresher training. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i295", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.27", "topicName": "Lone Working", "ref": "3.27/A2/xx", "name": "Lone Working \u2013 Lone Working Awareness Refresher Training Provided", "finding": "Records indicated that workers had been provided with Lone Working awareness information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i296", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.27", "topicName": "Lone Working", "ref": "3.27/B1/xx", "name": "Lone Working \u2013 Risk Assessments Completed", "finding": "Risk assessments have not been completed for lone working operations, i.e. shift work, working outside of normal business hours.", "reason": "Employers are required to make a suitable and sufficient assessment of manual handling operations.", "recommendation": "Identify all lone working operations and complete risk assessments. The results of these risk assessments will need to be communicated to employees.", "priority": "1"}, {"id": "i297", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.27", "topicName": "Lone Working", "ref": "3.27/C1/xx", "name": "Lone Working - Risk Assessments Reviewed", "finding": "Risk assessments for lone working had been completed. However, the risk assessments now need to be reviewed.", "reason": "There is a requirement that risk assessments are reviewed at least annually, and more frequently if there are significant changes in the workplace, after incidents, or when regulations are updated.", "recommendation": "Review risk assessments completed for lone working operations. The results of these risk assessments will need to be communicated to employees.", "priority": "2"}, {"id": "i298", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.28", "topicName": "Manual Handling", "ref": "3.28/A1/xx", "name": "Manual Handling \u2013 Risk Assessments Completed", "finding": "Risk assessments have not been completed for manual handling operations.", "reason": "Employers are required to make a suitable and sufficient assessment of manual handling operations.", "recommendation": "Identify all manual handling operations and complete risk assessments. Where possible, eliminate or mechanise those tasks that present a significant risk of injury (e.g. use manual trolleys).", "priority": "2"}, {"id": "i299", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.28", "topicName": "Manual Handling", "ref": "3.28/B1/xx", "name": "Manual Handling \u2013 Risk Assessments Reviewed", "finding": "Risk assessments had been completed for manual handling operations. However, the risk assessments now need to be reviewed.", "reason": "There is a requirement that risk assessments are reviewed at least annually, and more frequently if there are significant changes in the workplace, after incidents, or when regulations are updated.", "recommendation": "Review risk assessments completed for manual handling operations. The results of these risk assessments will need to be communicated to employees.", "priority": "2"}, {"id": "i300", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.29", "topicName": "New and Expectant Mothers", "ref": "3.29/A1/xx", "name": "New and Expectant Mothers \u2013 Risk Assessments Completed", "finding": "New and Expectant Mother Assessments were not being carried out.", "reason": "Employers are required to carry out specific/individual assessments for pregnant women, women who have given birth in the last 6-months or are breastfeeding.", "recommendation": "Ensure that New and Expectant Mother Assessments are completed when an employee has notified the organisation of pregnancy, given birth within the last 6-months or are breast feeding.", "priority": "2"}, {"id": "i301", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.30", "topicName": "Occupational Health", "ref": "3.30/A1/xx", "name": "Occupational Health - Health Surveillance Programme in Place", "finding": "There was no occupational health surveillance program in place for workers.", "reason": "Employers are required to provide workers with occupational health surveillance, having regard to the risks to their health and safety which are identified by risk assessments and taking account of exposure monitoring.", "recommendation": "Review risk and COSHH assessments and where identified, implement an occupational health surveillance/monitoring program in consultation with an Occupational Health specialist. As a minimum the occupational health surveillance/monitoring program should include: Spirometry (Lung Function) tests Audiometry (Hearing) tests Skin surveillance Night-shift worker medicals Hand Arm Vibration Syndrome (HAVS) (White Finger)) Driver medicals (Forklifts, company vehicles, etc.) Work at Height medicals (MEWP operators)", "priority": "2"}, {"id": "i302", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.30", "topicName": "Occupational Health", "ref": "3.30/A2/xx", "name": "Occupational Health - Programme for On-Going Health Surveillance was Sufficient", "finding": "There was an occupational health surveillance program in place for workers. However, the program only covered yyyyy.", "reason": "Employers are required to provide workers with occupational health surveillance, having regard to the risks to their health and safety which are identified by risk assessments and taking account of exposure monitoring.", "recommendation": "Review risk and COSHH assessments and where identified, implement an occupational health surveillance/monitoring program in consultation with an Occupational Health specialist. As a minimum the occupational health surveillance/monitoring program should include: Spirometry (Lung Function) tests Audiometry (Hearing) tests Skin surveillance Night-shift worker medicals Hand Arm Vibration Syndrome (HAVS) (White Finger)) Driver medicals (Forklifts, company vehicles, etc.) Work at Height medicals (MEWP operators)", "priority": "2"}, {"id": "i303", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.30", "topicName": "Occupational Health", "ref": "3.30/A3/xx", "name": "Occupational Health \u2013 Programme for On-Going Health Surveillance in Place", "finding": "Occupational health surveillance for workers had been undertaken. However, there was no program in place for ongoing monitoring.", "reason": "Employers are required to provide workers with occupational health surveillance, having regard to the risks to their health and safety which are identified by risk assessments and taking account of exposure monitoring.", "recommendation": "Implement an occupational health surveillance/monitoring program (periodically repeated) in consultation with an Occupational Health specialist. As a minimum the occupational health surveillance/monitoring program should include: Spirometry (Lung Function) tests Audiometry (Hearing) tests Skin surveillance Night-shift worker medicals Hand Arm Vibration Syndrome (HAVS) (White Finger)) Driver medicals (Forklifts, company vehicles, etc.) Work at Height medicals (MEWP operators)", "priority": "2"}, {"id": "i304", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.30", "topicName": "Occupational Health", "ref": "3.30/B1/xx", "name": "Occupational Health \u2013 Pre-Employment Health Checks Completed", "finding": "Pre-employment health checks, i.e. questionnaires, were not being undertaken prior to new workers joining the organisation.", "reason": "Employers are required to make reasonable adjustments to accommodate the employee\u2019s needs.", "recommendation": "Implement pre-employment health checks in consultation with an Occupational Health specialist.", "priority": "2"}, {"id": "i305", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.30", "topicName": "Occupational Health", "ref": "3.30/C1/xx", "name": "Occupational Health \u2013 Health Surveillance Records Kept", "finding": "Records of occupational health surveillance for workers were not being kept.", "reason": "Health records must be maintained and that records are kept available in a suitable form for at least 40-years from the date of the last entry.", "recommendation": "Ensure that records are kept in a suitable form for at least 40-years from the date of the last entry.", "priority": "2"}, {"id": "i306", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/A1/xx", "name": "Personal Protective Equipment (PPE) \u2013 Risk and COSHH Assessments Completed", "finding": "PPE/RPE had been issued to workers, however, risk and COSHH assessments had not been completed.", "reason": "There is a requirement to ensure that suitable personal protective equipment is provided to workers who may be exposed to a risk to their health or safety while at work except where and to the extent that such risk has been adequately controlled by other means which are equally or more effective.", "recommendation": "Complete risk and COSHH assessments for the work areas and activities. Identify PPE requirements specified in Safet Data Sheets (SDSs). The results of the risk assessments must be communicated to workers.", "priority": "2"}, {"id": "i307", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/D1/xx", "name": "Personal Protective Equipment (PPE) \u2013 PPE Issued to Workers in Good Condition", "finding": "PPE issued to workers was in poor condition.", "reason": "There is a requirement that any PPE provided to workers is maintained (including replaced or cleaned as appropriate) in an efficient state, in efficient working order and in good repair.", "recommendation": "Implement a process for the replacement or cleaning of PPE. Ensure that workers are aware of the process for replacing PPE in poor condition or cleaning.", "priority": "2"}, {"id": "i308", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/E1/xx", "name": "Personal Protective Equipment (PPE) \u2013 PPE/RPE Storage Correctly", "finding": "PPE/RPE was not being stored so to prevent damage or contamination from other hazards.", "reason": "There is a requirement for the provision of accommodation/ storage of PPE/RPE which has been issued to workers.", "recommendation": "Ensure that workers are provided suitable accommodation/ storage for PPE/RPE that they have been issued.", "priority": "2"}, {"id": "i309", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/F1/xx", "name": "Personal Protective Equipment (PPE) \u2013 PPE/RPE Instruction and Training Provided", "finding": "There was no evidence that workers had received PPE/RPE instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Ensure that workers complete PPE/RPE training. Ensure that new starters complete allocated health and safety training during induction. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "2"}, {"id": "i310", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/F2/xx", "name": "Personal Protective Equipment (PPE) - PPE/RPE Information and Refresher Training Completed", "finding": "Records indicated that workers had been provided with PPE/RPE information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i311", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/G1/xx", "name": "Personal Protective Equipment (PPE) \u2013 Structured Process in Place for Workers to Report Loss or Damaged PPE/RPE", "finding": "There was no structured process for workers to report the loss or damaged PPE/RPE.", "reason": "Where workers have been provided with PPE, there is a requirement for the reporting of lost or damaged PPE/RPE.", "recommendation": "Implement a process for the reporting of lost or damaged PPE/RPE. Ensure that workers are made aware of the process for reporting lost or damaged PPE/RPE.", "priority": "2"}, {"id": "i312", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/B1/xx", "name": "Personal Protective Equipment (PPE) \u2013 RPE Face-Fit Tests Has Been Completed", "finding": "RPE had been issued to workers, however, face-fit tests had not been undertaken.", "reason": "There is a requirement to ensure that suitable personal protective equipment is provided to workers who may be exposed to a risk to their health or safety while at work except where and to the extent that such risk has been adequately controlled by other means which are equally or more effective.", "recommendation": "Ensure that face-fit tests are completed for workers who have been issued with RPE.", "priority": "2"}, {"id": "i313", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.31", "topicName": "Personal Protective Equipment (PPE)", "ref": "3.31/C1/xx", "name": "Personal Protective Equipment (PPE) \u2013 PPE Items Worn by Workers was Compatible", "finding": "Workers were wearing more than 1 item of PPE and reported difficulties in compatibility.", "reason": "There is a requirement that where more than one item of PPE is worn simultaneously, the equipment must be compatible and continues to be effective against the risk or risks.", "recommendation": "Review PPE provisions", "priority": "2"}, {"id": "i314", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.32", "topicName": "Training", "ref": "3.32/A1/xx", "name": "Training \u2013 Workers have Received H&S Instruction and Training", "finding": "There was no evidence that workers had received / completed health and safety instruction and training.", "reason": "There is a requirement for the provision of health and safety information and training to workers.", "recommendation": "Develop a health and safety training matrix identifying health and safety training needs for workers. Ensure that workers complete allocated health and safety training. Ensure that new starters complete allocated health and safety training during induction. Periodic refresher training is completed. Maintain up-to-date records of instruction and training.", "priority": "1"}, {"id": "i315", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.32", "topicName": "Training", "ref": "3.32/B1/xx", "name": "Training -Safe Operating Procedures have been Documented", "finding": "There was no documented evidence, i.e. Safe Operating Procedures (SOPs), detailing, step-by-step instruction of how to perform a specific task, such as operating plant, machinery or equipment.", "reason": "Employers are required to provide instruction and training to workers for the use of work equipment.", "recommendation": "Develop a SOP register identifying specific tasks, such as operating plant, machinery or equipment for which SOPs are required. Create SOPs for the specific tasks identified in the SOP register. Communicate SOPs to workers. Maintain up-to-date records of instruction and training. Periodic refresher training is completed.", "priority": "2"}, {"id": "i316", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.32", "topicName": "Training", "ref": "3.32/B2/xx", "name": "Training \u2013 Safe Operating Procedures have been Reviewed", "finding": "There was documented evidence, i.e. Safe Operating Procedures (SOPs), detailing, step-by-step instruction of how to perform a specific task, such as operating plant, machinery or equipment. However, the SOPs should now be reviewed.", "reason": "Employers are required to provide instruction and training to workers for the use of work equipment.", "recommendation": "Review existing SOPs for the specific tasks. Communicate SOPs to workers. Maintain up-to-date records of instruction and training. Periodic refresher training is completed.", "priority": "2"}, {"id": "i317", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.32", "topicName": "Training", "ref": "3.32/C1/xx", "name": "Training \u2013 Refresher Training has been Completed", "finding": "Records indicated that workers had been provided with health and safety information and training, however, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i318", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.32", "topicName": "Training", "ref": "3..32/C2/xx", "name": "Training \u2013 Safe Operating Procedure Training has been Refreshed", "finding": "Records indicated that workers had been provided with instruction and training using SOPs, for specific tasks, such as operating plant, machinery or equipment. However, refresher training was due.", "reason": "There is a requirement for the provision of health and safety information and training to workers and periodic refresher training.", "recommendation": "Ensure that a program of refresher health and safety training is provided to workers and that records are maintained up to date.", "priority": "2"}, {"id": "i319", "section": "3. Planning and Implementing (Overview Employee/Activity Risk Assessments)", "sectionIdx": 3, "topicRef": "3.33", "topicName": "Young Persons", "ref": "3.33/A1/xx", "name": "Young Persons \u2013 Assessments Completed", "finding": "Young persons (16\u201318-year-olds) risk assessments had not been completed.", "reason": "Employers are required to have in place risk assessments for young persons.", "recommendation": "Complete young person\u2019s risk assessments. The results of the risk assessments must be communicated to workers.", "priority": "1"}, {"id": "i320", "section": "4. Measuring Performance", "sectionIdx": 4, "topicRef": "4.1", "topicName": "Accidents", "ref": "4.1.1/xx", "name": "Accidents \u2013 All Accidents, Incidents and Near Misses were Recorded", "finding": "Accidents and near misses were not being recorded.", "reason": "There is a requirement to report details of accidents and near misses. In addition, certain workplace injuries, near-misses, dangerous occurrences and cases of work-related disease must be reported to the HSE.", "recommendation": "Ensure that accidents and near misses are recorded, i.e. accident logbook or via WRMonline and that investigations are completed and documented.", "priority": "1"}, {"id": "i321", "section": "4. Measuring Performance", "sectionIdx": 4, "topicRef": "4.2", "topicName": "Checklists", "ref": "4.2.1/xx", "name": "Checklists \u2013 H&S Workplace Inspections Completed", "finding": "Routine/recorded in-house monthly health and safety workplace inspections were not being undertaken.", "reason": "A program of routine workplace health and safety inspections are an important part of overall health and safety management; proactively identifying potential hazards for corrective action to prevent incidents.", "recommendation": "Ensure that a program (i.e. monthly) of in-house workplace health and safety inspections are undertaken and records are maintained.", "priority": "1"}, {"id": "i322", "section": "5. Auditing and Reviewing Performance", "sectionIdx": 5, "topicRef": "5.1", "topicName": "Audit Review \u2013 Completed Actions", "ref": "5.1.1/xx", "name": "Audit Review, Completed Actions \u2013 Most Outstanding Actions have been Completed", "finding": "There a number of outstanding actions from the previous report(s).", "reason": "Employers are required to take reasonable steps to protect the health, safety and welfare of workers and other affected by their work.", "recommendation": "The outstanding actions from the previous report(s) should be implemented in order of priority to reduce the overall level of risk to the following level: Tolerable.", "priority": "3"}, {"id": "i323", "section": "5. Auditing and Reviewing Performance", "sectionIdx": 5, "topicRef": "5.2", "topicName": "Review of Risk Assessments", "ref": "5.2.1/xx", "name": "Review of Risk Assessments \u2013 All Risk Assessments have been Reviewed", "finding": "Risk assessments had been completed for work areas/activities. However, the risk assessments now need to be reviewed.", "reason": "There is a requirement that risk assessments are reviewed at least annually, and more frequently if there are significant changes in the workplace, after incidents, or when regulations are updated.", "recommendation": "Review risk assessments completed for work areas/activities. The results of these risk assessments will need to be communicated to employees.", "priority": "2"}] },
    fire: { key: 'fire', label: 'Fire Safety', shortLabel: 'Fire', fileTag: 'FireSafety', items: [{"id": "fs1", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrcial Installation \u2013 Commissioning Report Available", "ref": "FS1/A1/xx", "name": "Fixed Electrcial Installation \u2013 Commissioning Report Available", "finding": "A copy of the fixed electrical installation commissioning report was not readily available at the time of the visit.", "reason": "Electrical installation commissioning confirms the system is effective, meets requirements, and is safe to use before the system is active.", "recommendation": "Liaise with the appointed contractor and obtain a copy of the electrical installation commissioning report; and Ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs2", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrcial Installation \u2013 Inspection Report Available", "ref": "FS1/B1/xx", "name": "Fixed Electrcial Installation \u2013 Inspection Report Available", "finding": "There was evidence (label affixed to distribution board) that the electrical installation condition inspection had been undertaken. However, a copy of the electrical installation condition report was not readily available at the time of the visit.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are inspected/tested at regular intervals to check they are satisfactory condition for continued use.", "recommendation": "Liaise with the appointed contractor and obtain a copy of electrical installation condition report. Ensure that a copy of the report is readily available on site, either electronically (via WRMonline) or hard copy; and If any remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified, ensure that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs3", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrcial Installation \u2013 5-Yearly Inspection Completed", "ref": "FS1/A4/xx FS1/B3/xx", "name": "Fixed Electrcial Installation \u2013 5-Yearly Inspection Completed", "finding": "Records indicated that the 5-yearly fixed electrical installation condition inspection was overdue.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are inspected/tested at regular intervals to check they are satisfactory condition for continued use.", "recommendation": "Engage a competent electrical engineer to carry out fixed electrical installation condition inspection; and Ensure that if any remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified, that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs4", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Fixed Electrical Installation \u2013 Remedial / Corrective Actions Identified on the Condition Report have been Rectified", "ref": "FS1/B6/xx", "name": "Fixed Electrical Installation \u2013 Remedial / Corrective Actions Identified on the Condition Report have been Rectified", "finding": "Remedial/corrective actions, i.e. C1, C2, C3 or Further Investigation (FI) were identified in the fixed electrical installation condition report. At the time of the visit, there were no records to verify that remedial/corrective actions had been completed.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are maintained for continued use.", "recommendation": "Engage an competent electrical engineer to implement the remedial/corrective actions in order of priority/specified time scales; and Ensure that documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs5", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electrical Fittings \u2013 No Defective / Damaged Electrcial Fittings Observed", "ref": "FS1/C1/xx", "name": "Electrical Fittings \u2013 No Defective / Damaged Electrcial Fittings Observed", "finding": "At the time of the visit damaged/defective electrical fittings were observed.", "reason": "Electrical installations deteriorate with age/use, and it is a legal requirement that electrical installations are maintained for continued use.", "recommendation": "Engage a competent electrical engineer to replace the damaged/defective electrical fittings.", "priority": "1"}, {"id": "fs6", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Extension Cables \u2013 No Multiple Extension Cables Linked Observed", "ref": "FS1/D1/xx", "name": "Extension Cables \u2013 No Multiple Extension Cables Linked Observed", "finding": "There was a risk of fire due to daisy-chained (linked in series) multiple socket extension leads. Daisy-chained multiple extension leads have been known to overheat and catch fire if overloaded or faulty.", "reason": "There must be sufficient numbers of power sockets installed to eliminate the use of extension leads and the use of extension leads is only permitted as a temporary measure.", "recommendation": "Ensure that multiple socket extension leads are not linked in series and are fitted with integral surge protection. Where additional electrical sockets are required, arrange for a competent electrical engineer to install them.", "priority": "1"}, {"id": "fs7", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electrical Block Adaptors \u2013 No Multi-Block Style Adaptors Observed", "ref": "FS1/D2/xx", "name": "Electrical Block Adaptors \u2013 No Multi-Block Style Adaptors Observed", "finding": "There was a risk of fire due to the use of block adaptors. The multi-use block style adaptors have been known to overheat and catch fire if overloaded or faulty.", "reason": "There must be sufficient numbers of power sockets installed to eliminate the use of block adaptors.", "recommendation": "Remove block adaptors and as an interim measure, replace with surge protected multiple socket extension leads. Ensure that multiple socket extension leads are not linked in series and are the correct cable length to avoid trailing wires. Where additional electrical sockets are required, arrange for a competent electrical engineer to install them.", "priority": "1"}, {"id": "fs8", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electrical Extension Cables \u2013 No Faulty Extension Cables Observed", "ref": "FS1/D3/xx", "name": "Electrical Extension Cables \u2013 No Faulty Extension Cables Observed", "finding": "There was a risk of fire due to the use of extension reels. Extension reels have been known to overheat if not fully unwound or faulty.", "reason": "There must be sufficient numbers of power sockets installed to eliminate the use of block adaptors.", "recommendation": "Remove the extension reels and as an interim measure replace with surge protected multiple socket extension leads. Ensure that multiple socket extension leads are not linked in series and are the correct cable length to avoid trailing wires. Where additional electrical sockets are required, arrange for a competent electrical engineer to install them.", "priority": "1"}, {"id": "fs9", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Portable Electrical Appliances \u2013 Testing Report Available", "ref": "FS1/E1/xx", "name": "Portable Electrical Appliances \u2013 Testing Report Available", "finding": "There was evidence that In-service Inspection and Test of Electrical Equipment (formerly PAT) had been undertaken. However, a copy of the report was not readily available at the time of the visit.", "reason": "In-service Inspection and Test of Electrical Equipment (formerly PAT) must be undertaken with records maintained to demonstrate compliance with legislation.", "recommendation": "Obtain a copy of the In-service Inspection and Test of Electrical Equipment report and ensure that if any remedial actions were identified that they have been implemented and documented evidence is available to confirm any works have been rectified.", "priority": "2"}, {"id": "fs10", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Portable Electrical Appliances \u2013 Testing Completed", "ref": "FS1/E2/xx", "name": "Portable Electrical Appliances \u2013 Testing Completed", "finding": "In-service Inspection and Test of Electrical Equipment (formerly PAT) was overdue.", "reason": "An In-service Inspection and Test of Electrical Equipment programme must be in place, in accordance with INDG236(REV3), to ensure that portable electrical appliances remain safe to use.", "recommendation": "Arrange for a competent person to carry out the In-service Inspection and Test of Electrical Equipment. If any remedial actions were identified that they have been implemented and documented evidence is available to confirm any works have been rectified. Ensure that an In-service Inspection and Test of Electrical Equipment programme is put in place.", "priority": "2"}, {"id": "fs11", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Portable Electrical Appliances \u2013 Controls in Place for Personal Equipment in Use", "ref": "FS1/F1/xx", "name": "Portable Electrical Appliances \u2013 Controls in Place for Personal Equipment in Use", "finding": "There were no suitable controls in place for the use of personal portable electrical appliances.", "reason": "An In-service Inspection and Test of Electrical Equipment programme must be in place, in accordance with INDG236(REV3), to ensure that portable electrical appliances remain safe to use.", "recommendation": "If workers are permitted to use personal portable electrical devices, ensure that there are suitable controls in place and that these items are included in the In-service Inspection and Test of Electrical Equipment programme (formerly PAT).", "priority": "2"}, {"id": "fs12", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Electric Powered Vehicles \u2013 None Observed", "ref": "FS1/F2/xx", "name": "Electric Powered Vehicles \u2013 None Observed", "finding": "Electric powered personal vehicles (EPPVs), i.e. electric bicycles, e-scooters or e-unicycles)) were observed within the building; charging and/or stored.", "reason": "The lithium batteries in EPPVs hold a significant amount of energy and can expel this in the form of a very hot localised fire, or in some rare cases an explosion, known as \u2018thermal runaway\u2019, which can be difficult to control and/or extinguish. These fires or explosions can occur when the battery is damaged or charged incorrectly, or when involved in a fire which has started elsewhere. When involved in a fire, lithium batteries generate toxic gases, such as carbon monoxide and hydrogen cyanide.", "recommendation": "The building is not suitable for charging and/or storage of EPPVs and workers must remove their EPPVs. Note: Contact insurance provider regarding EVVPs within the premises.", "priority": "1"}, {"id": "fs13", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Neon Signage / Displays \u2013 Fire Fighter Switches Identifiable", "ref": "FS1/G1/xx", "name": "Neon Signage / Displays \u2013 Fire Fighter Switches Identifiable", "finding": "High voltage neon signs/displays were installed within the premises. The firefighter switch(es) for the high voltage neon signs/displays could not be identified/located at the time of the visit.", "reason": "Firefighter switch(es) should be easily identifiable for the Fire and Rescue Service upon arrival at the building.", "recommendation": "If firefighter switch(es) have been installed, ensure that the switch(es) are easily identifiable; or If firefighter switch(es) have not been installed, arrange for a competent electrical engineer to install.", "priority": "2"}, {"id": "fs14", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking \u2013 Smoking Only Observed in Designated Smoking Areas", "ref": "FS1/I1/xx", "name": "Smoking \u2013 Smoking Only Observed in Designated Smoking Areas", "finding": "There was evidence that workers were not smoking at the designated area on site.", "reason": "Controls must be in place to prevent fires as a result of smoking.", "recommendation": "Ensure that workers/visitors/contractors are instructed to smoke only at the designated area of the site.", "priority": "1"}, {"id": "fs15", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking - No Smoking Signage in Good Condition", "ref": "FS1/I2/xx", "name": "Smoking - No Smoking Signage in Good Condition", "finding": "\u2018No smoking\u2019 signage was not displayed/was worn/damaged at the entrance(s) to the premises.", "reason": "Controls must be in place to prevent fires as a result of smoking.", "recommendation": "Display/or replace \u2018no smoking\u2019 signage at the entrance(s) of the premises.", "priority": "2"}, {"id": "fs16", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking - Pole / Ash Tray Available at Designated Smoking Areas", "ref": "FS1/I3/xx", "name": "Smoking - Pole / Ash Tray Available at Designated Smoking Areas", "finding": "There was no smoker\u2019s pole/ashtray at the designated smoker\u2019s area on site.", "reason": "Controls must be in place to prevent fires as a result of smoking.", "recommendation": "Provide a smoker\u2019s pole/ashtray at the designated smokers area and that it is regularly emptied.", "priority": "1"}, {"id": "fs17", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Smoking \u2013 Designated Smoking Areas Clear of Waste", "ref": "FS1/I4/xx", "name": "Smoking \u2013 Designated Smoking Areas Clear of Waste", "finding": "There was a designated smoker\u2019s area on site and at the time of the visit the ashtray was overflowing, and other waste material was present.", "reason": "Controls must be in place to prevent fires as a result of smoking.", "recommendation": "Ensure that ashtray is regularly emptied and that workers are instructed not to place ither waste in the ashtray.", "priority": "1"}, {"id": "fs18", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Gas Safety - Annual Gas Safety Inspection Undertaken", "ref": "FS1/K3/xx", "name": "Gas Safety - Annual Gas Safety Inspection Undertaken", "finding": "It could not be confirmed at the time of the visit when the most recent annual gas safety inspection had been undertaken.", "reason": "Annual gas safety inspections on all the gas appliances installed on the property, including the flues and boilers must be undertaken by a Gas Safe registered engineer.", "recommendation": "If the annual gas safety inspection was not completed within the last 12-months, engage a Gas Safe registered engineer to carry out the annual gas safety inspection. Ensure that if any remedial/corrective actions were identified that they are implemented in order of priority/specified time scales and documented evidence is available, either electronically (via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "1"}, {"id": "fs19", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Heating \u2013 No Portable Heaters Observed", "ref": "FS1/L1/xx", "name": "Heating \u2013 No Portable Heaters Observed", "finding": "A number of portable heaters were being used within the workplace.", "reason": "Fires often result from portable heaters being placed too close to combustible materials such as paper, or similar items being placed on top of, or against the hot surfaces of heaters.", "recommendation": "The portable heaters must be removed and if additional heating is required, arrange for a competent person to install fixed heating systems.", "priority": "1"}, {"id": "fs20", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Heating - Fixed Heating and Ventilation System Maintenance Records Available", "ref": "FS1/M1/xx", "name": "Heating - Fixed Heating and Ventilation System Maintenance Records Available", "finding": "Records for the maintenance of fixed heating and ventilation system(s) were not readily available at the time of the visit.", "reason": "Fixed heating and ventilation system(s) must be maintained with records available to demonstrate compliance with legislation.", "recommendation": "Ensure that a Planned Preventative Maintenance (PPM) program is put into place for the fixed heating and ventilation system(s) and that records are readily available on site, either electronically (via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs21", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Heating \u2013 Naked Flame Heaters Not Observed", "ref": "FS1/N1/xx", "name": "Heating \u2013 Naked Flame Heaters Not Observed", "finding": "Naked flame heaters formed part of the buildings heating system.", "reason": "Fire hazards associated with naked flame involve overheating systems or faulty equipment.", "recommendation": "Naked flame should be replaced with fixed convector heaters or a central heating system.", "priority": "3"}, {"id": "fs22", "section": "1. Sources of ignition allowing fire to start", "sectionIdx": 0, "topicRef": "1.", "topicName": "Clearance between Ceiling Fixed Lighting and Goods \u2013 Suitable Levels of Stock on Racking / Shelving to Allow for Adequate Clearance", "ref": "FS1/P1/xx", "name": "Clearance between Ceiling Fixed Lighting and Goods \u2013 Suitable Levels of Stock on Racking / Shelving to Allow for Adequate Clearance", "finding": "There was very little clearance between the ceiling fixed lighting and goods/materials stored on the top shelf of the racking/shelving system.", "reason": "A minimum of 300mm clearance between lighting and goods/materials must be maintained.", "recommendation": "Reduce stock levels on the top level of the racking/shelving system and use markers on walls/racking/shelving uprights to indicate the maximum storage level/height.", "priority": "1"}, {"id": "fs23", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Housekeeping \u2013 Adequate Housekeeping Standards", "ref": "FS2/A1/xx", "name": "Housekeeping \u2013 Adequate Housekeeping Standards", "finding": "The overall standard of housekeeping was inadequate.", "reason": "Good housekeeping and waste management is essential to reduce sources of fuel in the event of a fire and there is a requirement to ensure that workplaces are kept sufficiently clean.", "recommendation": "Improve and monitor housekeeping daily as part of fire safety management.", "priority": "1"}, {"id": "fs24", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Combustible/Flammable Materials - Electrical Service Cupboard/Plant Room Clear of Combustible/Flammable Materials", "ref": "FS2/B1/xx", "name": "Combustible/Flammable Materials - Electrical Service Cupboard/Plant Room Clear of Combustible/Flammable Materials", "finding": "Combustible/flammable materials were observed within the electrical service cupboard/plant room.", "reason": "Electrical service cupboards/plant rooms are potentially hazardous areas that require extra care and attention to reduce the risk of fire.", "recommendation": "Remove combustible/flammable materials from the electrical service cupboard. Ensure that the electrical service cupboard/plant room is kept locked shut and routinely checked as part of fire safety management.", "priority": "1"}, {"id": "fs25", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Combustible Materials - No Accumulation/Storage of Combustible Materials within the Building", "ref": "FS2/C1/xx", "name": "Combustible Materials - No Accumulation/Storage of Combustible Materials within the Building", "finding": "There was an accumulation/storage of combustible materials within the building.", "reason": "Good housekeeping and waste management is essential to reduce sources of fuel in the event of a fire and there is a requirement to ensure that workplaces are kept sufficiently clean.", "recommendation": "Reduce the number of stored items within the building.", "priority": "2"}, {"id": "fs26", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Waste \u2013 No Accumulation of Waste within the Building", "ref": "FS2/C2/xx", "name": "Waste \u2013 No Accumulation of Waste within the Building", "finding": "There was an accumulation of waste within the building.", "reason": "Good housekeeping and waste management is essential to reduce sources of fuel in the event of a fire and there is a requirement that waste materials shall not be allowed to accumulate in a workplace.", "recommendation": "Remove waste from site and implement controls to prevent waste accumulation and monitor waste management as part of daily fire safety management.", "priority": "2"}, {"id": "fs27", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Furniture / Furnishings - Compliance Testing Records Available", "ref": "FS2/C3/xx", "name": "Furniture / Furnishings - Compliance Testing Records Available", "finding": "It could not be confirmed at the time of the visit if the furniture/furnishings complied with the Furniture and Furnishings (Fire) (Safety) Regulations 1988.", "reason": "Furniture/furnishing must comply with the Furniture and Furnishings (Fire) (Safety) Regulations 1988, as amended 1989 and 1993.", "recommendation": "Confirm that furniture/furnishings comply with the Furniture and Furnishings (Fire) (Safety) Regulations 1988, as amended 1989 and 1993. Remove/replace furniture/furnishings which are non-compliant.", "priority": "2"}, {"id": "fs28", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Artificial Flowers/Plants \u2013 Compliance Testing Records Available", "ref": "FS2/C4/xx", "name": "Artificial Flowers/Plants \u2013 Compliance Testing Records Available", "finding": "It could not be confirmed at the time of the visit if artificial plants/flowers displays were tested to/complied with BS5867 & BS EN 13501.", "reason": "Artificial plants/flowers mut be tested to BS5867 & BS EN 13501, reducing the risk of ignition or fire spread.", "recommendation": "Ensure that artificial plants/flowers are tested to BS5867 & BS EN 13501. Remove/replace artificial plants/flowers which are non-compliant.", "priority": "2"}, {"id": "fs29", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Combustible / Flammable Materials \u2013 Not Stored in Voids", "ref": "FS2/D1/xx", "name": "Combustible / Flammable Materials \u2013 Not Stored in Voids", "finding": "Voids were being used for the storage of combustible/flammable materials.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Remove combustible/flammable materials from voids within the building. Ensure that voids are routinely checked as part of fire safety management.", "priority": "2"}, {"id": "fs30", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "COSHH \u2013 Appropriate COSHH Product Storage", "ref": "FS2/E1/xx", "name": "COSHH \u2013 Appropriate COSHH Product Storage", "finding": "Various substances were used/handled/stored on site, which were left on workbenches/worktops/electrical trunking.", "reason": "There is a requirement to make suitable and sufficient assessment of the risk and implement/maintain control measures.", "recommendation": "Ensure that: A COSHH Register is developed and maintained, including quantities of substances. Safety Data Sheets (SDS\u2019s) are obtained and kept readily available on site. COSHH Assessments are completed and control measures implemented; and Substances are stored within a COSHH cabinet which is: 30-minute fire resistant certification. Have doors that can be secured/lockable. Be supplied with Hazardous Goods labelling; and Have a bund tray/base sump which should hold any potential leaks.", "priority": "2"}, {"id": "fs31", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "COSHH \u2013 COSHH Register or Assessments Available", "ref": "FS2/E2/xx", "name": "COSHH \u2013 COSHH Register or Assessments Available", "finding": "Various substances were used/handled/stored on site, however, there was no COSHH register or COSHH Assessments.", "reason": "There is a requirement to make suitable and sufficient assessment of the risk and implement/maintain control measures.", "recommendation": "Ensure that: A COSHH Register is developed and maintained, including quantities of substances. Safety Data Sheets (SDS\u2019s) are obtained and kept readily available on site. COSHH Assessments are completed and control measures implemented. Quantities of substances on site kept to a minimum; and Substances are stored within a COSHH cabinet which is: 30-minute fire resistant certification. Have doors that can be secured/lockable. Be supplied with Hazardous Goods labelling; and Have a bund tray/base sump which should hold any potential leaks.", "priority": "2"}, {"id": "fs32", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "DSEAR \u2013 No Highly Flammable / Flammable Products Present on Site", "ref": "FS2/E3/xx", "name": "DSEAR \u2013 No Highly Flammable / Flammable Products Present on Site", "finding": "Substances (highly/flammable/flammable), work processes (generating dusts/fumes/vapours), lift equipment charging stations, PV installations were present on site.", "reason": "The Dangerous Substances and Explosive Atmospheres Regulations 2002 (DSEAR) require employers to control the risks to safety from fire, explosions and substances corrosive to metals.", "recommendation": "Arrange for a DSEAR Assessment to be carried out and implement identified actions.", "priority": "2"}, {"id": "fs33", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "LPG Cylinders \u2013 Stored Securely Within the Building", "ref": "FS2/E4/xx", "name": "LPG Cylinders \u2013 Stored Securely Within the Building", "finding": "LPG cylinders stored insecurely/within the building.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Minimise the amount of LPG cylinders stored on site. LPG cylinders must be stored within a gas cylinder storage cage, kept locked shut and fitted with safety signs and warning notices A risk assessment must be completed and LPG cylinders to be stored externally where there is good natural air ventilation. The LPG cylinder storage area must be: At ground level. Segregated 3m from other store areas (sources of fuel), vegetation and sources ignition. 2m away from final exits/windows/ventilation and conditioning systems /surface water drains of the building. 3m away from vehicle routes. Not directly beneath overhead power or other cables. Accommodate grouping by hazard classification, i.e. full/empty or unserviceable cylinders. Allow for the use manual handling aids, i.e. cylinder trolley. The location of LPG cylinder store must be recorded within the site\u2019s hazardous locations floor plan.", "priority": "1"}, {"id": "fs34", "section": "2. Sources of fuel that may assist fire growth", "sectionIdx": 1, "topicRef": "2.", "topicName": "Heating Appliances \u2013 Not Positioned too Close to Insulated Composite Panels", "ref": "FS2/F1/xx", "name": "Heating Appliances \u2013 Not Positioned too Close to Insulated Composite Panels", "finding": "Heating appliances were positioned too close to insulated composite panels.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Ensure the heating appliances are a sufficient distance away from the insulated composite panels and ensure the panels themselves are maintained and in good condition.", "priority": "1"}, {"id": "fs35", "section": "3. Sources of oxygen", "sectionIdx": 2, "topicRef": "3.", "topicName": "Fire Doors \u2013 Fire Doors and / or Windows Found Closed at the Time of the Visit", "ref": "FS3/A1/xx", "name": "Fire Doors \u2013 Fire Doors and / or Windows Found Closed at the Time of the Visit", "finding": "Fire doors and / or windows were open at the time of the visit.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Workers must be reminded that fire doors must not be wedged/held open, unless fire door retainers which are linked to the fire alarm system are installed. Ensure that a daily program is in place where fire doors and windows are shut at the end of the working day as part of daily fire safety management.", "priority": "1"}, {"id": "fs36", "section": "3. Sources of oxygen", "sectionIdx": 2, "topicRef": "3.", "topicName": "Oxidising Materials \u2013 Not Stored alongside Flammable Materials", "ref": "FS3/B1/xx", "name": "Oxidising Materials \u2013 Not Stored alongside Flammable Materials", "finding": "Oxidising materials were being stored alongside flammable materials.", "reason": "There is a requirement to make suitable and sufficient assessment of the risk and implement/maintain control measures.", "recommendation": "Ensure that oxidising materials are stored away from flammable materials. Refer to Safety Data Sheets (SDS\u2019s) and COSHH Assessments for storage controls.", "priority": "1"}, {"id": "fs37", "section": "3. Sources of oxygen", "sectionIdx": 2, "topicRef": "3.", "topicName": "Oxygen Cylinders \u2013 Stored Securely", "ref": "FS3/C1/xx", "name": "Oxygen Cylinders \u2013 Stored Securely", "finding": "Oxygen cylinders were not being stored securely.", "reason": "There is a requirement to assess the risks in the workplace and take all reasonably practicable precautions to ensure the safety of workers.", "recommendation": "Minimise the amount of oxygen cylinders stored on site. A risk assessment must be completed and oxygen cylinders stored when not in use in a well-ventilated storage area/compound, away from combustible materials, and sources ignition and separated from cylinders of flammable gas, i.e. propane and butane. Keep cylinders upright, chained/clamped to prevent them from falling over. Accommodate grouping by hazard classification, i.e. full/empty or unserviceable cylinders.", "priority": "1"}, {"id": "fs38", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 In Good Condition", "ref": "FS4/A1/xx FS7/O1/xx", "name": "Fire Doors \u2013 In Good Condition", "finding": "Fire doors were in poor condition due to day-to-day wear and tear.", "reason": "There are requirements for the design, installation, and maintenance of fire doors.", "recommendation": "Arrange for a fire door inspection to be carried out by a competent person (i.e. FDIS Certificated Inspector) and implement any remedial actions in order of priority. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs39", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Remedial Actions Outstanding from Inspection / Survey have been Rectified", "ref": "FS4/A2/xx FS7/O2/xx", "name": "Fire Doors \u2013 Remedial Actions Outstanding from Inspection / Survey have been Rectified", "finding": "A fire door inspection/survey had been carried out, however, there was no evidence that the remedial actions had been implemented.", "reason": "There are requirements for the design, installation, and maintenance of fire doors.", "recommendation": "Ensure that remedial actions are implemented in order of priority and specified timescales. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs40", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4."
