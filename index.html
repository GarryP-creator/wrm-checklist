, "topicName": "Fire Doors \u2013 No Gaps Around Fire Door Leaf and Door Frame", "ref": "FS4/A3/xx", "name": "Fire Doors \u2013 No Gaps Around Fire Door Leaf and Door Frame", "finding": "Gaps around the fire door leaf and door frame exceeded 3mm, which is generally considered ideal to ensure that the door can close properly while providing an effective barrier against fire and smoke.", "reason": "There are requirements for the design, installation, and maintenance of fire doors.", "recommendation": "Arrange for a fire door inspection to be carried out by a competent person (i.e. FDIS Certificated Inspector) and implement any remedial actions in order of priority. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs41", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Threshold Gap Did Not Exceed 8-10mm", "ref": "FS4/A4/xx", "name": "Fire Doors \u2013 Threshold Gap Did Not Exceed 8-10mm", "finding": "The threshold gap (between the door leaf and the floor) exceeded 8-10mm which is generally considered ideal to ensure that the door can close properly while providing an effective barrier against fire and smoke.", "reason": "There are requirements for the design, installation, and maintenance of fire doors.", "recommendation": "Arrange for a fire door inspection to be carried out by a competent person (i.e. FDIS Certificated Inspector) and implement any remedial actions in order of priority. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs42", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Spread \u2013 Suitable Level of Materials on Walls", "ref": "FS4/A5/xx", "name": "Fire Spread \u2013 Suitable Level of Materials on Walls", "finding": "A large amount of material had been fitted to/displayed on the walls which may promote fire spread.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "The amount of material fitted to/displayed on walls must be reduced.", "priority": "2"}, {"id": "fs43", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Spread - Sufficient Compartmentation", "ref": "FS4/A7/xx", "name": "Fire Spread - Sufficient Compartmentation", "finding": "There was a lack of compartmentation.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Arrange for a competent person to install fire shutter barriers linked to the fire alarm system to sub-divide xxxxx.", "priority": "3"}, {"id": "fs44", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Spread \u2013 No Gaps in Building Structure \u2013 Including Gaps in Ceilings / Walls Where Cables Pass Through", "ref": "FS4/C1/xx", "name": "Fire Spread \u2013 No Gaps in Building Structure \u2013 Including Gaps in Ceilings / Walls Where Cables Pass Through", "finding": "There were gaps/holes in walls/ceilings where cables/pipework pass through, which would allow for smoke fire to pass through.", "reason": "Buildings are compartmentalised to delay the spread of fire from one area to another and fire stopping has a critical role to play in any passive fire protection.", "recommendation": "This fire risk assessment was not invasive and other fire stopping issues may be hidden. Arrange for a competent person to (i.e. FIRAS accredited) to carry out a fire stopping survey and implement any remedial actions in order of priority.", "priority": "2"}, {"id": "fs45", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Stopping \u2013 Evidence of Periodic Inspections", "ref": "FS4/C2/xx", "name": "Fire Stopping \u2013 Evidence of Periodic Inspections", "finding": "There was no evidence of periodic inspections for the fire stopping systems that had been installed were cables/pipework pass through walls and ceilings.", "reason": "There is a requirement to ensure that the premises and any facilities, equipment and devices are subject to a suitable system of maintenance and are maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Arrange for a competent person (i.e. FIRAS Scheme certified member) to carry out a fire stopping inspection and implement any remedial actions in order of priority. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "3"}, {"id": "fs46", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Stopping \u2013 Fire Stopping in Good Condition", "ref": "FS4/C3/xx", "name": "Fire Stopping \u2013 Fire Stopping in Good Condition", "finding": "Fire stopping systems installed where cables/pipework pass through walls and ceilings were in poor condition.", "reason": "There is a requirement to ensure that the premises and any facilities, equipment and devices are subject to a suitable system of maintenance and are maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Arrange for a competent person (i.e. FIRAS Scheme certified member) to carry out a fire stopping inspection and implement any remedial actions in order of priority. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs47", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Stopping \u2013 Inspection / Survey Remedial Actions Rectified", "ref": "FS4/C4/xx", "name": "Fire Stopping \u2013 Inspection / Survey Remedial Actions Rectified", "finding": "A fire stopping inspection/survey had been carried out, however, there was no evidence that the remedial actions had been implemented.", "reason": "There is a requirement to ensure that the premises and any facilities, equipment and devices are subject to a suitable system of maintenance and are maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that remedial actions are implemented in order of priority and specified timescales. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs48", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Separation \u2013 Adequate Fire Separation in Access Corridors / Fire Escape Routes", "ref": "FS4/D1/xx", "name": "Fire Separation \u2013 Adequate Fire Separation in Access Corridors / Fire Escape Routes", "finding": "There was inadequate fire separation in access corridors/fire escape routes.", "reason": "Corridors more than 30m long must subdivided near the centre with 30-minute fire door-sets (fire door leaf supplied pre-hung, in its compatible fire door frame, hinges, glazing (vision panel), intumescent fire or smoke seals, self-closing mechanism).", "recommendation": "Arrange for a competent person (i.e. FIRAS Scheme member) to install a 30-minute fire door-set (i.e. BWF-CERTIFIRE Door-set) with glazing (vision panel), intumescent fire or smoke seals, self-closing mechanism, to subdivide the corridor near the centre. Ensure that documentation supplied with the fire door-set is available, electronically (i.e. via WRMonline) or hard copy. Note: It is advised that fire door-sets should be obtained through an approved supplier, i.e. BWF Approved Fire Door Centre, with BWF-CERTIFIRE Labels fitted to the door leaf (not to be removed) and associated documentation is retained.", "priority": "3"}, {"id": "fs49", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Not Wedged Open Fire Doors Observed", "ref": "FS4/E1/xx", "name": "Fire Doors \u2013 Not Wedged Open Fire Doors Observed", "finding": "Fire doors were being wedged open.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Workers must be reminded that fire doors must not be wedged/held open, unless fire door retainers which are linked to the fire alarm system are installed. Ensure that this is monitored daily as part of fire safety management.", "priority": "1"}, {"id": "fs50", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Self-Closing / Automatic Closing Devices Not Obstructed", "ref": "FS4/E2/xx", "name": "Fire Doors \u2013 Self-Closing / Automatic Closing Devices Not Obstructed", "finding": "Fire doors (self-closing/automatic) obstructed were obstructed due to stored items.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Workers must be reminded that fire doors must not be obstructed. Ensure that this is monitored daily as part of fire safety management.", "priority": "1"}, {"id": "fs51", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Door Retainer Function Checks Documented", "ref": "FS4/E3/xx", "name": "Fire Doors \u2013 Door Retainer Function Checks Documented", "finding": "Fire doors had been fitted with fire door retainers linked to the fire alarm system. However, there were no function checks, i.e. when completing the weekly fire alarm test.", "reason": "There is a requirement that equipment/devices/systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Ensure that function checks of fire doors fitted with fire door retainers are undertaken, i.e. when completing the weekly fire alarm test and that records are available, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs52", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Fire Doors \u2013 Closing Unaided", "ref": "FS4/E4/xx FS7/O3/xx", "name": "Fire Doors \u2013 Closing Unaided", "finding": "Fire doors were not closing fully unaided.", "reason": "There is a requirement that equipment/devices/systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Arrange for a competent person (i.e. FIRAS Scheme certified member) to inspect and make adjustments so that the fire door closes fully unaided.", "priority": "2"}, {"id": "fs53", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Electrical Service Cupboard / Riser Cupboard / Plant Room - Door Locked", "ref": "FS4/F1/xx", "name": "Electrical Service Cupboard / Riser Cupboard / Plant Room - Door Locked", "finding": "The electrical service cupboard/riser cupboard/plant room door was no locked shut.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Ensure that the electrical service cupboard/riser cupboard/plant room door is kept locked shut and that this is monitored daily as part of fire safety management.", "priority": "1"}, {"id": "fs54", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Electrical Service Cupboard \u2013 30-minute Fire Rated Construction", "ref": "FS4/F2/xx", "name": "Electrical Service Cupboard \u2013 30-minute Fire Rated Construction", "finding": "The electrical service cupboard was not of 30-minute fire rated construction.", "reason": "Materials meeting classifications in Approved Document B should be used.", "recommendation": "The electrical service cupboard construction should be removed, and materials meet classifications in Approved Document B used.", "priority": "3"}, {"id": "fs55", "section": "4. Rapid fire and smoke spread in workplace", "sectionIdx": 3, "topicRef": "4.", "topicName": "Composite Panels - In Good Condition", "ref": "FS4/G1/xx", "name": "Composite Panels - In Good Condition", "finding": "Composite panels were in poor condition exposing the core material.", "reason": "Materials meeting classifications in Approved Document B should be used.", "recommendation": "Replace damaged sections of composite panels that comply with Building Regulations.", "priority": "2"}, {"id": "fs56", "section": "5. Fire spread to adjacent properties", "sectionIdx": 4, "topicRef": "5.", "topicName": "Fire Spread \u2013 Adequate Fire-Resisting Separation between Building Occupiers", "ref": "FS5/A1/xx", "name": "Fire Spread \u2013 Adequate Fire-Resisting Separation between Building Occupiers", "finding": "There was inadequate fire-resisting separation between building occupiers.", "reason": "There must adequate fire-separation between buildings to prevent/delay the spread of fire.", "recommendation": "Arrange for a fire engineer to inspect the construction/building structure.", "priority": "3"}, {"id": "fs57", "section": "5. Fire spread to adjacent properties", "sectionIdx": 4, "topicRef": "5.", "topicName": "Fire Spread \u2013 No Accumulation of Combustible Materials Stored Adjacent to the Building", "ref": "FS5/B1/xx", "name": "Fire Spread \u2013 No Accumulation of Combustible Materials Stored Adjacent to the Building", "finding": "There was an accumulation of combustible materials being stored adjacent to the building.", "reason": "Good housekeeping and waste management is essential to reduce the chances of arson and fire spreading to the building/final exits being blocked/obstructed/or spreading to adjacent properties.", "recommendation": "Remove combustible materials and find an alternative location to store materials and monitor as part of daily fire safety management.", "priority": "2"}, {"id": "fs58", "section": "5. Fire spread to adjacent properties", "sectionIdx": 4, "topicRef": "5.", "topicName": "Fire Spread \u2013 No Accumulation Waste Adjacent to the Building", "ref": "FS5/B2/xx", "name": "Fire Spread \u2013 No Accumulation Waste Adjacent to the Building", "finding": "There was an accumulation of waste adjacent to the building.", "reason": "Good housekeeping and waste management is essential to reduce the chances of arson and fire spreading to the building/final exits being blocked/obstructed/or spreading to adjacent properties.", "recommendation": "Remove waste from site and implement controls to prevent waste being placed adjacent to the building/monitor waste management as part of daily fire safety management.", "priority": "2"}, {"id": "fs59", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 Fire Alarm System Connected to an Alarm Receiving Centre (ARC)", "ref": "FS6/A1/xx", "name": "Fire Alarm System \u2013 Fire Alarm System Connected to an Alarm Receiving Centre (ARC)", "finding": "The fire alarm system was not connected to a Alarm Receiving Centre (ARC).", "reason": "Fire alarm systems connected to an ARC offers enhanced safety and rapid response during emergencies. When the fire alarm is triggered, the system alerts the ARC, allowing them to notify your keyholders and emergency services. This immediate action limits fire damage and improves overall safety, particularly when the building is vacant or at night-time.", "recommendation": "It is advised that the fire alarm system is connected to a ARC.", "priority": "3"}, {"id": "fs60", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 Fire Alarm Zone Plan Displayed", "ref": "FS6/B1/xx", "name": "Fire Alarm System \u2013 Fire Alarm Zone Plan Displayed", "finding": "A fire alarm zone plan was not displayed adjacent to the fire alarm system control panel.", "reason": "Detailed fire alarm zone plans are crucial for quick emergency responses, serving as a vital tool for safety management, ensuring that both building occupants and first responders can efficiently navigate and address potential fire incidents.", "recommendation": "An accurate fire zone plan must be displayed adjacent to the fire alarm control panel.", "priority": "2"}, {"id": "fs61", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 Fire Zone Plan had been Updated following Changes to Workplace Layout", "ref": "FS6/B2/xx", "name": "Fire Alarm System \u2013 Fire Zone Plan had been Updated following Changes to Workplace Layout", "finding": "The fire alarm zone plan displayed adjacent to the fire control panel had not been updated following changes to the workplace layout.", "reason": "Detailed fire alarm zone plans are crucial for quick emergency responses, serving as a vital tool for safety management, ensuring that both building occupants and first responders can efficiently navigate and address potential fire incidents.", "recommendation": "An accurate fire zone plan must be displayed adjacent to the fire alarm control panel.", "priority": "2"}, {"id": "fs62", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 Details of False Alarm Recorded", "ref": "FS6/C1/xx", "name": "Fire Alarm System \u2013 Details of False Alarm Recorded", "finding": "Details of false alarms were not being recorded.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Records of false alarms must be kept identifying the following information: date/time, location, reason, category of false alarm, activity in area and action taken.", "priority": "3"}, {"id": "fs63", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 Weekly Fire Alarm Testing Record Up to Date", "ref": "FS6/D1/xx", "name": "Fire Alarm System \u2013 Weekly Fire Alarm Testing Record Up to Date", "finding": "Records of weekly fire alarm testing were not up to date.", "reason": "Weekly fire alarm tests must be carried out and records maintained to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that weekly (set day/time) fire alarm tests are carried out; from a different call point each week and that records are maintained up-to-date, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs64", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 6-Monthly Fire Alarm System Inspections / Maintenance Report Available", "ref": "FS6/D2/xx", "name": "Fire Alarm System \u2013 6-Monthly Fire Alarm System Inspections / Maintenance Report Available", "finding": "There was evidence of 6-monthly fire alarm system inspections/maintenance. However, a copy of the report was not available.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Obtain documentation from the appointed contractor and ensure it is readily available on site, electronically (i.e. via WRMonline) or hard copy. If any remedial/corrective actions were identified, ensure that they are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "1"}, {"id": "fs65", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 6-Monthly Fire Alarm System Inspections / Maintenance Remedial Actions Identified have been Rectified", "ref": "FS6/D3/xx", "name": "Fire Alarm System \u2013 6-Monthly Fire Alarm System Inspections / Maintenance Remedial Actions Identified have been Rectified", "finding": "6-monthly fire alarm system inspections/maintenance records were available. However, remedial actions were identified and there were no records to verify that remedial/corrective actions had been completed.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure remedial/corrective actions are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs66", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 6-Monthly Fire Alarm System Inspections / Maintenance Completed", "ref": "FS6/D4/xx", "name": "Fire Alarm System \u2013 6-Monthly Fire Alarm System Inspections / Maintenance Completed", "finding": "6-monthly fire alarm system inspections/maintenance was overdue.", "reason": "The fire alarm system must be inspected at least every 6-months by a competent professional with records maintained to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that the fire alarm system is maintained 6-monthly by a competent professional and that documentation is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs67", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 No Fault Displayed on Fire Alarm System Control Panel.", "ref": "FS6/D5/xx", "name": "Fire Alarm System \u2013 No Fault Displayed on Fire Alarm System Control Panel.", "finding": "Fault displayed on fire alarm system control panel.", "reason": "A fire detection system protects life/property and must be in service to operate effectively.", "recommendation": "Arrange for a competent professional to inspect and repair the fire alarm system. Ensure documentation it is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs68", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 Manual Call Points Easily Accessible", "ref": "FS6/E1/xx", "name": "Fire Alarm System \u2013 Manual Call Points Easily Accessible", "finding": "Fire alarm system manual call points were obstructed.", "reason": "Fire alarm system manual call points must be easily identifiable and accessible at all times.", "recommendation": "Ensure that manual call points are not obstructed and they are easily accessible and identifiable at all times. Monitor as part of daily fire safety management practice/monthly workplace fire, health and safety checks.", "priority": "1"}, {"id": "fs69", "section": "6. People in workplace unaware of fire", "sectionIdx": 5, "topicRef": "6.", "topicName": "Fire Alarm System \u2013 Automatic Detection Unobstructed", "ref": "FS6/E2/xx", "name": "Fire Alarm System \u2013 Automatic Detection Unobstructed", "finding": "Fire alarm system automatic detection was obstructed.", "reason": "Detectors must be kept away from obstructions that may block smoke.", "recommendation": "Keep a minimum clear space of 500mm from any detector.", "priority": "1"}, {"id": "fs70", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes \u2013 Adequate Maintenance of Escape Routes", "ref": "FS7/A1/xx FS7/O1/xx", "name": "Fire Escape Routes \u2013 Adequate Maintenance of Escape Routes", "finding": "The maintenance of escape routes was poor; fire doors in poor condition/not closing fully, lack of fire stopping/fire stopping in poor condition.", "reason": "There is a requirement that the premises/equipment/devices/ systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Arrange for a fire door inspection to be carried out by a competent person (i.e. FDIS Certificated Inspector) and implement any remedial actions in order of priority. Arrange for a competent person (i.e. FIRAS Scheme certified member) to inspect and make adjustments so that the fire door closes fully unaided. Arrange for a competent person to (i.e. FIRAS accredited) to fire stop the openings. Arrange for a competent person (i.e. FIRAS Scheme certified member) to carry out a fire stopping inspection and implement any remedial actions in order of priority. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "3"}, {"id": "fs71", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes \u2013 No Escape Routes where Escape Could Only be Made in One Direction (i.e. Dead End)", "ref": "FS7/A2/xx", "name": "Fire Escape Routes \u2013 No Escape Routes where Escape Could Only be Made in One Direction (i.e. Dead End)", "finding": "There was an escape route from which escape could only be made in one direction (i.e. a dead end).", "reason": "There is a requirement that the number, distribution and dimensions of emergency routes and exits must be adequate having regard to the use, equipment and dimensions of the premises and the maximum number of persons who may be present there at any one time.", "recommendation": "Implement one of the following solutions: Install automatic fire detection and warning system in those areas where a fire could present a risk to the escape route. Protect the escape route with fire-resisting construction (fire resisting walls and fire doors) to allow people to escape safely past a room in which there is a fire; or Provide an alternative exit.", "priority": "2"}, {"id": "fs72", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes \u2013 Size of Escape Routes Could Cope with the Number of People in the Building", "ref": "FS7/B1/xx", "name": "Fire Escape Routes \u2013 Size of Escape Routes Could Cope with the Number of People in the Building", "finding": "The size of the escape routes could not cope with the number of people in the building.", "reason": "There is a requirement that the number, distribution and dimensions of emergency routes and exits must be adequate having regard to the use, equipment and dimensions of the premises and the maximum number of persons who may be present there at any one time.", "recommendation": "Investigate alternate means of escape to ensure the property can cope with the number of people needing to escape from the building.", "priority": "3"}, {"id": "fs73", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes \u2013 Travel Distances for \u2018One Direction Only\u2019 Do Not Exceed the Limited for Travel Distance where there is No Alternative Route", "ref": "FS7/C1/xx", "name": "Fire Escape Routes \u2013 Travel Distances for \u2018One Direction Only\u2019 Do Not Exceed the Limited for Travel Distance where there is No Alternative Route", "finding": "The travel distance for \u2018one direction only\u2019 exceeds the limit for travel distance where there is no alternative escape route.", "reason": "Limitations on travel distance are set in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Due to the extended travel distances, the existing automatic fire detection system must be upgraded to an L1 fire alarm system.", "priority": "3"}, {"id": "fs74", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes - Travel Distances for \u2018More Than One Direction\u2019 Do Not Exceed the Limit for Travel Distances", "ref": "FS7/C2/xx", "name": "Fire Escape Routes - Travel Distances for \u2018More Than One Direction\u2019 Do Not Exceed the Limit for Travel Distances", "finding": "The travel distances for \u2018more than one direction\u2019 exceeds the limit for travel distances.", "reason": "Limitations on travel distance are set in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Due to the extended travel distances, the existing automatic fire detection system must be upgraded to an L1 fire alarm system.", "priority": "3"}, {"id": "fs75", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes \u2013 Doors on Escape Routes Open in the Direction of Travel", "ref": "FS7/D1/xx", "name": "Fire Escape Routes \u2013 Doors on Escape Routes Open in the Direction of Travel", "finding": "Doors on escape routes did not open the direction of escape.", "reason": "There are requirements regarding doors on escape routes set in in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Arrange for a competent person (i.e. FIRAS Scheme member) to replace existing fire doors with 30-minute fire door-sets (i.e. BWF-CERTIFIRE Door-set) with glazing (vision panel), intumescent fire or smoke seals, self-closing mechanism, that open in the direction of escape. Note: It is advised that fire door-sets should be obtained through an approved supplier, i.e. BWF Approved Fire Door Centre, with BWF-CERTIFIRE Labels fitted to the door leaf (not to be removed) and associated documentation is retained.", "priority": "2"}, {"id": "fs76", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes \u2013 Doors on Escape Route Corridors were Fitted with Vision Panels", "ref": "FS7/D2/xx", "name": "Fire Escape Routes \u2013 Doors on Escape Route Corridors were Fitted with Vision Panels", "finding": "Doors on escape route corridors were not fitted with vision panels.", "reason": "There are requirements regarding doors on escape routes set in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Arrange for a competent person (i.e. FIRAS Scheme member) to replace existing fire doors with 30-minute fire door-sets (i.e. BWF-CERTIFIRE Door-set) with glazing (vision panel), intumescent fire or smoke seals, self-closing mechanism, that open in the direction of escape. Note: It is advised that fire door-sets should be obtained through an approved supplier, i.e. BWF Approved Fire Door Centre, with BWF-CERTIFIRE Labels fitted to the door leaf (not to be removed) and associated documentation is retained.", "priority": "2"}, {"id": "fs77", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Escape Routes - 60-Minute Fire Separation was Provided from the Basement to the Ground Floor.", "ref": "FS7/E1/xx", "name": "Fire Escape Routes - 60-Minute Fire Separation was Provided from the Basement to the Ground Floor.", "finding": "60-minute fire separation was not provided from the Basement to the Ground Floor.", "reason": "Where there is a staircase which links the basement to the upper floors, the Basement is adequately separated from the ground floor.", "recommendation": "The Basement must be separated from the Ground Floor: Two 30-minute fire doors, one at Basement and one at Gound Floor. Any floor over a basement should provide 60-minutes fire resistance.", "priority": "2"}, {"id": "fs78", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Exits \u2013 Number of Fire Exits Sufficient", "ref": "FS7/F1/xx", "name": "Fire Exits \u2013 Number of Fire Exits Sufficient", "finding": "The number of exits was insufficient.", "reason": "There are requirements regarding the number of exits/escape routes set in in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Due to the number of exits, occupancy levels must not exceed xx at any one time.", "priority": "1"}, {"id": "fs79", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Exits \u2013 Final Exits Unobstructed", "ref": "FS7/G1/xx FS7/O2/xx", "name": "Fire Exits \u2013 Final Exits Unobstructed", "finding": "Final exits were obstructed.", "reason": "There is requirement that routes to emergency exits from premises and the exits themselves are kept clear at all times.", "recommendation": "Workers must be reminded that final exits must not be obstructed. Ensure that this is monitored daily as part of fire safety management.", "priority": "1"}, {"id": "fs80", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Exits \u2013 Clear of Vegetation", "ref": "FS7/G2/xx FS7/O3/xx", "name": "Fire Exits \u2013 Clear of Vegetation", "finding": "Final exits were obstructed due to overgrown vegetation.", "reason": "There is requirement that routes to emergency exits from premises and the exits themselves are kept clear at all times.", "recommendation": "Arrange for the vegetation to be cleared and that regular grounds maintenance is undertaken. Ensure that this is monitored as part of fire safety management.", "priority": "1"}, {"id": "fs81", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Exits \u2013 Opened Easily", "ref": "FS7/G3/xx FS7/O4/xx", "name": "Fire Exits \u2013 Opened Easily", "finding": "Final exits were not easily opened.", "reason": "There is a requirement that equipment/devices/systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Arrange for a competent person to inspect and adjust the final exit doors. Ensure final exits are monitored daily as part of fire safety management and reported when no operating correctly/damaged.", "priority": "1"}, {"id": "fs82", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Exits \u2013 Push Bar/Tab Mechanism on the Final Exit Door was in Good Condition", "ref": "FS7/G4/xx FS7/O5/xx", "name": "Fire Exits \u2013 Push Bar/Tab Mechanism on the Final Exit Door was in Good Condition", "finding": "The push bar/tab mechanism on the final exit door was damaged due to day-to-day wear and tear.", "reason": "There is a requirement that equipment/devices/systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Arrange for a competent person to repair or replace the push bar/tab mechanism on the final exit door. Ensure that final exits are monitored daily as part of fire safety management and reported when not operating correctly/damaged.", "priority": "1"}, {"id": "fs83", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Final Exit Doors Opened in the Direction of Travel", "ref": "FS7/G5/xx", "name": "Final Fire Exits \u2013 Final Exit Doors Opened in the Direction of Travel", "finding": "Final exit doors did not open in the direction of escape.", "reason": "There are requirements regarding doors on escape routes set in in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Replace existing final exits doors with doors that open in the direction of escape.", "priority": "2"}, {"id": "fs84", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Fitted with Single Security Device", "ref": "FS7/G6/xx FS7/O6/xx", "name": "Final Fire Exits \u2013 Fitted with Single Security Device", "finding": "The final exit(s) was/were fitted with multiple security devices.", "reason": "There is a requirement that emergency doors must not be so locked or fastened that they cannot be easily and immediately opened by any person who may require to use them in an emergency.", "recommendation": "Final exit doors must be easily and quickly openable and where possible there should only be one fastening, without a key or keycode. Either: Replace multiple security devices with single security devices; Replace keylock(s)/keycode lock(s) with thumb locks and signage; or Implement a documented procedure for removing security devices, key locks/bolts/bars/chains on final exit doors before the start of business to ensure that escape routes are accessible. The procedure must include checks that the final doors open freely, close fully, escape routes to ensure they are clear from obstructions/combustible materials and securing the premises at the end of the day.", "priority": "2"}, {"id": "fs85", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Signage Displayed to Show Direction to Turn Thumb Locks Present", "ref": "FS7/G7/xx FS7/O7/xx", "name": "Final Fire Exits \u2013 Signage Displayed to Show Direction to Turn Thumb Locks Present", "finding": "Thumb locks had been installed to final exits. However, there was no signage displayed indicating the direction to turn to unlock the final exit.", "reason": "There is a requirement to ensure that safety signs are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Display a thumb lock adjacent to the thumb lock indicating the direction to turn.", "priority": "2"}, {"id": "fs86", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Final Exit Doors / Security Fastenings were being Checked", "ref": "FS7/H1/xx", "name": "Final Fire Exits \u2013 Final Exit Doors / Security Fastenings were being Checked", "finding": "Routine checks of final exit doors/security fastenings were not being undertaken.", "reason": "There is a requirement that equipment/devices/systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Carry out monthly checks of final exit doors/security fastenings and keep up-to-date records, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs87", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Final Exit Doors / Security Fastenings Checks Documented", "ref": "FS7/H2/xx", "name": "Final Fire Exits \u2013 Final Exit Doors / Security Fastenings Checks Documented", "finding": "Routine checks of final exit doors/security fastenings were being undertaken, however, there were no records.", "reason": "There is a requirement that equipment/devices/systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Carry out monthly checks of final exit doors/security fastenings and keep up-to-date records, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs88", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Signage with Direction Arrow Displayed to Show the Direction to Open a Final Exit Sliding Door", "ref": "FS7/I1/xx", "name": "Final Fire Exits \u2013 Signage with Direction Arrow Displayed to Show the Direction to Open a Final Exit Sliding Door", "finding": "A manually operated sliding door was used as a final exit.", "reason": "There is a requirement to ensure that safety signs are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Display signage with the words \u2018slide to open\u2019 and an arrow pointing in the direction of opening. The signage must be permanently displayed at about eye level on the face of the door.", "priority": "2"}, {"id": "fs89", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Sliding / Revolving Doors Fitted with Failsafe System", "ref": "FS7/I2/xx", "name": "Final Fire Exits \u2013 Sliding / Revolving Doors Fitted with Failsafe System", "finding": "Automatic sliding/revolving doors were not fitted with a failsafe system in the event of power supply failure.", "reason": "There is a requirement that automatic sliding/revolving doors placed across escape routes are failsafe system.", "recommendation": "Arrange for a competent person to install a failsafe system to the sliding/revolving doors so that they failsafe to an open position or provides outward opening in the vent of power supply failure/fire alarm system activation.", "priority": "2"}, {"id": "fs90", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Final Fire Exits \u2013 Arrangements Provided for Securing Exits was Satisfactory", "ref": "FS7/J1/xx", "name": "Final Fire Exits \u2013 Arrangements Provided for Securing Exits was Satisfactory", "finding": "The arrangements provided for securing exits was unsatisfactory.", "reason": "There is a requirement that equipment/devices/systems must be maintained in an efficient state, in efficient working order and in good repair.", "recommendation": "Arrange for a competent person to replace the damaged push bar/tab mechanism. Ensure that workers are reminded to report hazards to their supervisor/line manager. Ensure that final exits are monitored daily as part of fire safety management and reported when not operating correctly/damaged.", "priority": "1"}, {"id": "fs91", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Throw-Out Escape Ladders \u2013 Fire Strategy Document has been Reviewed", "ref": "FS7/K1/xx", "name": "Throw-Out Escape Ladders \u2013 Fire Strategy Document has been Reviewed", "finding": "Throw-out fire escape ladders were on site. Throw-out fire escape ladders are not normally acceptable and there are requirements for escape windows (clear unobstructed opening area, maximum floor to sill height and remain open without needing to be held). In addition, the ladders must be compatible with window dimensions.", "reason": "Ther is a requirement that in the event of danger, it must be possible for persons to evacuate the premises as quickly and as safely as possible.", "recommendation": "The Fire Strategy document and Fire Emergency Evacuation Plan must be reviewed, taking into consideration: Number of occupants and exits. Escape routes. Travel distances to storey exit/ final exit. Current fire alarm system. Building dimensions, i.e. square footage per floor, floor level above ground level of First Floor Office. Open staircase; and Existing windows on the First Floor.", "priority": "1"}, {"id": "fs92", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Escape Routes \u2013 Protection Designed for Escape Routes was Suitable.", "ref": "FS7/L1/xx", "name": "Escape Routes \u2013 Protection Designed for Escape Routes was Suitable.", "finding": "The standard of protection designed for escape routes was not suitable; fire doors in poor condition/not closing fully, lack of fire stopping/fire stopping in poor condition.", "reason": "There is a requirement that applies to all buildings and deals with the design, construction and protection of escape routes set in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Arrange for a fire door inspection to be carried out by a competent person (i.e. FDIS Certificated Inspector) and implement any remedial actions in order of priority. Arrange for a competent person (i.e. FIRAS Scheme certified member) to inspect and make adjustments so that the fire door closes fully unaided. Arrange for a competent person to (i.e. FIRAS accredited) to fire stop the openings. Arrange for a competent person (i.e. FIRAS Scheme certified member) to carry out a fire stopping inspection and implement any remedial actions in order of priority. Ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "3"}, {"id": "fs93", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Escape Routes \u2013 Glazing within Escape Routes Is Confirmed to be Fire Rated", "ref": "FS7/L2/xx", "name": "Escape Routes \u2013 Glazing within Escape Routes Is Confirmed to be Fire Rated", "finding": "It could not be confirmed if glazing within the escape routes was fire rated (30-minutes).", "reason": "There is a requirement that applies to all buildings and deals with the design, construction and protection of escape routes set in The Building Regulation Fire Safety: Approved Document B (Volume 2: Buildings other than dwellings).", "recommendation": "Obtain documentation for the glazing installed within the escape routes and ensure that documented evidence is available, electronically (i.e. via WRMonline) or hard copy. Replace any glazing that is not fire rated.", "priority": "3"}, {"id": "fs94", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Separation \u2013 Adequate Fire Separation in Access Corridors/Fire Escape Routes", "ref": "FS7/M1/xx", "name": "Fire Separation \u2013 Adequate Fire Separation in Access Corridors/Fire Escape Routes", "finding": "There was inadequate fire separation in access corridors/fire escape routes.", "reason": "Corridors more than 30m long must subdivided near the centre with 30-minute fire door-sets (fire door leaf supplied pre-hung, in its compatible fire door frame, hinges, glazing (vision panel), intumescent fire or smoke seals, self-closing mechanism).", "recommendation": "Arrange for a competent person (i.e. FIRAS Scheme member) to install a 30-minute fire door-set (i.e. BWF-CERTIFIRE Door-set) with glazing (vision panel), intumescent fire or smoke seals, self-closing mechanism, to subdivide the corridor near the centre. Ensure that documentation supplied with the fire door-set is available, electronically (i.e. via WRMonline) or hard copy.", "priority": "3"}, {"id": "fs95", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Evacuation Chairs \u2013 Evacuation Chairs on Upper Floors", "ref": "FS7/N1/xx", "name": "Evacuation Chairs \u2013 Evacuation Chairs on Upper Floors", "finding": "There were/was no evacuation chair(s) on the upper floor(s).", "reason": "Evacuation chairs are vital for ensuring a safe, efficient escape for everyone, including those with mobility impairments in the event of an emergency.", "recommendation": "Ensure: That evacuation chair(s) are provided on the upper floors. Persons nominated to assist with evacuation are provided with evacuation chair training; and An annual maintenance program is put in place for the evacuation chair(s).", "priority": null}, {"id": "fs96", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Escape Routes \u2013 No Items Stored within Escape Routes", "ref": "FS7/O8/xx", "name": "Escape Routes \u2013 No Items Stored within Escape Routes", "finding": "There were stored items within the escape routes.", "reason": "There is requirement that routes to emergency exits from premises and the exits themselves are kept clear at all times.", "recommendation": "Workers must be reminded that final exits must not be obstructed. Ensure that this is monitored daily as part of fire safety management.", "priority": "2"}, {"id": "fs97", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Escape Routes \u2013 Edges of Steps in Final Exits Highlighted", "ref": "FS7/O9/xx", "name": "Escape Routes \u2013 Edges of Steps in Final Exits Highlighted", "finding": "The edges of steps to the exterior of final exits had not been highlighted.", "reason": "There is a requirement to take such general fire precautions to ensure the safety of people and that the premises are safe.", "recommendation": "Highlight steps edges to the exterior of final exits.", "priority": "3"}, {"id": "fs98", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Emergency Lighting \u2013 Records of Monthly Function Tests Up to Date", "ref": "FS7/P1/xx", "name": "Emergency Lighting \u2013 Records of Monthly Function Tests Up to Date", "finding": "Records for monthly function checks of the emergency lighting system were not up to date.", "reason": "Monthly function checks of the emergency lighting system must be carried out and records maintained to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that monthly function checks of the emergency lighting system are carried out and that records are maintained up-to-date, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs99", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Emergency Lighting \u2013 Records of full Discharge Available", "ref": "FS7/P2/xx", "name": "Emergency Lighting \u2013 Records of full Discharge Available", "finding": "Records of annual full discharge testing for the emergency lighting system were not up to date.", "reason": "Annual full discharge testing of the emergency lighting system must be carried out and records maintained to demonstrate compliance with fire safety legislation.", "recommendation": "Obtain documentation from the appointed contractor and ensure it is readily available on site, electronically (i.e. via WRMonline) or hard copy. If any remedial/corrective actions were identified, ensure that they are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs100", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Emergency Lighting \u2013 Remedial / Corrective Actions Identified in Maintenance Records have been Rectified", "ref": "FS7/P3/xx", "name": "Emergency Lighting \u2013 Remedial / Corrective Actions Identified in Maintenance Records have been Rectified", "finding": "Remedial actions were identified during the most recent annual full discharge test of the emergency lighting system. However, there were no records to verify that remedial/corrective actions had been completed.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure remedial/corrective actions are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs101", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Emergency Lighting \u2013 Records of Monthly Function / Annual Full Discharge Tests Completed", "ref": "FS7/P4/xx", "name": "Emergency Lighting \u2013 Records of Monthly Function / Annual Full Discharge Tests Completed", "finding": "There were no records of monthly/annual full discharge testing of the emergency lighting system.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that monthly function checks/annual full discharge tests of the emergency lighting system are carried out and that records are maintained up-to-date, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs102", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Emergency Lighting \u2013 Emergency Lighting Provision is Adequate", "ref": "FS7/P5/xx", "name": "Emergency Lighting \u2013 Emergency Lighting Provision is Adequate", "finding": "Additional emergency lighting is required.", "reason": "There is a requirement that emergency routes/exits requiring illumination must be provided with emergency lighting in the case of failure of normal lighting.", "recommendation": "The emergency escape lighting system must cover the following: Exit doors. Escape routes. Intersections of corridors. Outside each final exit and on external escape routes. Stairways so that each flight receives adequate light. Changes in floor level. Windowless rooms and toilet accommodation exceeding 8m2. Firefighting equipment. Fire alarm call points. Equipment that would need to be shut down in an emergency. Lifts.", "priority": "3"}, {"id": "fs103", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Safey Signage \u2013Sufficient Fire Safety Signage", "ref": "FS7/Q1/xx", "name": "Fire Safey Signage \u2013Sufficient Fire Safety Signage", "finding": "There was a lack of fire safety signage.", "reason": "There is a requirement to ensure that safety signs are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Ensure that the following signage is displayed: Fire exit keep clear sign on the external side of final exits. Fire Action Plan signs adjacent to manual call points (with assembly point details added). Push bar/tab sign above the door release mechanism on the final exit door. Fire door keep shut signs on both sides of fire doors. Automatic fire door keep clear signs on both sides of fire doors fitted with retainers linked to the fire alarm system. Fire door keep locked shut on service cupboard doors. Fire marshal/warden sign (with names of marshals/wardens added).", "priority": "2"}, {"id": "fs104", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Safey Signage \u2013 Adequate Fire Escape Route Signage", "ref": "FS7/Q2/xx", "name": "Fire Safey Signage \u2013 Adequate Fire Escape Route Signage", "finding": "There was a lack of fire escape route signage.", "reason": "There is a requirement to ensure that safety signs are provided and maintained wherever there is a significant residual risk to health and safety that cannot be eliminated or controlled by other means.", "recommendation": "Ensure that escape route signs are: Positioned so that the escaping person will be able to see the next sign. Fixed above the door in the direction of escape and not be \ufb01xed to doors, as they will not be visible if the door is open. Positioned above final exits. Note: For a sign to comply with signs and signals regulations it must be pictographic. The pictogram can be supplemented by text if this is considered necessary to make the sign easily understood (BS-type sign), but you must not have a \ufb01re safety sign that uses only text.", "priority": "2"}, {"id": "fs105", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Fire Safey Signage \u2013 Pictorial and Text Fire Signage Displayed", "ref": "FS7/Q3/xx", "name": "Fire Safey Signage \u2013 Pictorial and Text Fire Signage Displayed", "finding": "Text only signage was displayed.", "reason": "For a sign to comply with signs and signals regulations it must be pictographic. The pictogram can be supplemented by text if this is considered necessary to make the sign easily understood, but you must not have a \ufb01re safety sign that uses only text. Either type of sign can be used but different types must not be mixed.", "recommendation": "Remove and replace text only signage. Note: For a sign to comply with signs and signals regulations it must be pictographic. The pictogram can be supplemented by text if this is considered necessary to make the sign easily understood (BS-type sign), but you must not have a \ufb01re safety sign that uses only text.", "priority": "2"}, {"id": "fs106", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "External Stairway \u2013 Document Available to Confirm Windows were Fire Rated", "ref": "FS7/R1/xx", "name": "External Stairway \u2013 Document Available to Confirm Windows were Fire Rated", "finding": "There were windows within 1.8m horizontally/9m vertically below the external stairway, which were openable and no documentation was available to verify glazing was fire rated.", "reason": "An external stairway must be protected from the effects of a fire along its full length. This means that any door, window (other than toilet windows) and walls within 1.8m horizontally and 9m vertically below any part of the stairway must be fire-resisting. Windows must be fixed shut and doors self-closing.", "recommendation": "Ensure that the windows within 1.8m horizontally/9m vertically below the external stairway are fixed shut and that the glazing is 30-minute fire-rated.", "priority": "3"}, {"id": "fs107", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Inner Room \u2013 Adequate Fire Safety Controls in Place for Inner Rooms", "ref": "FS7/T1/xx", "name": "Inner Room \u2013 Adequate Fire Safety Controls in Place for Inner Rooms", "finding": "There were inadequate fire safety controls in place where the use of an inner room could not be avoided.", "reason": "There are fire safety requirements where the only way out of a room is through another room and that an unnoticed fire in the outer room could trap people in the inner room.", "recommendation": "For persons working within the inner room, there must be adequate warning of a fire provided, by any one of the following means: A vision panel between the two rooms providing adequate vision to give an indication of the conditions in the outer room and the means of escape. A large enough gap between the dividing wall and the ceiling, e.g. 500mm, so that smoke will be seen; or Automatic detection/alarm system is installed in the outer room that will sound a warning in the inner room. In addition, the following controls must be implemented: Restrict the number of people using the inner room to 60. Access rooms should be under the control of the same person as the inner room. The travel distance from any point in the inner room to the exit from the access room should be restricted to escape in one direction only (18m), unless there are alternative exits from the access room (45m). No one should have to pass through more than one access room while making their escape. The outer room must not be an area of high fire risk.", "priority": "3"}, {"id": "fs108", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Smoke Ventilation System \u2013 Record of System Function Checks/6-Monthly Inspection and Maintenance Available", "ref": "FS7/V1/xx", "name": "Smoke Ventilation System \u2013 Record of System Function Checks/6-Monthly Inspection and Maintenance Available", "finding": "There were no records of smoke ventilation system function checks/6-monthly inspection and maintenance.", "reason": "The smoke control system must be inspected and maintained by a competent professional with records maintained to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that weekly function checks/6-monthly inspection and maintenance of the smoke control system are carried out and that records are maintained up-to-date, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs109", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Smoke Ventilation System \u2013 Weekly Checks Up to Date", "ref": "FS7/V2/xx", "name": "Smoke Ventilation System \u2013 Weekly Checks Up to Date", "finding": "Records of weekly smoke ventilation system function checks were not up to date.", "reason": "Weekly smoke ventilation system function checks must be carried out and records maintained to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that weekly smoke ventilation system function checks are carried out and that records are maintained up-to-date, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs110", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Smoke Ventilation System \u2013 6-Monthly Inspection/Maintenance Records Available", "ref": "FS7/V3/xx", "name": "Smoke Ventilation System \u2013 6-Monthly Inspection/Maintenance Records Available", "finding": "There was evidence of 6-monthly smoke control system inspections/maintenance. However, a copy of the report was not available.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Obtain documentation from the appointed contractor and ensure it is readily available on site, electronically (i.e. via WRMonline) or hard copy. If any remedial/corrective actions were identified, ensure that they are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "1"}, {"id": "fs111", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Smoke Ventilation System \u2013 6-Monthly Inspection/Maintenance Records in Date", "ref": "FS7/V4/xx", "name": "Smoke Ventilation System \u2013 6-Monthly Inspection/Maintenance Records in Date", "finding": "6-monthly smoke control system inspections/maintenance was overdue.", "reason": "The smoke control system must be inspected at least every 6-months by a competent professional with records maintained to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure that the smoke control system is maintained 6-monthly by a competent professional and that documentation is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs112", "section": "7. Persons cannot safely evacuate in the event of fire", "sectionIdx": 6, "topicRef": "7.", "topicName": "Smoke Ventilation System \u2013 6-Monthly Inspection/Maintenance Remedial Actions Identified have been Rectified", "ref": "FS7/V5/xx", "name": "Smoke Ventilation System \u2013 6-Monthly Inspection/Maintenance Remedial Actions Identified have been Rectified", "finding": "6-monthly smoke control system inspections/maintenance records were available. However, remedial actions were identified and there were no records to verify that remedial/corrective actions had been completed.", "reason": "It is essential that accurate information is held to demonstrate compliance with fire safety legislation.", "recommendation": "Ensure remedial/corrective actions are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs113", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Sufficient Provision of Fire Extinguishers in Place", "ref": "FS8/A1/xx", "name": "Fire Extinguishers \u2013 Sufficient Provision of Fire Extinguishers in Place", "finding": "There was a lack of fire extinguishers within the workplace.", "reason": "There is a requirement for the provision of appropriate firefighting equipment and correct positioning.", "recommendation": "Paired combinations of water based (6L) and CO2 (2kg) fire extinguishers must be located adjacent to final exits. Ensure fire extinguishers are either wall mounted/placed on a stand and signage identifying fire extinguisher type is displayed.", "priority": "2"}, {"id": "fs114", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Sufficient Provision of Fire Extinguishers in the Plant Room/Lift Motor Room/Electrical Intake Room.", "ref": "FS8/A2/xx", "name": "Fire Extinguishers \u2013 Sufficient Provision of Fire Extinguishers in the Plant Room/Lift Motor Room/Electrical Intake Room.", "finding": "There was a lack of fire extinguishers within Plant Room/Lift Motor Room/Electrical Intake Room.", "reason": "There is a requirement for the provision of appropriate firefighting equipment and correct positioning.", "recommendation": "Ensure that a 5kg CO2 fire extinguisher is placed within the Plant Room/Lift Motor Room/Electrical Intake Room. Ensure fire extinguisher is either wall mounted/placed on a stand and signage identifying fire extinguisher type is displayed.", "priority": "2"}, {"id": "fs115", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Powder Fire Extinguisher Not Located Internally", "ref": "FS8/A4/xx", "name": "Fire Extinguishers \u2013 Powder Fire Extinguisher Not Located Internally", "finding": "Powder fire extinguishers located internally within the workplace. When powder fire extinguishers are discharged within a building/small space, it can lead to a sudden reduction of visibility/impair breathing/trigger asthma attack/damage property/surrounding area.", "reason": "There is a requirement for the provision of appropriate firefighting equipment and correct positioning.", "recommendation": "Replace powder fire extinguisher(s) with CO2 fire extinguisher (obtain the fire extinguisher commissioning documentation and ensure it is available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": null}, {"id": "fs116", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Positioned Correctly", "ref": "FS8/B1/xx", "name": "Fire Extinguishers \u2013 Positioned Correctly", "finding": "Fire extinguishers were not correctly positioned within the workplace.", "reason": "There is a requirement for the provision of appropriate firefighting equipment and correct positioning.", "recommendation": "Ensure that paired combinations of water based (6L) and CO2 (2kg) fire extinguishers are located: Adjacent to final exits. Within escape routes; and Adjacent to exits from floor.", "priority": "2"}, {"id": "fs117", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Mounted at the Correct Height", "ref": "FS8/B2/xx", "name": "Fire Extinguishers \u2013 Mounted at the Correct Height", "finding": "The wall mounted height of 6L fire extinguishers was too high.", "reason": "There is a requirement for the provision of appropriate firefighting equipment and correct positioning.", "recommendation": "The carrying handle of fire extinguishers which are 4kg and above, must be approximately 1-metre from the floor.", "priority": "2"}, {"id": "fs118", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Found to be Wall Mounted or Placed in a Stand", "ref": "FS8/B3/xx", "name": "Fire Extinguishers \u2013 Found to be Wall Mounted or Placed in a Stand", "finding": "Fire extinguishers were found to be free standing.", "reason": "There is a requirement for the provision of appropriate firefighting equipment and correct positioning.", "recommendation": "Ensure fire extinguishers are wall mounted/placed on a stand and signage identifying fire extinguisher type is displayed.", "priority": "2"}, {"id": "fs119", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Unobstructed", "ref": "FS8/C1/xx", "name": "Fire Extinguishers \u2013 Unobstructed", "finding": "Fire extinguishers were obstructed.", "reason": "Fire extinguishers must be easily identifiable and accessible at all times.", "recommendation": "Ensure that fire extinguishers are not obstructed and they are easily accessible and identifiable at all times. Monitor as part of daily fire safety management practice/monthly workplace fire, health and safety checks.", "priority": "1"}, {"id": "fs120", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Commissioning Report Available", "ref": "FS8/D1/xx", "name": "Fire Extinguishers \u2013 Commissioning Report Available", "finding": "The commissioning report for new fire extinguishers was not available.", "reason": "Fire extinguishers used in a commercial/public building must be commissioned (initial service/checking/and labelling fire extinguishers) on site after delivery.", "recommendation": "Liaise with the appointed contractor/supplier and obtain the commissioning documentation and ensure that it is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs121", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Annual Service Report Available", "ref": "FS8/D2/xx", "name": "Fire Extinguishers \u2013 Annual Service Report Available", "finding": "Evidence of annual maintenance (labels affixed) of fire extinguishers. However, a copy of the report was not available.", "reason": "Maintenance by a competent person must be carried out annually and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Obtain documentation from the appointed contractor and ensure it is readily available on site, electronically (i.e. via WRMonline) or hard copy. If any remedial/corrective actions were identified, ensure that they are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "2"}, {"id": "fs122", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 Annual Maintenance in Date", "ref": "FS8/D3/xx", "name": "Fire Extinguishers \u2013 Annual Maintenance in Date", "finding": "The annual maintenance of fire extinguishers was overdue.", "reason": "Maintenance by a competent person must be carried out annually and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Ensure that all fire extinguishers are maintained annually and that documentation is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs123", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Extinguishers \u2013 No Corrective Actions Labels Attached to Fire Extinguishers", "ref": "FS8/D4/xx", "name": "Fire Extinguishers \u2013 No Corrective Actions Labels Attached to Fire Extinguishers", "finding": "The annual maintenance of fire extinguishers had been carried out. However, \u2018corrective action\u2019 labels were affixed to a number of fire extinguishers.", "reason": "Maintenance by a competent person must be carried out annually and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Ensure remedial/corrective actions are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm any works have been completed.", "priority": "1"}, {"id": "fs124", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Fire Blankets \u2013 Annually Inspected", "ref": "FS8/F1/xx", "name": "Fire Blankets \u2013 Annually Inspected", "finding": "Fire blankets within the workplace were not being inspected.", "reason": "Maintenance by a competent person must be carried out annually and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Ensure that fire blankets are maintained annually and that documentation is available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "2"}, {"id": "fs125", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Sprinkler System \u2013 Copies of Maintenance Reports Available", "ref": "FS8/G1/xx", "name": "Sprinkler System \u2013 Copies of Maintenance Reports Available", "finding": "There was evidence of maintenance (labels affixed) of the sprinkler system. However, copies of reports were not available.", "reason": "Sprinkler system maintenance by a competent person must be carried out and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Liaise with the appointed contractor and obtain documentation and ensure that it is available on site, electronically (i.e. via WRMonline) or hard copy. Depending on the on the type/age of the system, records of the following must be in place (where applicable): Weekly tests. 6-monthly maintenance. 2-year pump service. 3-yearly (tank inspection/valves); 5-yearly (oldest or worst condition; 5% or 20 heads (whichever is the greater)). 10-years (tanks drained/cleaned/examined internally and externally). 25-years (pipework and sprinkler heads). Ensure that if any remedial/corrective actions were identified that they are implemented in order of priority/specified time scales and documented evidence is available, electronically i.e. (via WRMonline) or hard copy, to confirm works have been completed.", "priority": "1"}, {"id": "fs126", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Sprinkler System \u2013 Maintenance in Date", "ref": "FS8/G2/xx", "name": "Sprinkler System \u2013 Maintenance in Date", "finding": "Maintenance of the sprinkler system was overdue.", "reason": "Sprinkler system maintenance by a competent person must be carried out and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Ensure that sprinkler system maintenance is in place and that records are readily available on site, electronically (i.e. via WRMonline) or hard copy. Records of the following must be in place (where applicable): Weekly tests. 6-monthly maintenance. 2-year pump service. 3-yearly (tank inspection/valves); 5-yearly (oldest or worst condition; 5% or 20 heads (whichever is the greater)); 10-years (tanks drained/ cleaned/ examined internally and externally); 25-years (pipework and sprinkler heads). Ensure that if any remedial/corrective actions were identified that they are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm works have been completed.", "priority": "1"}, {"id": "fs127", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Sprinkler System \u2013 Maintenance Record Available", "ref": "FS8/G3/xx", "name": "Sprinkler System \u2013 Maintenance Record Available", "finding": "Sprinkler system maintenance records were not available.", "reason": "Sprinkler system maintenance by a competent person must be carried out and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Liaise with centre management and: Confirm testing and maintenance arrangements. Obtain documentation and ensure that it is readily available on site, electronically (i.e. via WRMonline) or hard copy.", "priority": "1"}, {"id": "fs128", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Sprinkler System \u2013 Remedial / Corrective Actions Identified by Maintenance Report have been Rectified", "ref": "FS8/G4/xx", "name": "Sprinkler System \u2013 Remedial / Corrective Actions Identified by Maintenance Report have been Rectified", "finding": "Sprinkler system maintenance was in place. However, remedial actions were identified and there were no records to verify that remedial/corrective actions had been completed.", "reason": "Sprinkler system maintenance by a competent person must be carried out and documentation retained on site, electronically (i.e. via WRMonline) or hard copy.", "recommendation": "Ensure that remedial/corrective actions are implemented in order of priority/specified time scales and documented evidence is available, electronically (i.e. via WRMonline) or hard copy, to confirm works have been completed.", "priority": "1"}, {"id": "fs129", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Sprinkler System \u2013 Sprinkler Heads were Not Obstructed", "ref": "FS8/G5/xx", "name": "Sprinkler System \u2013 Sprinkler Heads were Not Obstructed", "finding": "Sprinkler heads were obstructed.", "reason": "For sprinkler systems to be effective, they must be clear of obstructions, including temporary obstructions such as boxes.", "recommendation": "A minimum clear space of 500mm must be maintained from the top of all storage to the sprinkler heads.", "priority": "1"}, {"id": "fs130", "section": "8. Small fire grows rapidly putting untrained people at risk", "sectionIdx": 7, "topicRef": "8.", "topicName": "Sprinkler System \u2013 Sprinkler Heads Not Obstructed by Pallet Racking / Mobile Shelving", "ref": "FS8/G6/xx", "name": "Sprinkler System \u2013 Sprinkler Heads Not Obstructed by Pallet Racking / Mobile Shelving", "finding": "Solid chipboard decks were fitted to pallet racking/static/mobile shelving units, which would delay/prevent water from the sprinkler system to pass through to the level(s) below.", "reason": "For sprinkler systems to be effective, they must be clear of obstructions.", "recommendation": "It is advised that the solid chipboard decks are replaced with wire mesh decks (not perforated shelves), which would allow water from the sprinkler syste
